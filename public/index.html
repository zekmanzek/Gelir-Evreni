<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni</title>
    <style>
        body { background: #0b1e33; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; user-select: none; overflow-x: hidden; }
        .header { background: linear-gradient(180deg, #112b4a 0%, #0b1e33 100%); padding: 15px; border-bottom: 2px solid #ffd700; sticky: top; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #112b4a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #ffd70066; z-index: 100; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        .page { padding: 20px; padding-bottom: 120px; display: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .active { display: block; }
        .btn { background: #ffd700; color: black; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 90%; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 0 #b8860b; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b8860b; }
        .btn:disabled { background: #444; color: #888; box-shadow: none; transform: none; }
        .btn-spin { background: #ff4757; color: white; border: 2px solid #ffd700; box-shadow: 0 4px 0 #b33939; }
        .card { background: rgba(22, 53, 88, 0.8); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #ffffff11; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(5px); }
        .lang-btn { cursor: pointer; font-size: 24px; margin: 5px; filter: grayscale(0.5); transition: 0.3s; }
        .lang-btn.active-lang { filter: grayscale(0); transform: scale(1.2); }
        .leader-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #ffffff05; }
        .rank-gold { color: #ffd700; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <span class="lang-btn active-lang" id="lang-tr" onclick="setLang('tr')">🇹🇷</span>
        <span class="lang-btn" id="lang-az" onclick="setLang('az')">🇦🇿</span>
    </div>
    <h2 id="title" style="color:#ffd700; margin:5px; letter-spacing: 1px;">GELİR EVRENİ</h2>
    <div id="balance" style="font-size:32px; font-weight:900; text-shadow: 0 0 10px #ffd70044;">0 GEP</div>
    <div style="color:#00ff00; font-family: monospace;">≈ $<span id="usd">0.00</span></div>
</div>

<div id="home" class="page active">
    <div id="speed" style="color:#ffd700; margin-bottom:15px; font-weight: bold;">⚡ Hız: +50 GEP / Saat</div>
    <div style="margin: 30px 0;">
        <img src="https://img.icons8.com/emoji/96/money-bag-emoji.png" width="130" style="filter: drop-shadow(0 0 15px #ffd70022);">
    </div>
    <button class="btn" id="mine-btn" onclick="startMining()">MADENCİLİĞİ BAŞLAT</button>
    <div id="timer" style="font-size:18px; margin-top:10px; color: #888;">08:00:00</div>
    <br><br>
    <h3 id="spin-title">🎡 GÜNLÜK ŞANS</h3>
    <button class="btn btn-spin" id="spin-btn" onclick="spinWheel()">ÇARKI ÇEVİR</button>
</div>

<div id="tasks" class="page">
    <h3 id="task-title">🎯 İMPARATORLUK GÖREVLERİ</h3>
    <div id="task-list"></div>
</div>

<div id="leaderboard" class="page">
    <h3 style="color:#ffd700;">🏆 TOP 10 AVCI</h3>
    <div id="leader-list" style="background: #112b4a; border-radius: 15px; padding: 10px;">
        </div>
</div>

<div id="refs" class="page">
    <h3 id="ref-title">👥 AVCI EKİBİ</h3>
    <p id="ref-info" style="font-size: 14px; color: #aaa;">Her yeni avcı için +500 GEP kazanırsın!</p>
    <div class="card">🚀 <span id="ref-count">0</span> Referans</div>
    <button class="btn" onclick="copyRef()">LİNKİ KOPYALA</button>
</div>

<div class="nav">
    <div onclick="showPage('home')">🏠<br><small>ANA SAYFA</small></div>
    <div onclick="showPage('tasks')">🎯<br><small>GÖREVLER</small></div>
    <div onclick="showPage('leaderboard')">🏆<br><small>LİDER</small></div>
    <div onclick="showPage('refs')">👥<br><small>AVCI</small></div>
</div>

<script>
    let userId = new URLSearchParams(window.location.search).get('userid') || 'test';
    let userData = { balance: 0, currentSpeed: 50, tasks: [], lastMined: null, lastSpin: null, refCount: 0 };
    let lang = 'tr';

    const texts = {
        tr: { title: 'GELİR EVRENİ', mine: 'MADENCİLİĞİ BAŞLAT', tasks: 'İMPARATORLUK GÖREVLERİ', spin: 'ÇARKI ÇEVİR' },
        az: { title: 'GƏLİR ALƏMİ', mine: 'MƏDƏNÇİLİYİ BAŞLAT', tasks: 'İMPERİYA TAPŞIRIQLARI', spin: 'ÇARXI ÇEVİR' }
    };

    async function loadData() {
        const res = await fetch(`/api/user/${userId}`);
        userData = await res.json();
        updateUI();
        renderTasks();
    }

    async function loadLeaderboard() {
        const res = await fetch('/api/leaderboard');
        const data = await res.json();
        const list = document.getElementById('leader-list');
        list.innerHTML = '';
        data.forEach((u, i) => {
            const isMe = u.userId === userId ? "(Sen)" : "";
            list.innerHTML += `<div class="leader-item">
                <span class="${i < 3 ? 'rank-gold' : ''}">#${i+1} ${u.userId.substring(0,5)}... ${isMe}</span>
                <span>${Math.floor(u.balance).toLocaleString()} GEP</span>
            </div>`;
        });
    }

    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(userData.balance).toLocaleString() + ' GEP';
        document.getElementById('usd').innerText = (userData.balance / 10000).toFixed(2);
        document.getElementById('speed').innerText = `⚡ Hız: +${userData.currentSpeed} GEP / Saat`;
        document.getElementById('ref-count').innerText = userData.refCount;
        
        if (userData.lastSpin) {
            const diff = Date.now() - new Date(userData.lastSpin).getTime();
            if (diff < 24 * 60 * 60 * 1000) {
                document.getElementById('spin-btn').disabled = true;
                document.getElementById('spin-btn').innerText = "YARIN GEL";
            }
        }
    }

    async function spinWheel() {
        const res = await fetch('/api/spin', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId }) });
        const d = await res.json();
        if(d.success) { alert(`🎉 ${d.win} GEP Kazandın!`); loadData(); }
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.style.display = 'none');
        document.getElementById(p).style.display = 'block';
        if(p === 'leaderboard') loadLeaderboard();
    }

    async function doTask(url, id) {
        window.open(url, '_blank');
        setTimeout(async () => {
            const res = await fetch('/api/check-task', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId, channelId: id }) });
            const d = await res.json();
            if(d.success) loadData();
        }, 5000);
    }

    function renderTasks() {
        const CHANNELS = [
            { id: '@gelirevreni', name: 'Gelir Evreni', link: 'https://t.me/gelirevreni' },
            { id: '@kriptotayfa', name: 'Kripto Tayfa', link: 'https://t.me/kriptotayfa' },
            { id: 'x_gelir', name: 'X: Gelir Evreni', link: 'https://x.com/gelirevreni' }
        ];
        const list = document.getElementById('task-list');
        list.innerHTML = '';
        CHANNELS.forEach(ch => {
            const done = userData.tasks.includes(ch.id);
            list.innerHTML += `<div class="card">
                <div style="text-align:left;"><b>${ch.name}</b><br><small style="color:#ffd700;">+500 GEP</small></div>
                ${done ? '✅' : `<button onclick="doTask('${ch.link}','${ch.id}')" style="background:#ffd700; border:none; padding:10px 15px; border-radius:8px; font-weight:bold;">YAP</button>`}
            </div>`;
        });
    }

    function copyRef() {
        const link = `https://t.me/gelir_evreni_bot?start=${userId}`;
        const input = document.createElement('input');
        input.value = link;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        alert("Referans linkin kopyalandı! Arkadaşlarını davet ederek kazan.");
    }

    function setLang(l) {
        lang = l;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active-lang'));
        document.getElementById('lang-' + l).classList.add('active-lang');
        document.getElementById('title').innerText = texts[lang].title;
        document.getElementById('mine-btn').innerText = texts[lang].mine;
        document.getElementById('spin-btn').innerText = texts[lang].spin;
    }

    loadData();
</script>
</body>
</html>
