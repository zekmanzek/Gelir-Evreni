<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni - Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(15, 23, 42, 0.85);
            --accent-gold: #ffcc00;
            --accent-cyan: #00d4ff;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border-color: rgba(255, 204, 0, 0.2);
        }

        body {
            font-family: 'Urbanist', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(0, 212, 255, 0.12), transparent),
                              radial-gradient(circle at bottom left, rgba(255, 204, 0, 0.08), transparent);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Stats Card with Glassmorphism */
        .stats-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 30px 20px;
            border-radius: 28px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .points-val {
            font-size: 42px;
            font-weight: 800;
            color: var(--accent-gold);
            margin: 10px 0;
            letter-spacing: -1.5px;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.3);
        }

        .withdraw-btn {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            border: none;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .withdraw-active {
            background: linear-gradient(135deg, #ffcc00, #ff9900);
            color: #000;
            box-shadow: 0 8px 20px rgba(255, 204, 0, 0.4);
        }

        .withdraw-passive {
            background: #1e293b;
            color: var(--text-dim);
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Horizontal Navigation */
        .package-wrapper {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 20px;
            margin-bottom: 25px;
            scrollbar-width: none;
        }
        .package-wrapper::-webkit-scrollbar { display: none; }

        .package-card {
            min-width: 130px;
            background: rgba(30, 41, 59, 0.4);
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 14px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dim);
            transition: all 0.3s ease;
        }

        .package-card.active {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            transform: translateY(-3px);
        }

        /* Task Cards */
        .task-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 22px;
            padding: 20px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }
        .task-card:active { transform: scale(0.98); }

        .btn-yap {
            background: var(--accent-gold);
            color: #000;
            padding: 12px 24px;
            border-radius: 14px;
            border: none;
            font-weight: 800;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(255, 204, 0, 0.2);
        }

        /* PREMIUM WHEEL DESIGN */
        .wheel-container {
            position: relative;
            width: 310px;
            height: 310px;
            margin: 25px auto;
            border-radius: 50%;
            border: 10px solid #1e293b;
            box-shadow: 0 0 60px rgba(0,0,0,0.9), inset 0 0 30px rgba(255,204,0,0.15);
            background: #0f172a;
        }

        .wheel-pointer {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 22px solid transparent;
            border-right: 22px solid transparent;
            border-top: 38px solid var(--accent-gold);
            z-index: 100;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.6));
        }

        .wheel {
            width: 100%; height: 100%;
            position: relative;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            border-radius: 50%;
            overflow: hidden;
        }

        .wheel-logo {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            background: radial-gradient(circle, #1e293b, #020617);
            border-radius: 50%;
            border: 4px solid var(--accent-gold);
            z-index: 200;
            display: flex; justify-content: center; align-items: center;
            font-weight: 900; color: var(--accent-gold); font-size: 22px;
            box-shadow: 0 0 25px rgba(255,204,0,0.5);
            letter-spacing: 1px;
        }

        .slice {
            position: absolute;
            width: 100%; height: 100%;
            transform-origin: center;
            display: flex; justify-content: center;
            clip-path: polygon(50% 50%, 0 0, 100% 0);
        }

        .slice b {
            position: absolute;
            top: 45px;
            font-size: 26px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 3px 12px rgba(0,0,0,0.6);
        }

        .s1 { background: #0f172a; transform: rotate(0deg); }
        .s2 { background: #0369a1; transform: rotate(60deg); }
        .s3 { background: #0f172a; transform: rotate(120deg); }
        .s4 { background: #0369a1; transform: rotate(180deg); }
        .s5 { background: #0f172a; transform: rotate(240deg); }
        .s6 { background: #0369a1; transform: rotate(300deg); }

        /* Loader */
        #loader {
            position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg-color);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .spinner { 
            width: 60px; height: 60px; 
            border: 6px solid rgba(255,204,0,0.1); 
            border-top-color: var(--accent-gold); 
            border-radius: 50%; 
            animation: spin 1s infinite cubic-bezier(0.5, 0.1, 0.4, 0.9); 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <div class="stats-card">
        <div style="font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 3px; font-weight: 600;">GEP Balance</div>
        <div class="points-val" id="user-points">0</div>
        <div id="usd-val" style="color: var(--accent-cyan); font-weight: 600; font-size: 16px;">≈ 0.00 USDT</div>
        <button id="main-withdraw-btn" class="withdraw-btn withdraw-passive">💸 Withdrawal Request</button>
    </div>

    <div class="package-wrapper" id="package-list"></div>
    <div id="tasks-container" style="padding-bottom: 60px;"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#020617";
        
        let userData, allTasks = [], activeCategory = "Topluluğumuz";

        async function loadData() {
            try {
                const uid = tg.initDataUnsafe?.user?.id.toString() || "6814040940";
                const res = await fetch('/api/user/auth', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ telegramId: uid }) 
                });
                const data = await res.json();
                userData = data.user;

                document.getElementById('user-points').innerText = userData.points.toLocaleString();
                document.getElementById('usd-val').innerText = `≈ ${(userData.points / 100000).toFixed(2)} USDT`;
                
                const wBtn = document.getElementById('main-withdraw-btn');
                wBtn.className = `withdraw-btn ${userData.points >= 500000 ? 'withdraw-active' : 'withdraw-passive'}`;

                const tRes = await fetch('/api/tasks');
                allTasks = (await tRes.json()).tasks;

                renderPackages(); 
                renderTasks(activeCategory);
                setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 500);
            } catch (err) {
                console.error("Initialization failed:", err);
            }
        }

        function renderPackages() {
            const cats = ["Topluluğumuz", "Şans Çarkı", "GEP Madencilik"];
            const cont = document.getElementById('package-list'); 
            cont.innerHTML = '';
            cats.forEach(c => {
                const div = document.createElement('div');
                div.className = `package-card ${activeCategory === c ? 'active':''}`;
                div.onclick = () => { 
                    if(activeCategory === c) return;
                    activeCategory = c; 
                    renderPackages(); 
                    renderTasks(c); 
                };
                div.innerText = c; 
                cont.appendChild(div);
            });
        }

        function renderTasks(cat) {
            const cont = document.getElementById('tasks-container'); 
            cont.innerHTML = '';
            
            if (cat === "Şans Çarkı") {
                cont.innerHTML = `
                <div style="text-align:center; animation: fadeIn 0.6s ease-out;">
                    <div class="wheel-container">
                        <div class="wheel-pointer"></div>
                        <div class="wheel" id="main-wheel">
                            <div class="slice s1"><b>50</b></div><div class="slice s2"><b>100</b></div><div class="slice s3"><b>150</b></div>
                            <div class="slice s4"><b>200</b></div><div class="slice s5"><b>250</b></div><div class="slice s6"><b>500</b></div>
                        </div>
                        <div class="wheel-logo">GEP</div>
                    </div>
                    <button class="btn-yap" style="width: 90%; padding: 20px; font-size: 18px; margin-top: 20px; box-shadow: 0 12px 25px rgba(255,204,0,0.25);" onclick="startSpin()">SPIN THE WHEEL</button>
                    <p style="color: var(--text-dim); font-size: 13px; margin-top: 20px; font-weight: 600;">Test your luck once every 24 hours.</p>
                </div>`;
            } else if (cat === "GEP Madencilik") {
                cont.innerHTML = `<div style="text-align:center; padding:70px 30px; color: var(--text-dim); animation: fadeIn 0.6s;">
                    <div style="font-size: 55px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--accent-gold));">⛏️</div>
                    <h3 style="color: #fff; font-size: 22px;">Cloud Mining</h3>
                    <p style="line-height: 1.6;">Passive mining era is coming soon. Earn GEP while you sleep without draining your battery.</p>
                </div>`;
            } else {
                const filtered = allTasks.filter(t => t.category === cat);
                filtered.forEach(t => {
                    const isC = userData.completedTasks.includes(t.taskId);
                    const div = document.createElement('div'); 
                    div.className = 'task-card';
                    div.style.animation = "fadeIn 0.4s ease-out";
                    div.innerHTML = `
                        <div>
                            <h4 style="margin:0; font-size: 17px; font-weight: 600;">${t.title}</h4>
                            <p style="margin:6px 0 0 0; color: var(--accent-gold); font-weight: 800; font-size: 15px;">+${t.reward.toLocaleString()} GEP</p>
                        </div>
                        <button class="btn-yap" onclick="tg.openLink('${t.target}')">${isC ? '✅' : 'START'}</button>`;
                    cont.appendChild(div);
                });
            }
        }

        async function startSpin() {
            try {
                const res = await fetch('/api/spin', { 
                    method: 'POST', 
                    headers: {'Content-Type':'application/json'}, 
                    body: JSON.stringify({ telegramId: userData.telegramId }) 
                });
                const data = await res.json();
                
                if(data.success) {
                    const stopAngle = 3600 + (data.winIndex * 60);
                    const wheel = document.getElementById('main-wheel');
                    wheel.style.transform = `rotate(-${stopAngle}deg)`;
                    
                    setTimeout(() => { 
                        tg.showPopup({
                            title: 'Success!',
                            message: `You won ${data.reward} GEP! It has been added to your balance.`,
                            buttons: [{type: 'ok', color: '#ffcc00'}]
                        });
                        loadData(); 
                    }, 4500);
                } else {
                    tg.showAlert(data.error);
                }
            } catch (err) {
                tg.showAlert("Server connection error!");
            }
        }

        document.getElementById('main-withdraw-btn').onclick = () => {
            if(userData.points < 500000) return tg.showAlert("Minimum withdrawal is 500,000 GEP.");
            
            tg.showPopup({
                title: 'Withdrawal Request',
                message: 'Confirm to withdraw 500,000 GEP for 5 USDT?',
                buttons: [
                    {id: 'yes', type: 'default', text: 'Confirm', color: '#238636'},
                    {id: 'no', type: 'cancel', text: 'Cancel'}
                ]
            }, (btnId) => {
                if(btnId === 'yes') {
                    const wallet = prompt("Enter your USDT BEP20 (BSC) Wallet Address:");
                    if(wallet && wallet.length > 20) {
                        fetch('/api/withdraw', { 
                            method: 'POST', 
                            headers: {'Content-Type':'application/json'}, 
                            body: JSON.stringify({ telegramId: userData.telegramId, wallet }) 
                        }).then(() => {
                            tg.showAlert("Request submitted! Your payment will be processed after verification.");
                            loadData();
                        });
                    } else if(wallet) {
                        tg.showAlert("Invalid wallet address!");
                    }
                }
            });
        };

        loadData();
    </script>
</body>
</html>
