<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gelir Evreni - Premium</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Urbanist', sans-serif;
      background: #020617;
      color: #f8fafc;
      margin: 0;
      padding: 20px;
    }
    .profile-card {
      background: rgba(15,23,42,0.85);
      border-radius: 12px;
      padding: 15px;
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }
    .profile-card img {
      width: 50px; height: 50px;
      border-radius: 50%;
      margin-right: 15px;
    }
    .points-card {
      background: rgba(15,23,42,0.85);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
    }
    .leaderboard {
      background: rgba(15,23,42,0.85);
      border-radius: 12px;
      padding: 15px;
      margin-top: 20px;
    }
    .leaderboard h3 { margin: 0 0 10px; }
    .leaderboard ul { list-style: none; padding: 0; margin: 0; }
    .leaderboard li { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sponsor-banner {
      background: rgba(255,204,0,0.1);
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      margin-top: 30px;
      color: #ffcc00;
      font-weight: 600;
    }
    .btn {
      background: #00d4ff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      color: #020617;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="profile-card">
    <img src="https://via.placeholder.com/50" alt="Avatar">
    <div>
      <div id="user-name">Kullanıcı</div>
      <div id="user-id" style="color:#94a3b8;font-size:12px;">ID: ...</div>
    </div>
  </div>

  <div class="points-card">
    <div style="font-size:13px; color:#94a3b8;">GEP Balance</div>
    <div id="user-points" style="font-size:28px; font-weight:800;">0</div>
    <div id="usd-val" style="color:#00d4ff; font-weight:600;">≈ 0.00 USDT</div>
    <button id="withdraw-btn" class="btn">💸 Withdrawal Request</button>
  </div>

  <div id="tasks-container"></div>

  <div class="leaderboard">
    <h3>🏆 Leaderboard</h3>
    <ul id="leaderboard-list">
      <li>Henüz veri yok</li>
    </ul>
  </div>

  <div class="sponsor-banner">
    🔥 Sponsor Alanı - Reklamlar Burada Görünecek
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let userData;

    async function loadData() {
      const uid = tg.initDataUnsafe?.user?.id?.toString();
      const res = await fetch('https://gelir-evreni.onrender.com/api/user/auth', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ telegramId: uid })
      });
      const data = await res.json();
      userData = data.user;

      document.getElementById('user-name').innerText = tg.initDataUnsafe?.user?.first_name || "Kullanıcı";
      document.getElementById('user-id').innerText = "ID: " + userData.telegramId;
      document.getElementById('user-points').innerText = userData.points.toLocaleString();
      document.getElementById('usd-val').innerText = `≈ ${(userData.points/100000).toFixed(2)} USDT`;

      // Leaderboard örnek veri
      const lb = document.getElementById('leaderboard-list');
      lb.innerHTML = '';
      const sample = [
        {name:"Ali", points:1200000},
        {name:"Ayşe", points:950000},
        {name:"Mehmet", points:800000}
      ];
      sample.forEach(u=>{
        const li = document.createElement('li');
        li.innerText = `${u.name} - ${u.points.toLocaleString()} GEP`;
        lb.appendChild(li);
      });
    }

    document.getElementById('withdraw-btn').onclick = ()=>{
      if(userData.points < 500000) return tg.showAlert("Minimum 500,000 GEP gerekli.");
      tg.showAlert("Withdrawal request gönderildi!");
    };

    loadData();
  </script>
</body>
</html>
