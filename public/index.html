<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni - İmparatorluk</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-gold: #FFD700;
            --neon-green: #00FF88;
            --space-black: #05070A;
            --deep-blue: #0A192F;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 215, 0, 0.1);
        }

        body {
            background: radial-gradient(circle at top, var(--deep-blue), var(--space-black));
            color: #E2E8F0;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container { padding: 20px; padding-bottom: 100px; }

        /* Üst Başlık - Galaktik Stil */
        .header {
            display: flex; justify-content: center; align-items: center; gap: 12px;
            margin: 15px 0 30px 0;
        }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px; font-weight: 900;
            color: var(--neon-gold);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            letter-spacing: 2px; margin: 0;
        }

        /* Ana Bakiye Kartı - Yüzen Efekt */
        .main-display {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 35px 20px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            position: relative;
        }

        .coin-icon {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, var(--neon-gold), #B8860B);
            border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
            font-size: 35px; color: #000; font-weight: 900;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            margin-bottom: 15px;
        }

        .balance-label { font-size: 14px; text-transform: uppercase; letter-spacing: 3px; color: #888; }
        .balance-amount { font-family: 'Orbitron'; font-size: 40px; font-weight: 700; margin: 8px 0; color: #FFF; }
        .balance-usd { color: var(--neon-green); font-size: 18px; font-weight: 700; }

        /* Madencilik Butonu - Pulse Efekti */
        .action-btn {
            background: linear-gradient(180deg, var(--neon-green) 0%, #008F4C 100%);
            border: none; width: 100%; padding: 22px; border-radius: 25px;
            color: #000; font-family: 'Orbitron'; font-weight: 900; font-size: 16px;
            box-shadow: 0 10px 0 #005F32, 0 20px 40px rgba(0,255,136,0.15);
            cursor: pointer; transition: 0.15s; text-transform: uppercase;
            letter-spacing: 1px;
        }
        .action-btn:active { transform: translateY(4px); box-shadow: 0 6px 0 #005F32; }
        .action-btn:disabled { background: #1E293B; box-shadow: 0 10px 0 #0F172A; color: #475569; }

        /* İstatistik Paneli */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .stat-card {
            background: rgba(255,255,255,0.02);
            padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
            text-align: left;
        }
        .stat-card small { color: #64748B; font-size: 11px; display: block; text-transform: uppercase; }
        .stat-card div { font-size: 20px; font-weight: 700; color: var(--neon-gold); margin-top: 4px; }

        /* Sayfa Yapıları */
        .page { display: none; animation: slideIn 0.3s ease-out; }
        .page.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Görev Listesi */
        .task-list { margin-top: 20px; }
        .task-item {
            background: var(--glass);
            padding: 18px; border-radius: 22px; margin-bottom: 12px;
            display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.03);
        }
        .task-icon { font-size: 24px; margin-right: 15px; }
        .task-info h4 { margin: 0; font-size: 15px; color: #F1F5F9; }
        .task-info p { margin: 0; font-size: 12px; color: #94A3B8; }

        /* Alt Navigasyon - Cam Tasarımı */
        .nav-bar {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(10, 25, 47, 0.8); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 15px;
            border-radius: 30px; border: 1px solid rgba(255, 215, 0, 0.15);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }
        .nav-link { text-align: center; color: #64748B; text-decoration: none; font-size: 11px; font-weight: 700; flex: 1; }
        .nav-link.active { color: var(--neon-gold); }
        .nav-link i { font-size: 22px; display: block; margin-bottom: 4px; font-style: normal; }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://flagcdn.com/w40/tr.png" width="20">
        <h1>GELİR EVRENİ</h1>
        <img src="https://flagcdn.com/w40/az.png" width="20">
    </div>

    <div id="home-page" class="page active">
        <div class="main-display">
            <div class="coin-icon">$</div>
            <div class="balance-label">Toplam Avın</div>
            <div id="balance" class="balance-amount">0 GEP</div>
            <div class="balance-usd">≈ $<span id="usd">0.00</span></div>
            
            <div style="margin-top: 30px;">
                <button class="action-btn" id="mbtn" onclick="mine()">🎯 Madenciliği Başlat</button>
                <div id="timer" style="margin-top:12px; font-weight:bold; letter-spacing:2px; color:#475569;">SİSTEM HAZIR</div>
            </div>
        </div>

        <div class="stat-grid">
            <div class="stat-card"><small>Üretim Gücü</small><div id="speed">+50/s</div></div>
            <div class="stat-card"><small>Avcı Seviyesi</small><div>Seviye 1</div></div>
        </div>
    </div>

    <div id="earn-page" class="page">
        <h2 style="color:var(--neon-gold); font-family:'Orbitron'; font-size:18px;">GÖREV GALAKSİSİ</h2>
        <div class="task-list">
            <div class="task-item" onclick="copyRef()">
                <div class="task-icon">🛸</div>
                <div class="task-info"><h4>Ekibi Genişlet</h4><p>Referans başına 1000 GEP</p></div>
            </div>
            <div class="task-item">
                <div class="task-icon">💎</div>
                <div class="task-info"><h4>Günlük Maden</h4><p>Her gün +50 GEP bonus</p></div>
            </div>
        </div>
    </div>

    <div id="profile-page" class="page">
        <h2 style="color:var(--neon-gold); font-family:'Orbitron'; font-size:18px;">KOMUTAN PROFİLİ</h2>
        <div class="main-display" style="padding: 20px;">
            <div id="username" style="font-size:24px; font-weight:bold; color:var(--neon-gold);">Yükleniyor...</div>
            <div id="userid" style="color:#64748B; margin-top:5px;">ID: ---</div>
        </div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-link active" onclick="switchPage('home', this)"><i>🏠</i>Üs</div>
    <div class="nav-link" onclick="switchPage('earn', this)"><i>💰</i>Kazanç</div>
    <div class="nav-link" onclick="switchPage('profile', this)"><i>👤</i>Profil</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const userId = new URLSearchParams(window.location.search).get('userid');

    async function init() {
        const res = await fetch('/api/user/' + userId);
        const data = await res.json();
        
        document.getElementById('balance').innerText = Math.floor(data.balance).toLocaleString() + ' GEP';
        document.getElementById('usd').innerText = (data.balance * 0.0001).toFixed(2);
        document.getElementById('speed').innerText = '+' + data.speed + '/s';
        document.getElementById('username').innerText = data.username;
        document.getElementById('userid').innerText = 'ID: ' + data.userId;

        if (data.lastMined) {
            const diff = Date.now() - new Date(data.lastMined).getTime();
            if (diff < 28800000) {
                document.getElementById('mbtn').disabled = true;
                runTimer(28800000 - diff);
            }
        }
    }

    function runTimer(ms) {
        let t = ms / 1000;
        const timerObj = setInterval(() => {
            let h = Math.floor(t/3600), m = Math.floor((t%3600)/60), s = Math.floor(t%60);
            document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if (--t < 0) { clearInterval(timerObj); location.reload(); }
        }, 1000);
    }

    async function mine() {
        await fetch('/api/mine', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId }) });
        location.reload();
    }

    function switchPage(page, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(page + '-page').classList.add('active');
        el.classList.add('active');
    }

    function copyRef() {
        const link = `https://t.me/gelir_evreni_bot?start=${userId}`;
        const i = document.createElement('input'); i.value = link; document.body.appendChild(i); i.select(); document.execCommand('copy'); document.body.removeChild(i);
        tg.showAlert("Koordinatlar Kopyalandı! Yeni avcıları davet et.");
    }

    init();
</script>
</body>
</html>
