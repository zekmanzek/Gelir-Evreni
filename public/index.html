<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #0b0e14; color: white; margin: 0; padding: 15px; overflow-x: hidden; }
        .stats-card { background: linear-gradient(135deg, #1c1f2e, #111420); padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; border: 1px solid #2d334a; }
        .points-val { font-size: 32px; font-weight: 800; color: #ffcc00; margin: 5px 0; }
        .withdraw-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .withdraw-active { background: #238636; color: white; }
        .withdraw-passive { background: #2d334a; color: #8b949e; opacity: 0.6; }

        .package-wrapper { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; -webkit-overflow-scrolling: touch; }
        .package-card { min-width: 90px; background: #1c1f2e; border: 2px solid #2d334a; border-radius: 15px; padding: 10px; text-align: center; cursor: pointer; flex-shrink: 0; }
        .package-card.active { border-color: #00d4ff; background: #162a3d; }
        
        .task-card { background: #161b22; border: 1px solid #30363d; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-yap { background: #ffcc00; color: #000; padding: 8px 18px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }

        .mining-card { background: #1c1f2e; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #00d4ff; margin-bottom: 15px; }
        .mining-timer { font-size: 28px; font-weight: bold; color: #00d4ff; margin: 15px 0; font-family: monospace; letter-spacing: 2px; }
        .progress-bar { width: 100%; height: 8px; background: #2d334a; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: #00d4ff; width: 0%; transition: width 1s linear; }

        .wheel-container { position: relative; width: 260px; height: 260px; margin: 20px auto; border-radius: 50%; border: 6px solid #2d334a; box-shadow: 0 0 15px rgba(0,0,0,0.5); overflow: hidden; }
        .wheel { width: 100%; height: 100%; position: relative; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); border-radius: 50%; }
        .wheel-pointer { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #ffcc00; z-index: 100; }
        
        .slice { position: absolute; width: 100%; height: 100%; transform-origin: center; display: flex; justify-content: center; clip-path: polygon(50% 50%, 40% 0, 60% 0); }
        .slice b { margin-top: 25px; font-size: 16px; color: white; font-weight: 800; text-shadow: 1px 1px 2px black; }

        .s1 { background: #1c1f2e; transform: rotate(0deg); }
        .s2 { background: #00d4ff; transform: rotate(60deg); }
        .s3 { background: #1c1f2e; transform: rotate(120deg); }
        .s4 { background: #00d4ff; transform: rotate(180deg); }
        .s5 { background: #1c1f2e; transform: rotate(240deg); }
        .s6 { background: #00d4ff; transform: rotate(300deg); }

        #withdraw-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1c1f2e; padding: 25px; border-radius: 20px; width: 85%; text-align: center; border: 1px solid #2d334a; }
        .modal-content input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid #30363d; background: #0b0e14; color: white; text-align: center; }
    </style>
</head>
<body>

    <div class="stats-card">
        <div style="font-size: 11px; color: #8b949e;">GEP BAKİYE</div>
        <div class="points-val" id="user-points">0</div>
        <div style="font-size: 12px; color: #00d4ff;" id="usd-val">≈ 0.00 USDT</div>
        <button id="main-withdraw-btn" class="withdraw-btn withdraw-passive" onclick="openWithdrawModal()">💸 Para Çekme Talebi</button>
        <span style="font-size: 10px; color: #8b949e; display: block; margin-top: 8px;">⚠️ Minimum: 500,000 GEP (5 USDT)</span>
    </div>

    <div class="package-wrapper" id="package-list"></div>
    <div id="tasks-container"></div>

    <div id="withdraw-modal">
        <div class="modal-content">
            <h3 style="margin:0; color:#ffcc00;">Cüzdan Adresi</h3>
            <input type="text" id="wallet-addr" placeholder="USDT BEP-20 Adresiniz">
            <button class="withdraw-btn withdraw-active" onclick="submitWithdraw()">TALEBİ GÖNDER</button>
            <button style="background:none; border:none; color:#8b949e; margin-top:15px;" onclick="closeModal()">Kapat</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let userData = null;
        let allTasks = [];
        let activeCategory = "Topluluğumuz";
        let refLink = "";
        let miningInterval = null;

        async function loadData() {
            try {
                const res = await fetch('/api/user/auth', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ initData: tg.initData }) 
                });
                const data = await res.json();
                userData = data.user;
                refLink = data.refLink;
                
                document.getElementById('user-points').innerText = userData.points.toLocaleString();
                document.getElementById('usd-val').innerText = `≈ ${(userData.points / 100000).toFixed(2)} USDT`;
                
                const wBtn = document.getElementById('main-withdraw-btn');
                wBtn.className = userData.points >= 500000 ? "withdraw-btn withdraw-active" : "withdraw-btn withdraw-passive";

                const tRes = await fetch('/api/tasks');
                const tData = await tRes.json();
                allTasks = tData.tasks;
                
                renderPackages();
                renderTasks(activeCategory);
            } catch (e) {
                console.error("Yükleme hatası:", e);
            }
        }

        function renderPackages() {
            const container = document.getElementById('package-list');
            const cats = ["Başlangıç Görevleri", "Topluluğumuz", "Airdroplar", "Şans Çarkı", "GEP Madencilik", "Sürpriz Görevler", "Referans Sistemi"];
            const icons = {"Başlangıç Görevleri":"⭐", "Topluluğumuz":"👥", "Airdroplar":"🪂", "Şans Çarkı":"🎡", "GEP Madencilik":"⛏️", "Sürpriz Görevler":"🎁", "Referans Sistemi":"🔗"};
            container.innerHTML = '';
            cats.forEach(c => {
                const card = document.createElement('div');
                card.className = `package-card ${activeCategory === c ? 'active':''}`;
                card.onclick = () => { activeCategory = c; renderPackages(); renderTasks(c); };
                card.innerHTML = `<div>${icons[c]}</div><span style="font-size:10px;">${c}</span>`;
                container.appendChild(card);
            });
        }

        function renderTasks(category) {
            const container = document.getElementById('tasks-container');
            container.innerHTML = '';
            if(miningInterval) clearInterval(miningInterval);

            // MADENCİLİK (⛏️)
            if (category === "GEP Madencilik") {
                const lastClaim = userData.lastMining ? new Date(userData.lastMining).getTime() : 0;
                const waitTime = 8 * 60 * 60 * 1000;
                container.innerHTML = `
                <div class="mining-card">
                    <h3 style="margin:0; color:#ffcc00;">GEP Madenciliği</h3>
                    <p style="font-size:12px; color:#8b949e;">Her 8 saatte bir 100 GEP kazanırsın.</p>
                    <div class="mining-timer" id="mining-timer-display">00:00:00</div>
                    <div class="progress-bar"><div class="progress-fill" id="mining-progress-bar"></div></div>
                    <button class="btn-yap" id="mining-btn" style="width:100%; height:50px;" onclick="claimMining()">TOPLA</button>
                </div>`;
                const updateUI = () => {
                    const now = Date.now();
                    const diff = now - lastClaim;
                    const timerText = document.getElementById('mining-timer-display');
                    const progress = document.getElementById('mining-progress-bar');
                    const btn = document.getElementById('mining-btn');
                    if (diff >= waitTime) {
                        timerText.innerText = "HAZIR!";
                        timerText.style.color = "#238636";
                        progress.style.width = "100%";
                        btn.disabled = false;
                        btn.innerText = "100 GEP TOPLA";
                        btn.style.background = "#238636"; btn.style.color = "white";
                    } else {
                        const remaining = waitTime - diff;
                        const h = Math.floor(remaining / 3600000);
                        const m = Math.floor((remaining % 3600000) / 60000);
                        const s = Math.floor((remaining % 60000) / 1000);
                        timerText.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                        progress.style.width = `${(diff / waitTime) * 100}%`;
                        btn.disabled = true;
                        btn.innerText = "KAZILIYOR...";
                        btn.style.background = "#2d334a"; btn.style.color = "#8b949e";
                    }
                };
                updateUI();
                miningInterval = setInterval(updateUI, 1000);
                return;
            }

            // ÇARK (🎡)
            if (category === "Şans Çarkı") {
                container.innerHTML = `
                <div style="text-align:center;">
                    <div class="wheel-container">
                        <div class="wheel-pointer"></div>
                        <div class="wheel" id="main-wheel">
                            <div class="slice s1"><b>50</b></div><div class="slice s2"><b>100</b></div><div class="slice s3"><b>150</b></div>
                            <div class="slice s4"><b>200</b></div><div class="slice s5"><b>250</b></div><div class="slice s6"><b>500</b></div>
                        </div>
                    </div>
                    <button class="btn-yap" style="width:100%; padding:15px;" id="spin-btn" onclick="startSpin()">ÇARKI ÇEVİR</button>
                    <p style="font-size: 12px; color: #8b949e; margin-top: 10px;">Günde 1 kez şansını dene!</p>
                </div>`;
                return;
            }

            // REF (🔗)
            if (category === "Referans Sistemi") {
                container.innerHTML = `
                <div style="text-align:center; padding:20px; background:#1c1f2e; border-radius:20px; border:1px solid #2d334a;">
                    <h3 style="color:#ffcc00; margin-top:0;">🔗 Arkadaş Davet Et</h3>
                    <input type="text" readonly value="${refLink}" style="width:100%; padding:12px; border-radius:10px; background:#0b0e14; color:#00d4ff; border:1px solid #30363d; text-align:center; margin-bottom:15px;">
                    <button class="btn-yap" style="width:100%;" onclick="copyRef()">LİNKİ KOPYALA</button>
                </div>`;
                return;
            }

            // GÖREVLER (LISTE)
            const filtered = allTasks.filter(t => t.category === category);
            if(filtered.length === 0) { container.innerHTML = `<p style="text-align:center; color:#8b949e; margin-top:40px;">Görev bulunmuyor.</p>`; return; }

            filtered.forEach(t => {
                const isC = userData.completedTasks.includes(t.taskId);
                const div = document.createElement('div');
                div.className = 'task-card';
                div.innerHTML = `
                    <div>
                        <h4 style="margin:0;">${t.title}</h4>
                        <p style="margin:5px 0 0; color:#ffcc00; font-size:13px;">+${t.reward} GEP</p>
                    </div>
                    <button class="btn-yap" id="btn-${t.taskId}" onclick="goTask('${t.taskId}', '${t.target}')" ${isC ? 'style="background:#238636;color:white"':''}>
                        ${isC ? '✅' : 'YAP'}
                    </button>`;
                container.appendChild(div);
            });
        }

        // --- EN KRİTİK FONKSİYON: GÖREV ONAYLAMA ---
        async function goTask(taskId, url) {
            if(!url || url === "#") return;
            
            // Linki yeni sekmede aç
            tg.openLink(url);
            
            // Butonu "Bekliyor" durumuna getir
            const btn = document.getElementById(`btn-${taskId}`);
            if(btn.innerText === "✅") return; 

            // Arka planda sunucuya "yaptım" de
            try {
                const res = await fetch('/api/tasks/complete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ telegramId: userData.telegramId, taskId: taskId })
                });
                const data = await res.json();
                if(data.success) {
                    btn.innerText = "✅";
                    btn.style.background = "#238636";
                    btn.style.color = "white";
                    loadData(); // Bakiyeyi güncelle
                }
            } catch (e) { console.error(e); }
        }

        async function claimMining() {
            try {
                const res = await fetch('/api/mining/claim', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ telegramId: userData.telegramId }) });
                const data = await res.json();
                if(data.success) { tg.showAlert("🎉 100 GEP Toplandı!"); loadData(); }
            } catch (e) { tg.showAlert("Hata oluştu."); }
        }

        function copyRef() { navigator.clipboard.writeText(refLink); tg.showAlert("Kopyalandı!"); }

        async function startSpin() {
            const btn = document.getElementById('spin-btn');
            if (btn.disabled) return;
            btn.disabled = true;
            try {
                const res = await fetch('/api/spin', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ telegramId: userData.telegramId }) });
                const data = await res.json();
                if(data.success) {
                    const angle = 3600 + (data.winIndex * 60);
                    document.getElementById('main-wheel').style.transform = `rotate(-${angle}deg)`;
                    setTimeout(() => { tg.showAlert(`🎉 ${data.reward} GEP kazandın!`); loadData(); }, 4100);
                } else { tg.showAlert(data.error); btn.disabled = false; }
            } catch (e) { tg.showAlert("Hata!"); btn.disabled = false; }
        }

        function openWithdrawModal() { if(userData.points >= 500000) document.getElementById('withdraw-modal').style.display='flex'; else tg.showAlert("Minimum limit: 500.000 GEP"); }
        function closeModal() { document.getElementById('withdraw-modal').style.display='none'; }
        async function submitWithdraw() {
            const addr = document.getElementById('wallet-addr').value;
            if(addr.length < 20) return tg.showAlert("Geçerli adres girin!");
            await fetch('/api/withdraw', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ telegramId: userData.telegramId, walletAddress: addr, amount: userData.points }) });
            tg.showAlert("Talep alındı!"); closeModal();
        }

        loadData();
    </script>
</body>
</html>
