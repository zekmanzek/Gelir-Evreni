<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --gold: #ffcc00; --card: rgba(30, 41, 59, 0.7); }
        body { font-family: 'Urbanist', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 80px; }
        .header { text-align: center; padding: 20px; background: linear-gradient(to bottom, #0f172a, var(--bg)); }
        .points { font-size: 42px; font-weight: 900; color: var(--gold); }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #334155; }
        .nav-item { color: #94a3b8; font-size: 12px; text-decoration: none; text-align: center; flex: 1; }
        .nav-item.active { color: var(--gold); }
        .page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        .btn-main { width: 100%; padding: 18px; background: var(--gold); border: none; border-radius: 15px; font-weight: 900; cursor: pointer; color: #000; margin-top: 10px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 12px; color: #94a3b8;">BAKİYENİZ</div>
        <div class="points" id="balance">0</div>
        <div id="usd">≈ 0.00 USDT</div>
    </div>

    <div id="page-tasks" class="page active">
        <h3>🚀 Görevler</h3>
        <div id="task-list"></div>
    </div>

    <div id="page-mine" class="page">
        <div class="card" style="text-align: center;">
            <h3>⛏️ GEP Madenciliği</h3>
            <p>Her 8 saatte bir 500 GEP topla.</p>
            <div id="mine-timer" style="font-size: 24px; font-weight: 700; margin: 15px 0;">HAZIR</div>
            <button id="btn-mine" class="btn-main" onclick="startMining()">MADENİ TOPLA</button>
        </div>
    </div>

    <div id="page-spin" class="page">
        <div class="card" style="text-align: center;">
            <h3>🎡 Günlük Şans Çarkı</h3>
            <p>50 - 500 GEP arası kazan.</p>
            <button id="btn-spin" class="btn-main" onclick="spinWheel()">ÇARKI ÇEVİR</button>
        </div>
    </div>

    <div id="page-ref" class="page">
        <div class="card">
            <h3>👥 Arkadaş Davet Et</h3>
            <p>Her arkadaşın için <b>+500 GEP</b> kazan!</p>
            <input type="text" id="ref-link" readonly style="width:100%; padding:10px; border-radius:10px; border:none; background:#020617; color:var(--gold);">
            <button class="btn-main" onclick="copyRef()">LİNKİ KOPYALA</button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active" onclick="showPage('tasks')">📋 Görev</a>
        <a href="#" class="nav-item" onclick="showPage('mine')">⛏️ Maden</a>
        <a href="#" class="nav-item" onclick="showPage('spin')">🎡 Çark</a>
        <a href="#" class="nav-item" onclick="showPage('ref')">👥 Ref</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        let user;
        const API = window.location.origin;

        async function init() {
            const uid = tg.initDataUnsafe?.user?.id || "6814040940";
            const res = await fetch(`${API}/api/user/auth`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: uid.toString() })
            });
            const data = await res.json();
            user = data.user;
            document.getElementById('ref-link').value = `https://t.me/${data.botUsername}?start=${user.telegramId}`;
            updateUI();
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`page-${p}`).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function updateUI() {
            document.getElementById('balance').innerText = user.points.toLocaleString();
            document.getElementById('usd').innerText = `≈ ${(user.points / 100000).toFixed(2)} USDT`;
        }

        async function spinWheel() {
            const res = await fetch(`${API}/api/spin`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.telegramId })
            });
            const data = await res.json();
            if(data.success) {
                alert(`Tebrikler! ${data.prize} GEP kazandın.`);
                user.points = data.points;
                updateUI();
            } else alert(data.message);
        }

        async function startMining() {
            const res = await fetch(`${API}/api/mine`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.telegramId })
            });
            const data = await res.json();
            if(data.success) {
                alert("500 GEP toplandı!");
                user.points = data.points;
                updateUI();
            } else alert("Maden henüz dolmadı!");
        }

        function copyRef() {
            const copyText = document.getElementById("ref-link");
            copyText.select();
            document.execCommand("copy");
            tg.showAlert("Link kopyalandı! Arkadaşlarına gönder.");
        }

        init();
    </script>
</body>
</html>
