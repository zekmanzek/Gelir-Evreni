<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni | Yönetim</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-deep: #020617; --gold: #ffcc00; --gold-glow: rgba(255, 204, 0, 0.4); --card-glass: rgba(15, 23, 42, 0.6); --border-glass: rgba(255, 255, 255, 0.08); --text-main: #f8fafc; --text-dim: #94a3b8; --success: #22c55e; }
        body { font-family: 'Urbanist', sans-serif; background-color: var(--bg-deep); color: var(--text-main); margin: 0; padding-bottom: 110px; overflow-x: hidden; }
        .header { text-align: center; padding: 30px 20px; border-bottom: 1px solid var(--border-glass); }
        .points { font-size: 48px; font-weight: 900; color: var(--gold); }
        .page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        .card { background: var(--card-glass); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--border-glass); }
        .btn-full { width: 100%; padding: 15px; border-radius: 12px; background: var(--gold); border: none; font-weight: 900; cursor: pointer; margin-top: 10px; }
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(15, 23, 42, 0.9); display: flex; padding: 10px; border-radius: 22px; border: 1px solid var(--border-glass); }
        .nav-item { color: var(--text-dim); flex: 1; text-align: center; font-size: 10px; font-weight: 800; text-decoration: none; }
        .nav-item.active { color: var(--gold); }
        input { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass); border-radius: 10px; color: white; margin-bottom: 10px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .admin-only { display: none; background: #ef4444 !important; color: white !important; }
    </style>
</head>
<body>
    <div class="header">
        <div id="user-level" class="level-badge" style="background:var(--gold); color:black; padding:4px 10px; border-radius:10px; font-size:12px; font-weight:900;">BRONZ</div>
        <div class="points" id="balance">0</div>
        <div style="color:var(--text-dim)">GEP</div>
    </div>

    <div id="page-tasks" class="page active"><h3>Görevler</h3><div id="task-list"></div></div>
    
    <div id="page-mine" class="page">
        <div class="card" style="text-align:center">
            <h2 id="mine-status">Maden Hazır</h2>
            <button id="btn-mine" class="btn-full" onclick="startMining()">KAZMAYA BAŞLA</button>
        </div>
    </div>

    <div id="page-profile" class="page">
        <div class="card">
            <h3>Günlük Ödül</h3>
            <button class="btn-full" onclick="claimDaily()">ÖDÜLÜ AL</button>
        </div>
        <button id="admin-btn" class="btn-full admin-only" onclick="showPage('admin')">⚙️ YÖNETİM PANELİ</button>
    </div>

    <div id="page-leaderboard" class="page"><h3>Top 10</h3><div id="leader-list"></div></div>

    <div id="page-admin" class="page">
        <button onclick="showPage('profile')" style="color:var(--gold); background:none; border:none; margin-bottom:20px;">⬅ Geri Dön</button>
        <div class="card">
            <h3>Puan Ekle / Düzenle</h3>
            <input type="text" id="adm-target" placeholder="Kullanıcı ID veya @username">
            <input type="number" id="adm-amount" placeholder="Miktar">
            <button class="btn-full" onclick="adminAction('add')">PUAN EKLE</button>
            <button class="btn-full" style="background:#444; color:white;" onclick="adminAction('ban')">YASAKLA (BAN)</button>
        </div>
        <div class="card">
            <h3>Yeni Görev Ekle</h3>
            <input type="text" id="task-title" placeholder="Görev Başlığı">
            <input type="text" id="task-target" placeholder="Link (https://...)">
            <input type="number" id="task-reward" placeholder="Ödül Miktarı">
            <button class="btn-full" style="background:var(--success)" onclick="addTask()">GÖREVİ YAYINLA</button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="javascript:void(0)" class="nav-item active" onclick="showPage('tasks', this)">GÖREV</a>
        <a href="javascript:void(0)" class="nav-item" onclick="showPage('mine', this)">MADEN</a>
        <a href="javascript:void(0)" class="nav-item" onclick="showPage('profile', this)">PROFİL</a>
        <a href="javascript:void(0)" class="nav-item" onclick="showPage('leaderboard', this)">TOP 10</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const API = window.location.origin;
        let user;

        async function init() {
            const tgUser = tg.initDataUnsafe?.user || { id: "1469411131", first_name: "Admin" };
            const res = await fetch(`${API}/api/user/auth`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: tgUser.id.toString(), username: tgUser.username, firstName: tgUser.first_name })
            });
            const data = await res.json();
            user = data.user;
            
            // Eğer admin ise butonu göster
            if (data.isAdmin) {
                document.getElementById('admin-btn').style.display = 'block';
            }
            
            updateUI();
            renderTasks();
        }

        function updateUI() {
            document.getElementById('balance').innerText = user.points.toLocaleString();
            document.getElementById('user-level').innerText = user.level;
        }

        function showPage(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            if(el) {
                document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
                el.classList.add('active');
            }
            document.getElementById(`page-${p}`).classList.add('active');
        }

        async function adminAction(action) {
            const targetId = document.getElementById('adm-target').value;
            const amount = document.getElementById('adm-amount').value;
            const res = await fetch(`${API}/api/admin/user-manage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ adminId: user.telegramId, targetId, action, amount })
            });
            const data = await res.json();
            tg.showAlert(data.success ? "İşlem Başarılı" : "Hata Oluştu");
        }

        async function addTask() {
            const title = document.getElementById('task-title').value;
            const target = document.getElementById('task-target').value;
            const reward = document.getElementById('task-reward').value;
            const res = await fetch(`${API}/api/admin/add-task`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ adminId: user.telegramId, title, target, reward })
            });
            const data = await res.json();
            if(data.success) { tg.showAlert("Görev eklendi!"); renderTasks(); }
        }

        async function renderTasks() {
            const res = await fetch(`${API}/api/tasks`);
            const data = await res.json();
            document.getElementById('task-list').innerHTML = data.tasks.map(t => `<div class="card"><h4>${t.title}</h4><button class="btn-full" onclick="tg.openLink('${t.target}')">GİT (+${t.reward})</button></div>`).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
