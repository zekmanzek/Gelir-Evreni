<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-gold: #FFD700; --neon-green: #00FF88; --glass: rgba(255, 255, 255, 0.05); }
        body { background: radial-gradient(circle at top right, #0A192F, #05070A); color: #E2E8F0; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
        .container { padding: 20px; padding-bottom: 110px; }
        .header { text-align: center; margin: 20px 0 30px; }
        .header h1 { font-family: 'Orbitron'; font-size: 24px; color: var(--neon-gold); text-shadow: 0 0 15px rgba(255,215,0,0.4); margin: 0; }
        .card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 30px; border: 1px solid rgba(255,215,0,0.1); padding: 30px 20px; text-align: center; }
        .balance { font-family: 'Orbitron'; font-size: 38px; font-weight: 900; color: #FFF; margin: 5px 0; }
        .usd { color: var(--neon-green); font-size: 18px; font-weight: 700; }
        .stat-badge { background: rgba(0,255,136,0.1); border: 1px solid var(--neon-green); color: var(--neon-green); padding: 6px 15px; border-radius: 20px; font-size: 13px; display: inline-block; margin-top: 15px; }
        .btn-main { background: linear-gradient(180deg, var(--neon-green) 0%, #008F4C 100%); width: 100%; padding: 20px; border-radius: 22px; border: none; color: #000; font-family: 'Orbitron'; font-weight: 900; font-size: 18px; margin-top: 25px; box-shadow: 0 6px 0 #005F32; cursor: pointer; }
        .btn-main:disabled { background: #1E293B; box-shadow: none; color: #475569; transform: translateY(4px); }
        .page { display: none; animation: slideUp 0.3s ease-out; }
        .page.active { display: block; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .task-item { background: var(--glass); border-radius: 18px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.03); }
        .task-info { flex: 1; margin-left: 15px; }
        .task-info h4 { margin: 0; font-size: 14px; color: #FFF; }
        .task-info p { margin: 0; font-size: 11px; color: var(--neon-green); }
        .btn-task { background: var(--neon-gold); border: none; padding: 10px 12px; border-radius: 10px; font-family: 'Orbitron'; font-weight: 800; font-size: 9px; color: #000; min-width: 95px; }
        .btn-task:disabled { background: #2D3748; color: #718096; }
        .btn-task.waiting { background: #334155 !important; color: #94A3B8 !important; }
        .nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(10,25,47,0.95); backdrop-filter: blur(20px); display: flex; padding: 12px; border-radius: 25px; border: 1px solid rgba(255,215,0,0.2); }
        .nav-item { flex: 1; text-align: center; color: #64748B; font-size: 11px; font-weight: 800; padding: 10px 0; border-radius: 15px; }
        .nav-item.active { background: rgba(255,215,0,0.1); color: var(--neon-gold); }
        .rank-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>GELİR EVRENİ</h1></div>

        <div id="home" class="page active">
            <div class="card">
                <div style="font-size: 60px;">🎁</div>
                <div id="balance" class="balance">0 GEP</div>
                <div class="usd">≈ $<span id="usd-val">0.00</span></div>
                <div id="rate" class="stat-badge">⚡ +50 GEP / Saat</div>
                <button id="mine-btn" class="btn-main" onclick="startMining()">AVLANMAYI BAŞLAT</button>
                <div id="timer" style="margin-top:15px; font-family:'Orbitron'; font-size:14px; color:#64748B;">SİSTEM HAZIR</div>
            </div>
        </div>

        <div id="tasks" class="page">
            <h3 style="text-align:center; color:var(--neon-gold);">GÖREVLER</h3>
            <div id="task-container"></div>
        </div>

        <div id="leaderboard" class="page">
            <h3 style="text-align:center; color:var(--neon-gold);">LİDERLER</h3>
            <div id="lb-container"></div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showPage('home', this)">ÜS</div>
        <div class="nav-item" onclick="showPage('tasks', this)">GÖREVLER</div>
        <div class="nav-item" onclick="showPage('leaderboard', this)">LİDERLER</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const userId = new URLSearchParams(window.location.search).get('userid') || "test_user";
        let user = { balance: 0, completedTasks: [], pendingTasks: [], refCount: 0 };

        const tasksList = [
            { id: 's1', name: 'Kripto Tayfa', url: 'https://t.me/kriptotayfa' },
            { id: 's2', name: 'Gelir Evreni Proje', url: 'https://t.me/gelirevreniproje' },
            { id: 's3', name: 'Gelir Evreni', url: 'https://t.me/gelirevreni' },
            { id: 's4', name: 'Gelir Evreni X', url: 'https://x.com/gelirevreni' }
        ];

        async function init() {
            try {
                const res = await fetch(`/api/user/${userId}`);
                user = await res.json();
                document.getElementById('balance').innerText = Math.floor(user.balance).toLocaleString() + ' GEP';
                document.getElementById('usd-val').innerText = (user.balance * 0.0001).toFixed(2);
                document.getElementById('rate').innerText = `⚡ +${50 + (user.refCount * 25)} GEP / Saat`;
                
                if (user.lastMined) {
                    const diff = Date.now() - new Date(user.lastMined).getTime();
                    if (diff < 28800000) { document.getElementById('mine-btn').disabled = true; runTimer(28800000 - diff); }
                }
                renderTasks();
                renderLB();
            } catch (e) { console.error(e); }
        }

        function renderTasks() {
            const container = document.getElementById('task-container');
            container.innerHTML = '';
            tasksList.forEach(t => {
                const isDone = user.completedTasks.includes(t.id);
                const isPending = user.pendingTasks.find(p => p.taskId === t.id);
                
                let btnHtml = `<button class="btn-task" onclick="handleTask('${t.id}', '${t.url}')">KATIL</button>`;
                if (isDone) btnHtml = `<button class="btn-task" disabled>ALINDI</button>`;
                else if (isPending) btnHtml = `<button class="btn-task waiting" disabled>1 SAAT BEKLE</button>`;

                container.innerHTML += `<div class="task-item">
                    <div style="font-size:20px;">📢</div>
                    <div class="task-info"><h4>${t.name}</h4><p>+500 GEP</p></div>
                    ${btnHtml}
                </div>`;
            });
        }

        async function handleTask(id, url) {
            tg.openLink(url);
            await fetch('/api/start-task', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId, taskId: id })
            });
            init();
        }

        async function startMining() {
            const res = await fetch('/api/mine', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId }) });
            if (res.ok) init();
        }

        function runTimer(ms) {
            let remain = ms / 1000;
            const iv = setInterval(() => {
                const h = Math.floor(remain / 3600).toString().padStart(2, '0');
                const m = Math.floor((remain % 3600) / 60).toString().padStart(2, '0');
                const s = Math.floor(remain % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
                if (--remain < 0) { clearInterval(iv); document.getElementById('mine-btn').disabled = false; document.getElementById('timer').innerText = "SİSTEM HAZIR"; }
            }, 1000);
        }

        async function renderLB() {
            const res = await fetch(`/api/leaderboard/${userId}`);
            const data = await res.json();
            const container = document.getElementById('lb-container');
            container.innerHTML = `<div class="rank-item" style="color:var(--neon-gold)"><span>Sıran: #${data.userRank}</span><span>${Math.floor(user.balance)} GEP</span></div><hr style="opacity:0.1">`;
            data.top20.forEach((u, i) => {
                container.innerHTML += `<div class="rank-item"><span>#${i+1} ${u.fullName}</span><span>${Math.floor(u.balance)} GEP</span></div>`;
            });
        }

        function showPage(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            el.classList.add('active');
        }

        tg.expand();
        init();
    </script>
</body>
</html>
