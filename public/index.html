<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni | Premium Web3</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-dark: #020617; --bg-glow: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 70%);
            --glass-bg: rgba(15, 23, 42, 0.6); --glass-border: rgba(255, 255, 255, 0.08);
            --gold: #F59E0B; --gold-glow: rgba(245, 158, 11, 0.4);
            --cyan: #06b6d4; --success: #10b981; --danger: #ef4444;
            --text-main: #f8fafc; --text-dim: #94a3b8;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-dark); background-image: var(--bg-glow); background-attachment: fixed; color: var(--text-main); margin: 0; padding-bottom: 120px; min-height: 100vh; overflow-x: hidden; transition: direction 0.3s; }
        h1, h2, h3, h4 { font-family: 'Space Grotesk', sans-serif; margin: 0 0 15px 0; letter-spacing: -0.5px; }
        .page { display: none; padding: 15px 20px; animation: fadeSlideUp 0.4s forwards; opacity: 0; transform: translateY(20px); }
        .page.active { display: block; }
        @keyframes fadeSlideUp { to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 24px; margin-bottom: 16px; }
        .dock-container { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 450px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 30px; display: flex; justify-content: space-between; padding: 8px 10px; z-index: 1000; }
        .dock-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: var(--text-dim); text-decoration: none; height: 54px; }
        .dock-item.active { color: var(--gold); }
        .game-btn { width: 100%; padding: 18px; border-radius: 16px; font-weight: 700; cursor: pointer; border: none; background: linear-gradient(135deg, var(--gold) 0%, #d97706 100%); color: #000; }
        .btn-outline { background: transparent; color: var(--gold); border: 2px solid var(--gold); }
        .glass-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; color: var(--gold); margin-bottom: 10px; outline: none; }
        .task-card { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 16px 20px; border-radius: 20px; margin-bottom: 12px; }
        .airdrop-item { display: flex; flex-direction: column; padding: 12px; background: rgba(139, 92, 246, 0.05); margin-bottom: 8px; border-radius: 12px; position: relative; border-bottom: 1px solid rgba(139, 92, 246, 0.3); }
        .shake-box { animation: shake 0.5s infinite; }
        @keyframes shake { 0% { transform: rotate(0deg); } 25% { transform: rotate(5deg); } 50% { transform: rotate(0eg); } 75% { transform: rotate(-5deg); } 100% { transform: rotate(0deg); } }
    </style>
</head>
<body>
    <div id="loader" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-dark); display:flex; justify-content:center; align-items:center; z-index:9999;"><h2 style="color:var(--gold);">GELİR EVRENİ...</h2></div>

    <div class="header-panel" style="text-align:center; padding: 20px;">
        <div id="user-level" class="level-badge" style="color:var(--gold); font-weight:800;">BRONZ ÜYE</div>
        <div class="points" id="balance" style="font-size: 40px; font-weight:900;">0</div>
        <div style="color:var(--cyan); font-size:12px;">GEP BAKİYE</div>
    </div>

    <div id="page-tasks" class="page active">
        <h3 data-i18n="tasks_title">🎯 GÖREVLER</h3>
        <p style="font-size:12px; color:var(--text-dim); margin-bottom:20px;">Tüm görevler 1.000 GEP kazandırır.</p>
        <div id="task-list"></div>
    </div>

    <div id="page-arcade" class="page">
        <h3>🕹️ SİBER ARCADE</h3>
        <div class="glass-card" style="border-color:#10b981;">
            <div style="font-size:30px;">📦</div>
            <h4>Veri Kapsülleri</h4>
            <div id="lootbox-selection" style="display:flex; flex-direction:column; gap:8px;">
                <button id="lb-btn-1" class="game-btn btn-outline" onclick="playLootbox(1)">📦 Standart (1K)</button>
                <button id="lb-btn-2" class="game-btn btn-outline" onclick="playLootbox(2)">🎁 Nadir (5K)</button>
                <button id="lb-btn-3" class="game-btn btn-outline" onclick="playLootbox(3)">💎 Efsanevi (25K)</button>
            </div>
            <div id="lootbox-animation" style="display:none; text-align:center;">
                <div id="lootbox-icon" style="font-size:80px;">📦</div>
                <h4 id="lootbox-result">Açılıyor...</h4>
                <button class="game-btn btn-outline" onclick="resetLootbox()">GERİ</button>
            </div>
        </div>
    </div>

    <div id="page-profile" class="page">
        <div class="glass-card" style="border-color: #8b5cf6;">
            <h3 style="color: #8b5cf6; text-align:center;">📢 SİBER PANO</h3>
            <p style="font-size: 11px; color: var(--text-dim); text-align:center; margin-bottom:15px;">Kendi projenizi paylaşın. İlanınız Görevler listesine eklenir.</p>
            
            <input type="text" id="ad-title" class="glass-input" placeholder="Proje Adı (Örn: Blum Network)">
            <input type="text" id="ad-desc" class="glass-input" placeholder="Açıklama (Örn: Yeni Nesil Borsa Projesi)">
            <input type="text" id="ad-link" class="glass-input" placeholder="Referans Linkiniz (https://...)">
            
            <button class="game-btn" style="background:#8b5cf6; color:#fff;" onclick="postAirdrop()">YAYINLA (250K GEP)</button>
            
            <div id="airdrop-list" style="margin-top:20px; max-height:300px; overflow-y:auto;"></div>
        </div>
        
        <div class="glass-card" style="text-align:center;">
            <h4>HESAP BİLGİLERİ</h4>
            <div id="ref-link-box">
                <input type="text" id="ref-link" class="glass-input" readonly>
                <button class="game-btn btn-outline" onclick="copyRef()">LİNKİ KOPYALA</button>
            </div>
        </div>
    </div>

    <div class="dock-container">
        <a href="#" class="dock-item active" onclick="showPage('tasks', this)">📋 GÖREV</a>
        <a href="#" class="dock-item" onclick="showPage('arcade', this)">🕹️ OYUN</a>
        <a href="#" class="dock-item" onclick="showPage('profile', this)">👤 PROFİL</a>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand(); const API = window.location.origin;
        let user;

        async function init() {
            const tgUser = tg.initDataUnsafe?.user;
            const res = await fetch(`${API}/api/user/auth`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ telegramId: tgUser.id.toString(), username: tgUser.username || "", firstName: tgUser.first_name || "Kullanıcı", initData: tg.initData }) });
            const data = await res.json();
            if (data.success) { 
                user = data.user; 
                document.getElementById('ref-link').value = `https://t.me/gelirevreni_bot?start=${user.telegramId}`;
                updateUI(); loadTasks(); loadAirdrops();
            }
            document.getElementById('loader').style.display = 'none';
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(user.points).toLocaleString();
            document.getElementById('user-level').innerText = `${user.level} ÜYE`;
            
            // Kutu butonları kontrolü
            const now = new Date();
            const check = (date) => (now - new Date(date || 0)) / (1000 * 60 * 60) < 24;
            document.getElementById('lb-btn-1').disabled = check(user.lastLootbox1);
            document.getElementById('lb-btn-2').disabled = check(user.lastLootbox2);
            document.getElementById('lb-btn-3').disabled = check(user.lastLootbox3);
        }

        async function loadTasks() {
            const res = await fetch(`${API}/api/tasks`);
            const data = await res.json();
            const list = document.getElementById('task-list');
            list.innerHTML = data.tasks.map(t => {
                const isDone = user.completedTasks.includes(t.taskId);
                return `<div class="task-card" style="${isDone ? 'opacity:0.5' : ''}">
                    <div><b>${t.title}</b><br><small>+${t.reward} GEP</small></div>
                    <button class="game-btn btn-outline" style="width:auto; padding:10px;" ${isDone ? 'disabled' : ''} onclick="doTask('${t.taskId}', '${t.target}')">${isDone ? 'TAMAM' : 'GİT'}</button>
                </div>`;
            }).join('');
        }

        async function doTask(id, url) {
            tg.openLink(url);
            setTimeout(async () => {
                const res = await fetch(`${API}/api/tasks/complete`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ telegramId: user.telegramId, taskId: id, initData: tg.initData }) });
                const data = await res.json();
                if(data.success) { user.points = data.points; user.completedTasks.push(id); updateUI(); loadTasks(); }
            }, 5000);
        }

        async function postAirdrop() {
            const title = document.getElementById('ad-title').value;
            const desc = document.getElementById('ad-desc').value;
            const url = document.getElementById('ad-link').value;
            if(!title || !desc || !url) return tg.showAlert("Eksik bilgi!");
            
            const res = await fetch(`${API}/api/airdrop/share`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ telegramId: user.telegramId, title, description: desc, url, initData: tg.initData }) });
            const data = await res.json();
            if(data.success) { user.points = data.points; updateUI(); loadAirdrops(); loadTasks(); tg.showAlert(data.message); }
            else tg.showAlert(data.message);
        }

        async function loadAirdrops() {
            const res = await fetch(`${API}/api/airdrop/list`);
            const data = await res.json();
            document.getElementById('airdrop-list').innerHTML = data.links.map(l => `
                <div class="airdrop-item">
                    <span style="color:#8b5cf6; font-size:10px;">@${l.username}</span>
                    <b style="color:#fff;">${l.title}</b>
                    <small style="color:#94a3b8;">${l.description}</small>
                    <button class="game-btn btn-outline" style="margin-top:10px; padding:5px; font-size:10px;" onclick="tg.openLink('${l.url}')">REFERANS OL</button>
                </div>
            `).join('');
        }

        async function playLootbox(type) {
            document.getElementById('lootbox-selection').style.display = 'none';
            document.getElementById('lootbox-animation').style.display = 'block';
            const icon = document.getElementById('lootbox-icon');
            icon.classList.add('shake-box');

            const res = await fetch(`${API}/api/arcade/lootbox`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ telegramId: user.telegramId, boxType: type, initData: tg.initData }) });
            const data = await res.json();

            setTimeout(() => {
                icon.classList.remove('shake-box');
                if(data.success) {
                    user.points = data.points;
                    user.lastLootbox1 = data.lastLootbox1; user.lastLootbox2 = data.lastLootbox2; user.lastLootbox3 = data.lastLootbox3;
                    document.getElementById('lootbox-result').innerText = data.msg;
                    icon.innerText = "✨";
                    updateUI();
                } else { tg.showAlert(data.message); resetLootbox(); }
            }, 2000);
        }

        function resetLootbox() { document.getElementById('lootbox-selection').style.display = 'flex'; document.getElementById('lootbox-animation').style.display = 'none'; document.getElementById('lootbox-icon').innerText = "📦"; document.getElementById('lootbox-result').innerText = "Açılıyor..."; }
        function showPage(p, el) { document.querySelectorAll('.page').forEach(page => page.classList.remove('active')); document.querySelectorAll('.dock-item').forEach(nav => nav.classList.remove('active')); document.getElementById(`page-${p}`).classList.add('active'); el.classList.add('active'); }
        function copyRef() { document.getElementById('ref-link').select(); document.execCommand('copy'); tg.showAlert("Kopyalandı!"); }

        window.onload = init;
    </script>
</body>
</html>
