<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni V3</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #FFD700; --green: #00FF88; --dark: #050A14; --card: #0F1722; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; text-align: center; }
        .container { padding: 20px; }
        
        /* Bakiye Kartı - Görseldeki Gibi */
        .header { background: radial-gradient(circle at top, #1A2635, #0F1722); padding: 30px 10px; border-radius: 0 0 40px 40px; border-bottom: 2px solid var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .bal-title { font-size: 12px; color: #888; letter-spacing: 2px; }
        .bal-val { font-size: 45px; font-weight: 900; margin: 10px 0; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .bal-usd { color: var(--green); font-weight: bold; }

        /* İstatistikler */
        .stats { display: flex; justify-content: space-around; margin: 25px 0; }
        .s-box { background: var(--card); padding: 15px; border-radius: 20px; width: 40%; border: 1px solid #1E293B; }
        .s-box small { font-size: 10px; color: #666; display: block; }
        .s-box b { color: var(--gold); font-size: 18px; }

        /* 3D Yeşil Buton */
        .mine-btn { 
            background: linear-gradient(180deg, #00FF88 0%, #009955 100%); 
            color: #000; border: none; width: 100%; padding: 22px; border-radius: 25px; 
            font-size: 20px; font-weight: 900; cursor: pointer;
            box-shadow: 0 8px 0 #006633, 0 15px 25px rgba(0,255,136,0.2);
            transition: 0.1s; text-transform: uppercase;
        }
        .mine-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #006633; }
        .mine-btn:disabled { background: #333; box-shadow: 0 8px 0 #111; color: #666; }

        /* Görevler */
        .menu { background: var(--card); border-radius: 25px; margin-top: 30px; overflow: hidden; border: 1px solid #1E293B; }
        .item { display: flex; justify-content: space-between; padding: 20px; border-bottom: 1px solid #1E293B; cursor: pointer; }
        .item:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div class="header">
        <div class="bal-title">TOPLAM BAKİYE</div>
        <div id="balance" class="bal-val">0</div>
        <div class="bal-usd">~ $<span id="usd">0.00</span></div>
    </div>

    <div class="container">
        <div class="stats">
            <div class="s-box"><small>HIZ</small>+<b id="speed">50</b>/s</div>
            <div class="s-box"><small>SEVİYE</small><b id="lvl">1</b></div>
        </div>

        <button class="mine-btn" id="mbtn" onclick="mine()">Madenciliği Başlat</button>
        <div id="timer" style="margin-top:15px; color:#666; font-weight:bold;">READY</div>

        <div class="menu">
            <div class="item" onclick="alert('Liderler Yakında!')">🏆 Liderlik Tablosu <span>❯</span></div>
            <div class="item" onclick="copy()">🔗 Arkadaş Davet Et <span id="refs">0</span> <span>❯</span></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userId = new URLSearchParams(window.location.search).get('userid');

        async function load() {
            const res = await fetch('/api/user/' + userId);
            const u = await res.json();
            document.getElementById('balance').innerText = Math.floor(u.balance).toLocaleString();
            document.getElementById('usd').innerText = u.balanceUsd;
            document.getElementById('speed').innerText = u.speed;
            document.getElementById('lvl').innerText = u.level;
            document.getElementById('refs').innerText = u.refCount;

            if (u.lastMined) {
                const diff = Date.now() - new Date(u.lastMined).getTime();
                if (diff < 28800000) { // 8 saat
                    document.getElementById('mbtn').disabled = true;
                    let t = (28800000 - diff) / 1000;
                    setInterval(() => {
                        let h = Math.floor(t/3600), m = Math.floor((t%3600)/60), s = Math.floor(t%60);
                        document.getElementById('timer').innerText = `${h}:${m}:${s}`;
                        t--;
                    }, 1000);
                }
            }
        }
        async function mine() {
            await fetch('/api/mine', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId }) });
            location.reload();
        }
        function copy() {
            const link = `https://t.me/gelir_evreni_bot?start=${userId}`;
            const i = document.createElement('input'); i.value = link; document.body.appendChild(i); i.select(); document.execCommand('copy'); document.body.removeChild(i);
            tg.showAlert("Link kopyalandı!");
        }
        load();
    </script>
</body>
</html>
