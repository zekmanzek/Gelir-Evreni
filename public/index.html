<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b1e33; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .header { background: #112b4a; padding: 20px; border-bottom: 2px solid #ffd700; }
        .btn { background: #ffd700; color: black; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 80%; margin-top: 20px; font-size: 18px; cursor: pointer; }
        .btn:disabled { background: #444; color: #888; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="color:#ffd700; margin: 0;">GELİR EVRENİ</h2>
        <div id="balance" style="font-size:32px; font-weight:bold; margin-top:10px;">Yükleniyor...</div>
    </div>

    <div style="padding: 30px;">
        <img src="https://img.icons8.com/emoji/96/money-bag-emoji.png" width="120">
        <button class="btn" id="mine-btn" onclick="mine()">MADENCİLİĞİ BAŞLAT</button>
        <div id="timer" style="margin-top:15px; color:#ffd700; font-weight: bold;">Hazır</div>
        
        <hr style="margin: 40px 0; border: 0.5px solid #112b4a;">
        
        <button class="btn" style="background:#ff4757; color:white;" onclick="spin()">🎡 GÜNLÜK ÇARK</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // ID'yi Telegram'dan alıyoruz
        const userId = new URLSearchParams(window.location.search).get('userid') || tg.initDataUnsafe?.user?.id;

        async function load() {
            if (!userId) {
                document.getElementById('balance').innerText = "Giriş Hatası";
                return;
            }
            const res = await fetch('/api/user/' + userId);
            const user = await res.json();
            document.getElementById('balance').innerText = user.balance.toLocaleString() + " GEP";
            
            if (user.lastMined) {
                const diff = Date.now() - new Date(user.lastMined).getTime();
                const eightHours = 8 * 60 * 60 * 1000;
                if (diff < eightHours) {
                    document.getElementById('mine-btn').disabled = true;
                    document.getElementById('timer').innerText = "Madencilik Devam Ediyor";
                }
            }
        }

        async function mine() {
            await fetch('/api/mine', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ userId }) 
            });
            load();
        }

        async function spin() {
            const res = await fetch('/api/spin', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ userId }) 
            });
            const data = await res.json();
            alert("🎉 " + data.win + " GEP Kazandın!");
            load();
        }

        load();
    </script>
</body>
</html>
