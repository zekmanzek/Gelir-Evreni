<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelir Evreni</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #0b0e14; color: white; margin: 0; padding: 15px; overflow-x: hidden; }
        .stats-card { background: linear-gradient(135deg, #1c1f2e, #111420); padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; border: 1px solid #2d334a; }
        .points-val { font-size: 32px; font-weight: 800; color: #ffcc00; margin: 5px 0; }
        
        /* Çekim Butonu */
        .withdraw-btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; transition: 0.3s; }
        .withdraw-active { background: #00d4ff; color: #000; box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }
        .withdraw-passive { background: #2d334a; color: #8b949e; cursor: not-allowed; }

        .package-wrapper { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; -webkit-overflow-scrolling: touch; }
        .package-wrapper::-webkit-scrollbar { display: none; }
        .package-card { min-width: 100px; background: #1c1f2e; border: 2px solid #2d334a; border-radius: 15px; padding: 12px; text-align: center; cursor: pointer; flex-shrink: 0; transition: 0.2s; }
        .package-card.active { border-color: #00d4ff; background: #162a3d; }
        .package-card span { font-size: 11px; font-weight: bold; display: block; margin-top: 5px; }

        .task-card { background: #161b22; border: 1px solid #30363d; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .task-info h4 { margin: 0; font-size: 14px; color: #e6edf3; }
        .task-info p { margin: 4px 0 0; font-size: 12px; color: #ffcc00; }
        
        .btn { padding: 8px 18px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn-yap { background: #ffcc00; color: #000; }
        .btn-bekle { background: #30363d; color: #8b949e; cursor: not-allowed; }
        .btn-tamam { background: #238636; color: white; }

        /* Modal Stili */
        #withdraw-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1c1f2e; padding: 25px; border-radius: 20px; width: 80%; text-align: center; border: 1px solid #2d334a; }
        .modal-content input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid #30363d; background: #0b0e14; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="stats-card">
        <div style="font-size: 11px; color: #8b949e;">GEP BAKİYE</div>
        <div class="points-val" id="user-points">0</div>
        <div style="font-size: 12px; color: #00d4ff; margin-bottom: 10px;" id="usd-val">≈ 0.00 USDT</div>
        <button id="main-withdraw-btn" class="withdraw-btn withdraw-passive" onclick="openWithdrawModal()">💸 Para Çekme Talebi</button>
    </div>

    <div class="package-wrapper" id="package-list"></div>
    <div style="font-size: 14px; color: #8b949e; margin-bottom: 15px; font-weight: bold;" id="cat-name">Yükleniyor...</div>
    <div id="tasks-container"></div>

    <div id="withdraw-modal">
        <div class="modal-content">
            <h3 style="margin:0;">Para Çekme</h3>
            <p style="font-size: 12px; color: #8b949e;">Minimum 500,000 GEP gereklidir. USDT BEP-20 adresinizi girin.</p>
            <input type="text" id="wallet-addr" placeholder="0x...">
            <button class="btn btn-yap" style="width:100%; margin-bottom:10px;" onclick="submitWithdraw()">TALEBİ GÖNDER</button>
            <button class="btn" style="background:transparent; color:#8b949e;" onclick="closeModal()">İptal</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let allTasks = [];
        let userData = null;
        let activeCategory = "Topluluğumuz";

        async function loadData() {
            const response = await fetch('/api/user/auth', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ initData: tg.initData }) });
            const data = await response.json();
            userData = data.user;
            
            document.getElementById('user-points').innerText = userData.points.toLocaleString();
            document.getElementById('usd-val').innerText = `≈ ${(userData.points / 10000).toFixed(2)} USDT`;

            // Çekim butonu kontrolü
            const wBtn = document.getElementById('main-withdraw-btn');
            if(userData.points >= 500000) {
                wBtn.className = "withdraw-btn withdraw-active";
                wBtn.disabled = false;
            } else {
                wBtn.className = "withdraw-btn withdraw-passive";
                wBtn.disabled = true;
            }

            const taskRes = await fetch('/api/tasks');
            const taskData = await taskRes.json();
            allTasks = taskData.tasks;
            renderPackages();
            renderTasks(activeCategory);
        }

        function openWithdrawModal() {
            if(userData.points < 500000) return;
            document.getElementById('withdraw-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('withdraw-modal').style.display = 'none';
        }

        async function submitWithdraw() {
            const addr = document.getElementById('wallet-addr').value;
            if(addr.length < 10) { alert("Geçerli bir cüzdan adresi girin!"); return; }

            const res = await fetch('/api/withdraw', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    telegramId: userData.telegramId,
                    walletAddress: addr,
                    amount: userData.points
                })
            });
            const result = await res.json();
            if(result.success) {
                alert("Talebiniz Mehmet Bey'e iletildi. Kontrollerden sonra ödemeniz yapılacaktır.");
                closeModal();
            }
        }

        function renderPackages() {
            const container = document.getElementById('package-list');
            const order = ["Başlangıç Görevleri", "Topluluğumuz", "Airdroplar", "Sürpriz Görevler"];
            const icons = {"Başlangıç Görevleri": "⭐", "Topluluğumuz": "👥", "Airdroplar": "🪂", "Sürpriz Görevler": "🎁"};
            container.innerHTML = '';
            order.forEach(cat => {
                const card = document.createElement('div');
                card.className = `package-card ${activeCategory === cat ? 'active' : ''}`;
                card.onclick = () => { activeCategory = cat; renderPackages(); renderTasks(cat); };
                card.innerHTML = `<div>${icons[cat] || '📁'}</div><span>${cat}</span>`;
                container.appendChild(card);
            });
        }

        function renderTasks(category) {
            document.getElementById('cat-name').innerText = category;
            const container = document.getElementById('tasks-container');
            container.innerHTML = '';
            allTasks.filter(t => t.category === category).forEach(task => {
                const isCompleted = userData.completedTasks.includes(task.taskId);
                const isPending = userData.pendingTasks.find(p => p.taskId === task.taskId);
                const div = document.createElement('div');
                div.className = 'task-card';
                let btn = `<button class="btn btn-yap" onclick="doTask('${task.taskId}', '${task.target}')">YAP</button>`;
                if (isCompleted) btn = `<button class="btn btn-tamam">✅</button>`;
                else if (isPending) btn = `<button class="btn btn-bekle">⌛ BEKLE</button>`;
                div.innerHTML = `<div class="task-info"><h4>${task.title}</h4><p>+${task.reward} GEP</p></div>${btn}`;
                container.appendChild(div);
            });
        }

        async function doTask(taskId, url) {
            if(url === "#") return;
            await fetch('/api/tasks/start', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ telegramId: userData.telegramId, taskId }) });
            window.open(url, '_blank');
            setTimeout(loadData, 1000);
        }
        loadData();
    </script>
</body>
</html>
