<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelir Evreni</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0b0e14; color: white; margin: 0; padding: 15px; }
        .stats-card { background: linear-gradient(135deg, #1c1f2e, #111420); padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; border: 1px solid #2d334a; }
        .points-val { font-size: 32px; font-weight: 800; color: #ffcc00; margin: 5px 0; }
        
        /* Çekim Butonu ve Bilgi */
        .withdraw-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .withdraw-active { background: #238636; color: white; box-shadow: 0 0 15px rgba(35, 134, 54, 0.3); }
        .withdraw-passive { background: #2d334a; color: #8b949e; cursor: not-allowed; opacity: 0.6; }
        .min-limit-info { font-size: 11px; color: #8b949e; margin-top: 8px; display: block; }

        .package-wrapper { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; }
        .package-card { min-width: 100px; background: #1c1f2e; border: 2px solid #2d334a; border-radius: 15px; padding: 12px; text-align: center; cursor: pointer; flex-shrink: 0; }
        .package-card.active { border-color: #00d4ff; background: #162a3d; }
        .task-card { background: #161b22; border: 1px solid #30363d; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        #withdraw-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1c1f2e; padding: 25px; border-radius: 20px; width: 85%; text-align: center; border: 1px solid #2d334a; }
        .modal-content input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid #30363d; background: #0b0e14; color: white; text-align: center; }
    </style>
</head>
<body>

    <div class="stats-card">
        <div style="font-size: 11px; color: #8b949e; letter-spacing: 1px;">GEP BAKİYE</div>
        <div class="points-val" id="user-points">0</div>
        <div style="font-size: 12px; color: #00d4ff;" id="usd-val">≈ 0.00 USDT</div>
        
        <button id="main-withdraw-btn" class="withdraw-btn withdraw-passive" onclick="openWithdrawModal()">💸 Para Çekme Talebi</button>
        <span class="min-limit-info">⚠️ Minimum çekim limiti: 500,000 GEP (5 USDT)</span>
    </div>

    <div class="package-wrapper" id="package-list"></div>
    <div id="tasks-container"></div>

    <div id="withdraw-modal">
        <div class="modal-content">
            <h3 style="margin:0; color:#ffcc00;">Talebi Gönder</h3>
            <p style="font-size: 12px; color: #8b949e; margin-top:10px;">USDT BEP-20 (Binance Smart Chain) cüzdan adresinizi giriniz.</p>
            <input type="text" id="wallet-addr" placeholder="0x...">
            <button class="withdraw-btn withdraw-active" style="width:100%;" onclick="submitWithdraw()">ONAYLA</button>
            <button style="background:none; border:none; color:#8b949e; margin-top:15px; cursor:pointer;" onclick="closeModal()">Vazgeç</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let userData = null;
        let allTasks = [];
        let activeCategory = "Topluluğumuz";

        async function loadData() {
            const response = await fetch('/api/user/auth', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ initData: tg.initData }) });
            const data = await response.json();
            userData = data.user;
            
            document.getElementById('user-points').innerText = userData.points.toLocaleString();
            document.getElementById('usd-val').innerText = `≈ ${(userData.points / 10000).toFixed(2)} USDT`;

            const wBtn = document.getElementById('main-withdraw-btn');
            if(userData.points >= 500000) {
                wBtn.className = "withdraw-btn withdraw-active";
            }

            const taskRes = await fetch('/api/tasks');
            const taskData = await taskRes.json();
            allTasks = taskData.tasks;
            renderPackages();
            renderTasks(activeCategory);
        }

        function openWithdrawModal() {
            if(userData.points < 500000) {
                tg.showAlert("⚠️ Çekim yapabilmek için 500,000 GEP bakiyeye ulaşmalısınız!");
                return;
            }
            document.getElementById('withdraw-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('withdraw-modal').style.display = 'none'; }

        async function submitWithdraw() {
            const addr = document.getElementById('wallet-addr').value;
            if(addr.length < 20) { tg.showAlert("❌ Lütfen geçerli bir cüzdan adresi girin!"); return; }

            const res = await fetch('/api/withdraw', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ telegramId: userData.telegramId, walletAddress: addr, amount: userData.points })
            });
            if(res.ok) {
                tg.showAlert("✅ Talebiniz başarıyla iletildi! Manuel kontrol sonrası ödemeniz yapılacaktır.");
                closeModal();
            }
        }

        function renderPackages() {
            const container = document.getElementById('package-list');
            const order = ["Başlangıç Görevleri", "Topluluğumuz", "Airdroplar", "Sürpriz Görevler"];
            const icons = {"Başlangıç Görevleri": "⭐", "Topluluğumuz": "👥", "Airdroplar": "🪂", "Sürpriz Görevler": "🎁"};
            container.innerHTML = '';
            order.forEach(cat => {
                const card = document.createElement('div');
                card.className = `package-card ${activeCategory === cat ? 'active' : ''}`;
                card.onclick = () => { activeCategory = cat; renderPackages(); renderTasks(cat); };
                card.innerHTML = `<div>${icons[cat]}</div><span style="font-size:11px;">${cat}</span>`;
                container.appendChild(card);
            });
        }

        function renderTasks(category) {
            const container = document.getElementById('tasks-container');
            container.innerHTML = '';
            allTasks.filter(t => t.category === category).forEach(task => {
                const isCompleted = userData.completedTasks.includes(task.taskId);
                const div = document.createElement('div');
                div.className = 'task-card';
                div.innerHTML = `<div class="task-info"><h4>${task.title}</h4><p>+${task.reward} GEP</p></div>
                <button class="btn ${isCompleted ? 'btn-tamam':'btn-yap'}" onclick="doTask('${task.taskId}','${task.target}')">${isCompleted ? '✅':'YAP'}</button>`;
                container.appendChild(div);
            });
        }

        loadData();
    </script>
</body>
</html>
