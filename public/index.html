<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni - Ultimate Hunt</title>
    <script src="https://telegram.org/js/telegram-web-app.js?v=3.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-gold: #FFD700; --neon-green: #00FF88; --glass: rgba(255, 255, 255, 0.04); }
        body { background: radial-gradient(circle at top right, #0A192F, #05070A); color: #E2E8F0; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
        .container { padding: 20px; padding-bottom: 120px; }
        .header { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 15px 0 35px 0; }
        .header h1 { font-family: 'Orbitron'; font-size: 22px; color: var(--neon-gold); text-shadow: 0 0 15px rgba(255,215,0,0.5); letter-spacing: 2px; }
        .main-display { background: var(--glass); backdrop-filter: blur(20px); border-radius: 40px; padding: 40px 20px; border: 1px solid rgba(255,215,0,0.2); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .chest-icon { font-size: 80px; animation: chestSpin 5s infinite ease-in-out; filter: drop-shadow(0 0 20px var(--neon-gold)); }
        @keyframes chestSpin { 0%, 100% { transform: rotateY(0deg); } 50% { transform: rotateY(180deg); } }
        .balance-amount { font-family: 'Orbitron'; font-size: 42px; font-weight: 900; margin: 10px 0; }
        .balance-usd { color: var(--neon-green); font-size: 20px; font-weight: 700; }
        .speed-badge { background: rgba(0, 255, 136, 0.1); border: 1px solid var(--neon-green); color: var(--neon-green); padding: 8px 18px; border-radius: 20px; margin-top: 15px; display: inline-block; font-family: 'Orbitron'; font-size: 14px; }
        .action-btn { background: linear-gradient(180deg, var(--neon-green) 0%, #008F4C 100%); width: 100%; padding: 22px; border-radius: 25px; border: none; color: #000; font-family: 'Orbitron'; font-weight: 900; font-size: 18px; margin-top: 30px; box-shadow: 0 8px 0 #005F32, 0 0 20px rgba(0,255,136,0.3); cursor: pointer; }
        .action-btn:disabled { background: #1E293B; box-shadow: none; color: #475569; }
        .page { display: none; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .task-item { background: var(--glass); padding: 15px; border-radius: 20px; margin-bottom: 10px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .task-info { flex: 1; margin-left: 15px; }
        .task-info h4 { margin: 0; font-size: 16px; color: #FFF; }
        .task-info p { margin: 0; font-size: 12px; color: var(--neon-green); font-weight: 700; }
        .task-btn { background: var(--neon-gold); border: none; padding: 10px 15px; border-radius: 12px; font-family: 'Orbitron'; font-weight: 900; font-size: 10px; min-width: 90px; cursor: pointer; color:#000; box-shadow: 0 4px 0 #B8860B; }
        .task-btn.checking { background: #334155 !important; color: #fff !important; box-shadow: none !important; animation: pulse 1s infinite; pointer-events: none; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .nav-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(10,25,47,0.9); backdrop-filter: blur(20px); display: flex; padding: 15px; border-radius: 30px; border: 1px solid rgba(255,215,0,0.2); z-index: 100; }
        .nav-link { flex: 1; text-align: center; color: #64748B; font-weight: 700; font-size: 12px; cursor: pointer; }
        .nav-link.active { color: var(--neon-gold); }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>GELİR EVRENİ</h1></div>
    <div id="home-page" class="page active">
        <div class="main-display">
            <div class="chest-icon">🎁</div>
            <div id="balance" class="balance-amount">0 GEP</div>
            <div class="balance-usd">≈ $<span id="usd">0.00</span></div>
            <div class="speed-badge">⚡ <span id="speed-calc">+50 GEP / Saat</span></div>
            <button class="action-btn" id="mbtn" onclick="mine()">🎯 HEMEN KAZAN</button>
            <div id="timer" style="margin-top:15px; font-size:14px; color:#64748B; font-family:'Orbitron';">SİSTEM ÇEVRİMİÇİ</div>
        </div>
    </div>
    <div id="earn-page" class="page">
        <h2 style="text-align:center; color:var(--neon-gold); font-family:'Orbitron';">GÖREVLER</h2>
        <div class="task-item" style="border: 1px solid var(--neon-gold);">
            <div style="font-size:24px;">🚀</div>
            <div class="task-info"><h4>Ekibi Büyüt</h4><p>Davet Başı +1000 GEP</p></div>
            <button class="task-btn" onclick="copyRef()">DAVET ET</button>
        </div>
        <div id="social-tasks-container"></div>
    </div>
    <div id="profile-page" class="page">
        <h2 style="text-align:center; color:var(--neon-gold); font-family:'Orbitron';">LİDERLER</h2>
        <div id="lb-list"></div>
    </div>
</div>
<div class="nav-bar">
    <div class="nav-link active" onclick="switchPage('home', this)">ÜS</div>
    <div class="nav-link" onclick="switchPage('earn', this)">GÖREVLER</div>
    <div class="nav-link" onclick="switchPage('profile', this)">LİDERLER</div>
</div>
<script>
    const tg = window.Telegram.WebApp;
    const userId = new URLSearchParams(window.location.search).get('userid') || "99";
    let currentUser = { balance: 0, refCount: 0, completedTasks: [] };

    const socialLinks = [
        { id: 's1', name: 'Kripto Tayfa', url: 'https://t.me/kriptotayfa' },
        { id: 's2', name: 'Gelir Evreni Proje', url: 'https://t.me/gelirevreniproje' },
        { id: 's3', name: 'Gelir Evreni', url: 'https://t.me/gelirevreni' },
        { id: 's4', name: 'Gelir Evreni Airdrop', url: 'https://t.me/gelirevreniairdrop' },
        { id: 's5', name: 'Kripto Tayfa Grup', url: 'https://t.me/kripto_tayfa' },
        { id: 's6', name: 'Gelir Evreni X', url: 'https://x.com/gelirevreni' },
        { id: 's7', name: 'Kripto Tayfa X', url: 'https://x.com/kriptotayfa' }
    ];

    async function init() {
        tg.expand();
        try {
            const res = await fetch(`/api/user/${userId}?t=${Date.now()}`);
            if (res.ok) {
                currentUser = await res.json();
                document.getElementById('balance').innerText = Math.floor(currentUser.balance || 0).toLocaleString() + ' GEP';
                document.getElementById('usd').innerText = ((currentUser.balance || 0) * 0.0001).toFixed(2);
                document.getElementById('speed-calc').innerText = `+${50 + (currentUser.refCount * 25)} GEP / Saat`;
                if (currentUser.lastMined) {
                    const diff = Date.now() - new Date(currentUser.lastMined).getTime();
                    if (diff < 28800000) { document.getElementById('mbtn').disabled = true; runTimer(28800000 - diff); }
                }
            }
            renderSocialTasks();
            loadLeaderboard();
        } catch (e) { console.error(e); }
    }

    function renderSocialTasks() {
        const container = document.getElementById('social-tasks-container');
        container.innerHTML = '';
        socialLinks.forEach(task => {
            const isDone = (currentUser.completedTasks || []).includes(task.id);
            container.innerHTML += `
                <div class="task-item">
                    <div style="font-size:24px;">${task.url.includes('x.com') ? '🐦' : '📢'}</div>
                    <div class="task-info"><h4>${task.name}</h4><p>+500 GEP</p></div>
                    <button class="task-btn" id="btn-${task.id}" ${isDone ? 'disabled' : ''} onclick="doTask('${task.url}', '${task.id}')">
                        ${isDone ? 'ALINDI' : 'KATIL'}
                    </button>
                </div>`;
        });
    }

    async function doTask(url, taskId) {
        const btn = document.getElementById(`btn-${taskId}`);
        tg.openLink(url);
        btn.innerText = "BEKLEYİN...";
        btn.classList.add('checking');
        
        setTimeout(() => {
            btn.classList.remove('checking');
            btn.innerText = "KONTROL ET";
            btn.onclick = () => verifyTask(taskId);
        }, 15000); // 15 Saniye bekleme
    }

    async function verifyTask(taskId) {
        tg.showConfirm("Görevi tamamladınız mı? Hatalı beyan ban sebebidir.", async (ok) => {
            if (ok) {
                const res = await fetch('/api/complete-social-task', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId, taskId })
                });
                if (res.ok) { tg.showAlert("500 GEP kazanıldı!"); init(); }
            }
        });
    }

    async function loadLeaderboard() {
        const res = await fetch(`/api/leaderboard/${userId}`);
        if (res.ok) {
            const data = await res.json();
            const list = document.getElementById('lb-list');
            list.innerHTML = `<div class="rank-row user-rank"><span>#${data.userRank} Sen</span><span>${Math.floor(currentUser.balance)} GEP</span></div>`;
            data.top50.slice(0, 10).forEach((u, i) => {
                list.innerHTML += `<div class="rank-row"><span>#${i+1} ${u.fullName || 'Avcı'}</span><span>${Math.floor(u.balance)} GEP</span></div>`;
            });
        }
    }

    function runTimer(ms) {
        let t = ms / 1000;
        const timerObj = setInterval(() => {
            let h = Math.floor(t/3600), m = Math.floor((t%3600)/60), s = Math.floor(t%60);
            document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if (--t < 0) { clearInterval(timerObj); document.getElementById('mbtn').disabled = false; document.getElementById('timer').innerText = "SİSTEM HAZIR"; }
        }, 1000);
    }

    async function mine() {
        await fetch('/api/mine', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId }) });
        init();
    }

    function switchPage(page, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(page + '-page').classList.add('active');
        el.classList.add('active');
    }

    function copyRef() {
        const link = `https://t.me/gelir_evreni_bot?start=${userId}`;
        const i = document.createElement('input'); i.value = link; document.body.appendChild(i); i.select(); 
        document.execCommand('copy'); document.body.removeChild(i);
        tg.showAlert("Link kopyalandı!");
    }

    init();
</script>
</body>
</html>
