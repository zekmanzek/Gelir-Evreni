<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni | Premium Web3</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-dark: #020617;
            --bg-glow: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 70%);
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --gold: #F59E0B;
            --gold-glow: rgba(245, 158, 11, 0.4);
            --cyan: #06b6d4;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-dark);
            background-image: var(--bg-glow);
            background-attachment: fixed;
            color: var(--text-main); 
            margin: 0; 
            padding-bottom: 120px; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        h1, h2, h3, h4 { font-family: 'Space Grotesk', sans-serif; margin: 0 0 15px 0; letter-spacing: -0.5px; }

        .lang-selector {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--gold);
            padding: 6px 12px;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            font-weight: 700;
            outline: none;
            backdrop-filter: blur(10px);
            z-index: 1000;
            cursor: pointer;
        }
        .lang-selector option { background: var(--bg-dark); color: var(--text-main); }

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease-out; }
        .loader-ring { width: 80px; height: 80px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; filter: drop-shadow(0 0 10px var(--gold-glow)); margin-bottom: 20px;}
        .loader-text { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 800; color: var(--gold); letter-spacing: 4px; animation: pulseText 1.5s infinite ease-in-out; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulseText { 0%, 100% { opacity: 0.6; filter: drop-shadow(0 0 5px var(--gold-glow)); } 50% { opacity: 1; filter: drop-shadow(0 0 15px var(--gold)); } }

        .announcement-container { background: linear-gradient(90deg, #ef4444, #f97316); color: #fff; overflow: hidden; white-space: nowrap; position: sticky; top: 0; z-index: 2000; height: 35px; display: none; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-weight: 800; font-size: 13px; letter-spacing: 1px;}
        .announcement-scroll { display: inline-block; padding-left: 100%; animation: marquee 25s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        .header-panel { 
            padding: 30px 20px 20px; text-align: center; position: relative;
            background: linear-gradient(180deg, rgba(15,23,42,0.8) 0%, transparent 100%);
        }
        .level-badge { 
            display: inline-block; padding: 6px 16px; border-radius: 20px;
            font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            margin-bottom: 15px; margin-top: 15px; color: var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .balance-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .balance-label { font-size: 12px; color: var(--text-dim); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
