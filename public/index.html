<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni | Komuta Merkezi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-deep: #020617; --gold: #ffcc00; --gold-glow: rgba(255, 204, 0, 0.4); --card-glass: rgba(15, 23, 42, 0.6); --border-glass: rgba(255, 255, 255, 0.08); --text-main: #f8fafc; --text-dim: #94a3b8; --danger: #ef4444; --success: #22c55e; }
        body { font-family: 'Urbanist', sans-serif; background-color: var(--bg-deep); color: var(--text-main); margin: 0; padding-bottom: 110px; min-height: 100vh; }
        .page { display: none; padding: 24px 16px; } .page.active { display: block; }
        .card { background: var(--card-glass); padding: 20px; border-radius: 24px; margin-bottom: 16px; border: 1px solid var(--border-glass); }
        .btn-full { width: 100%; padding: 18px; border-radius: 18px; background: linear-gradient(135deg, var(--gold) 0%, #ffaa00 100%); border: none; font-weight: 900; cursor: pointer; }
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(15, 23, 42, 0.9); display: flex; justify-content: space-around; padding: 10px; border-radius: 22px; border: 1px solid var(--border-glass); z-index: 1000; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>
    <div id="loader" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-deep); display:flex; justify-content:center; align-items:center; z-index:9999;">YÜKLENİYOR...</div>
    
    <div class="header" style="text-align:center; padding:30px;">
        <div id="user-level" style="font-size:12px; font-weight:900; color:var(--gold);">BRONZ ÜYE</div>
        <div id="balance" style="font-size:40px; font-weight:900;">0</div>
    </div>

    <div id="page-tasks" class="page active"><h3>🚀 Aktif Görevler</h3><div id="task-list"></div></div>
    <div id="page-leaderboard" class="page"><h3>🏆 Top 10</h3><div id="leader-list"></div></div>
    <div id="page-mine" class="page"><div class="card" style="text-align:center;"><h3>MADEN</h3><button class="btn-full" onclick="startMining()">BAŞLAT</button></div></div>
    <div id="page-profile" class="page">
        <div class="card"><button class="btn-full" onclick="showAd()">REKLAM İZLE</button></div>
        <div class="card"><button class="btn-full" onclick="claimDaily()">GÜNLÜK ÖDÜLÜ AL</button></div>
        <input type="text" id="ref-link" style="width:100%; padding:10px;" readonly>
    </div>
    <div id="page-admin" class="page"><h3>⚙️ ADMIN</h3><button onclick="loadAdminStats()">YENİLE</button><div id="admin-content"></div></div>

    <nav class="nav-bar">
        <a class="nav-item active" onclick="showPage('tasks', this)">GÖREV</a>
        <a class="nav-item" onclick="showPage('leaderboard', this)">LİSTE</a>
        <a class="nav-item" onclick="showPage('mine', this)">MADEN</a>
        <a class="nav-item" onclick="showPage('profile', this)">PROFİL</a>
        <a class="nav-item" id="nav-admin" style="display:none" onclick="showPage('admin', this)">ADMIN</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const API = window.location.origin;
        let user;
        const AdController = window.Adsgram ? window.Adsgram.init({ blockId: "27433" }) : null;

        async function init() {
            const tgUser = tg.initDataUnsafe?.user;
            const res = await fetch(`${API}/api/user/auth`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ telegramId:tgUser.id.toString(), username:tgUser.username, firstName:tgUser.first_name }) });
            const data = await res.json();
            user = data.user;
            document.getElementById('balance').innerText = user.points;
            if(data.isAdmin) document.getElementById('nav-admin').style.display = 'block';
            document.getElementById('loader').style.display = 'none';
        }

        async function showAd() {
            if(!AdController) return alert("Reklam hazır değil.");
            AdController.show().then(async (result) => {
                if (result.done) {
                    const res = await fetch(`${API}/api/adsgram-reward`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ telegramId:user.telegramId }) });
                    if(res.ok) { alert("Ödül eklendi!"); init(); }
                }
            });
        }

        async function claimDaily() {
            const res = await fetch(`${API}/api/daily-reward`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ telegramId:user.telegramId }) });
            const data = await res.json();
            if(data.success) { alert("Ödül alındı!"); init(); }
            else alert(data.message);
        }

        function showPage(p, el) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            document.getElementById(`page-${p}`).classList.add('active');
            el.classList.add('active');
        }

        // Admin Yardımcıları
        async function loadAdminStats() {
            const res = await fetch(`${API}/api/admin/stats`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ adminId: user.telegramId }) });
            const data = await res.json();
            document.getElementById('admin-content').innerText = "Toplam Üye: " + data.totalUsers;
        }

        window.onload = init;
    </script>
</body>
</html>
