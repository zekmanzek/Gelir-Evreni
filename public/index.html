<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const API = window.location.origin;
    let user, tasks = [], miningInterval;
    
    const AdController = window.Adsgram ? window.Adsgram.init({ blockId: "27433" }) : null;

    async function init() {
        try {
            const tgUser = tg.initDataUnsafe?.user;
            if (!tgUser) {
                alert("Lütfen uygulamayı Telegram üzerinden açın.");
                return;
            }

            const res = await fetch(`${API}/api/user/auth`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    telegramId: tgUser.id.toString(), 
                    username: tgUser.username || "", 
                    firstName: tgUser.first_name || "Kullanıcı" 
                })
            });

            const data = await res.json();
            if (data.success) {
                user = data.user;
                user.isAdmin = data.isAdmin;
                
                if(user.isBanned) {
                    document.body.innerHTML = "<div style='display:flex; height:100vh; align-items:center; justify-content:center; flex-direction:column; text-align:center;'><h1 style='color:white;'>🚫 Erişim Reddedildi</h1><p style='color:red;'>Hesabınız yasaklanmıştır.</p></div>";
                    return;
                }

                document.getElementById('ref-link').value = `https://t.me/${data.botUsername}?start=${user.telegramId}`;
                if(user.isAdmin) document.getElementById('nav-admin').style.display = 'flex';

                await refreshTasks();
                updateUI();
                checkMiningTimer();
                renderStreak();
                if (data.announcements) renderAnnouncements(data.announcements);
            }
        } catch (e) { 
            console.error("Init Error:", e);
        } finally {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                if(loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 600);
                }
            }, 800);
        }
    }

    // --- GÜNLÜK ÖDÜL SİSTEMİ ---
    async function claimDaily() {
        const btn = document.getElementById('btn-checkin');
        btn.disabled = true;
        try {
            const res = await fetch(`${API}/api/daily-checkin`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.telegramId })
            });
            const data = await res.json();
            if(data.success) {
                user.points = data.points;
                user.streak = data.streak;
                user.lastCheckin = new Date().toISOString();
                updateUI();
                renderStreak();
                tg.showAlert(`🎁 Tebrikler! ${data.reward} GEP alındı. Streak: ${data.streak}/7`);
            } else {
                tg.showAlert(data.message);
            }
        } catch(e) { console.error(e); }
        btn.disabled = false;
    }

    // --- ADMIN SİLME VE EKLEME İŞLEMLERİ ---
    async function deleteAnnouncement(index) {
        if(!confirm("Bu duyuruyu silmek istiyor musunuz?")) return;
        const res = await fetch(`${API}/api/admin/delete-announcement`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ adminId: user.telegramId, index: index })
        });
        const data = await res.json();
        if(data.success) {
            tg.showAlert("Duyuru silindi.");
            loadAdminStats();
        }
    }

    async function deleteTask(tid) {
        if(!confirm("Bu görevi silmek istiyor musunuz?")) return;
        const res = await fetch(`${API}/api/admin/delete-task`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ adminId: user.telegramId, taskId: tid })
        });
        const data = await res.json();
        if(data.success) {
            tg.showAlert("Görev silindi.");
            loadAdminStats();
            refreshTasks();
        }
    }

    async function addAnnouncement() {
        const text = document.getElementById('adm-ann-text').value;
        if(!text) return;
        const res = await fetch(`${API}/api/admin/add-announcement`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ adminId: user.telegramId, text: text })
        });
        const data = await res.json();
        if(data.success) {
            document.getElementById('adm-ann-text').value = '';
            tg.showAlert("Duyuru yayınlandı.");
            loadAdminStats();
        }
    }

    // --- DİĞER FONKSİYONLAR (MEVCUT) ---
    function renderAnnouncements(annList) {
        const annContainer = document.getElementById('ann-container');
        const annScroll = document.getElementById('ann-scroll');
        if (annList && annList.length > 0) {
            annScroll.innerText = annList.join(" 📢 ") + " 📢 ";
            annContainer.style.display = 'flex';
        } else {
            annContainer.style.display = 'none';
        }
    }

    function updateUI() {
        if (!user) return;
        document.getElementById('balance').innerText = Math.floor(user.points).toLocaleString();
        document.getElementById('usd').innerText = `≈ ${(user.points / 100000).toFixed(2)} USDT`;
        const lvl = document.getElementById('user-level');
        lvl.innerText = `${user.level} ÜYE`;
        lvl.className = `level-badge level-${user.level}`;
        if (document.getElementById('stat-ref-count')) {
            document.getElementById('stat-ref-count').innerText = user.referralCount || 0;
        }
    }

    async function showAd() {
        if(!AdController) return tg.showAlert("Reklam hazır değil.");
        AdController.show().then(async (result) => {
            if (result.done) {
                const res = await fetch(`${API}/api/adsgram-reward`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ telegramId: user.telegramId })
                });
                if (res.ok) {
                    tg.showAlert("🎉 Reklam ödülü eklendi!");
                    init(); 
                }
            }
        }).catch(() => tg.showAlert("Reklam yüklenemedi."));
    }

    async function startMining() {
        const btn = document.getElementById('btn-mine');
        btn.disabled = true;
        try {
            const res = await fetch(`${API}/api/mine`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.telegramId })
            });
            const data = await res.json();
            if(data.success) { 
                user.points = data.points; 
                user.lastMining = new Date().toISOString();
                updateUI(); 
                tg.showAlert(`🚀 Maden kazıldı! +${data.reward} GEP.`);
                runTimer(4 * 60 * 60 * 1000);
            } else { 
                tg.showAlert(data.message); 
                btn.disabled = false;
            }
        } catch(e) { btn.disabled = false; }
    }

    function runTimer(timeLeft) {
        const btn = document.getElementById('btn-mine');
        const timerDiv = document.getElementById('mining-timer');
        const statusText = document.getElementById('mine-status-text');
        btn.disabled = true;
        timerDiv.style.display = "block";
        statusText.innerText = "YENİ MADEN İÇİN:";
        clearInterval(miningInterval);
        miningInterval = setInterval(() => {
            timeLeft -= 1000;
            if (timeLeft <= 0) {
                clearInterval(miningInterval);
                btn.disabled = false;
                timerDiv.style.display = "none";
                statusText.innerText = "Maden Hazır";
                return;
            }
            const h = Math.floor(timeLeft / 3600000);
            const m = Math.floor((timeLeft % 3600000) / 60000);
            const s = Math.floor((timeLeft % 60000) / 1000);
            timerDiv.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);
    }

    function checkMiningTimer() {
        if (!user.lastMining || new Date(user.lastMining).getTime() === 0) return;
        const cooldown = 4 * 60 * 60 * 1000;
        const diff = new Date().getTime() - new Date(user.lastMining).getTime();
        if (diff < cooldown) runTimer(cooldown - diff);
    }

    async function refreshTasks() {
        const tRes = await fetch(`${API}/api/tasks`);
        const tData = await tRes.json();
        tasks = tData.tasks || [];
        renderTasks();
    }

    function renderTasks() {
        const cont = document.getElementById('task-list');
        if(!cont) return;
        cont.innerHTML = '';
        tasks.forEach(t => {
            const done = user.completedTasks.includes(t.taskId);
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div>
                    <h4 style="margin:0; font-size:15px;">${t.title}</h4>
                    <p style="margin:5px 0 0; color:var(--gold); font-weight:800;">+${t.reward} GEP</p>
                </div>
                <button style="background:${done ? '#1e293b' : 'var(--gold)'}; color:${done ? '#475569' : '#000'}; border:none; padding:10px 20px; border-radius:12px; font-weight:900;" 
                    ${done ? 'disabled' : ''} onclick="completeTask('${t.taskId}','${t.target}')">
                    ${done ? 'BİTTİ' : 'GİT'}
                </button>`;
            cont.appendChild(div);
        });
    }

    async function completeTask(tid, link) {
        tg.openLink(link);
        setTimeout(async () => {
            const res = await fetch(`${API}/api/tasks/complete`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.telegramId, taskId: tid })
            });
            const data = await res.json();
            if(data.success) { 
                user.points = data.points; 
                user.completedTasks.push(tid); 
                updateUI(); 
                renderTasks(); 
                tg.showAlert("Ödül hesabına eklendi!");
            }
        }, 4000);
    }

    async function loadAdminStats() {
        const res = await fetch(`${API}/api/admin/stats`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ adminId: user.telegramId })
        });
        const data = await res.json();
        document.getElementById('adm-stat-users').innerText = data.totalUsers;
        document.getElementById('adm-stat-points').innerText = data.totalPoints.toLocaleString();
        
        document.getElementById('adm-task-list').innerHTML = data.tasks.map(t => `
            <div class="admin-list-item">
                <span>${t.title}</span>
                <button class="btn-small btn-danger" onclick="deleteTask('${t.taskId}')">SİL</button>
            </div>
        `).join('') || "Görev yok.";

        document.getElementById('adm-ann-list').innerHTML = data.announcements.map((a, i) => `
            <div class="admin-list-item">
                <span style="font-size:11px;">${a.substring(0,30)}...</span>
                <button class="btn-small btn-danger" onclick="deleteAnnouncement(${i})">SİL</button>
            </div>
        `).join('') || "Duyuru yok.";
    }

    async function addTask() {
        const title = document.getElementById('adm-task-title').value;
        const reward = document.getElementById('adm-task-reward').value;
        const target = document.getElementById('adm-task-target').value;
        if(!title || !reward || !target) return;
        await fetch(`${API}/api/admin/add-task`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ adminId: user.telegramId, title, reward, target })
        });
        tg.showAlert("Görev eklendi.");
        loadAdminStats();
        refreshTasks();
    }

    async function manageUser(action) {
        const targetId = document.getElementById('adm-target-id').value;
        const amount = document.getElementById('adm-amount').value;
        const res = await fetch(`${API}/api/admin/user-manage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ adminId: user.telegramId, targetId, action, amount })
        });
        const data = await res.json();
        tg.showAlert(data.success ? "İşlem Tamam" : "Hata!");
        loadAdminStats();
    }

    function showPage(p, el) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        document.getElementById(`page-${p}`).classList.add('active');
        el.classList.add('active');
        if(p === 'leaderboard') loadLeaderboard();
        if(p === 'admin') loadAdminStats();
    }

    async function loadLeaderboard() {
        const list = document.getElementById('leader-list');
        const res = await fetch(`${API}/api/leaderboard`);
        const data = await res.json();
        list.innerHTML = data.leaderboard.map((u, i) => `
            <div class="card" style="margin:0; border-radius:0; border-bottom:1px solid var(--border-glass)">
                <span>${i+1}. ${u.username || u.firstName}</span>
                <span style="color:var(--gold)">${u.points.toLocaleString()} GEP</span>
            </div>
        `).join('');
    }

    function renderStreak() {
        const streakBox = document.getElementById('streak-box');
        if(!streakBox) return;
        streakBox.innerHTML = '';
        for (let i = 1; i <= 7; i++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = `streak-day ${i <= (user.streak || 0) ? 'completed' : ''}`;
            dayDiv.innerHTML = `<div>GÜN ${i}</div><div style="font-weight:900">🎁</div>`;
            streakBox.appendChild(dayDiv);
        }
    }

    function copyRef() {
        const input = document.getElementById('ref-link');
        input.select();
        document.execCommand('copy');
        tg.showAlert("✅ Davet linki kopyalandı!");
    }

    window.onload = init;
</script>
