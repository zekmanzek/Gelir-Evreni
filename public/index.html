<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni | Premium Web3</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-dark: #020617;
            --bg-glow: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 70%);
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --gold: #F59E0B;
            --gold-glow: rgba(245, 158, 11, 0.4);
            --cyan: #06b6d4;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-dark);
            background-image: var(--bg-glow);
            background-attachment: fixed;
            color: var(--text-main); 
            margin: 0; 
            padding-bottom: 120px; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        h1, h2, h3, h4 { font-family: 'Space Grotesk', sans-serif; margin: 0 0 15px 0; letter-spacing: -0.5px; }

        /* YENİ: Sade Dil Seçici */
        .lang-selector {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--gold);
            padding: 6px 12px;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            font-weight: 700;
            outline: none;
            backdrop-filter: blur(10px);
            z-index: 1000;
            cursor: pointer;
        }
        .lang-selector option { background: var(--bg-dark); color: var(--text-main); }

        /* Premium Loader & Brand Text */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease-out; }
        .loader-ring { width: 80px; height: 80px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; filter: drop-shadow(0 0 10px var(--gold-glow)); margin-bottom: 20px;}
        .loader-text { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 800; color: var(--gold); letter-spacing: 4px; animation: pulseText 1.5s infinite ease-in-out; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulseText { 0%, 100% { opacity: 0.6; filter: drop-shadow(0 0 5px var(--gold-glow)); } 50% { opacity: 1; filter: drop-shadow(0 0 15px var(--gold)); } }

        .announcement-container { background: linear-gradient(90deg, #ef4444, #f97316); color: #fff; overflow: hidden; white-space: nowrap; position: sticky; top: 0; z-index: 2000; height: 35px; display: none; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-weight: 800; font-size: 13px; letter-spacing: 1px;}
        .announcement-scroll { display: inline-block; padding-left: 100%; animation: marquee 25s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        /* Game HUD (Header) */
        .header-panel { 
            padding: 30px 20px 20px; text-align: center; position: relative;
            background: linear-gradient(180deg, rgba(15,23,42,0.8) 0%, transparent 100%);
        }
        .level-badge { 
            display: inline-block; padding: 6px 16px; border-radius: 20px;
            font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            margin-bottom: 15px; margin-top: 15px; color: var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .balance-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .balance-label { font-size: 12px; color: var(--text-dim); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        .points-row { display: flex; align-items: baseline; gap: 8px; filter: drop-shadow(0 0 20px var(--gold-glow)); }
        .points { font-family: 'Space Grotesk', sans-serif; font-size: 52px; font-weight: 700; line-height: 1; }
        .currency { font-size: 20px; font-weight: 800; color: var(--gold); }
        .usd-val { font-size: 14px; color: var(--cyan); margin-top: 8px; font-weight: 600; background: rgba(6, 182, 212, 0.1); padding: 4px 12px; border-radius: 12px;}

        /* Sayfa Geçişleri */
        .page { display: none; padding: 15px 20px; animation: fadeSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
        .page.active { display: block; }
        @keyframes fadeSlideUp { to { opacity: 1; transform: translateY(0); } }

        /* Premium Glassmorphism Kartlar */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: transform 0.3s ease;
        }

        /* Yüzen Cam Navigasyon */
        .dock-container {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 400px;
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px; 
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 1000;
        }
        .dock-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-dim); text-decoration: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            height: 54px; border-radius: 20px; position: relative;
        }
        .dock-icon { font-size: 22px; margin-bottom: 4px; transition: transform 0.3s; filter: grayscale(100%) opacity(0.7); }
        .dock-text { font-size: 10px; font-weight: 800; letter-spacing: 0.5px; opacity: 0; transform: translateY(5px); transition: all 0.3s; position: absolute; bottom: 6px; }
        
        .dock-item.active { background: rgba(255,255,255,0.05); color: var(--gold); }
        .dock-item.active .dock-icon { transform: translateY(-8px) scale(1.1); filter: grayscale(0%) drop-shadow(0 0 8px var(--gold-glow)); }
        .dock-item.active .dock-text { opacity: 1; transform: translateY(0); }

        /* Oyun Butonları */
        .game-btn {
            width: 100%; padding: 18px; border-radius: 16px;
            font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase; cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: none;
            background: linear-gradient(135deg, var(--gold) 0%, #d97706 100%);
            color: #000; box-shadow: 0 4px 15px var(--gold-glow), inset 0 -3px 0 rgba(0,0,0,0.2);
        }
        .game-btn:active { transform: scale(0.96) translateY(2px); box-shadow: 0 2px 5px var(--gold-glow), inset 0 -1px 0 rgba(0,0,0,0.2); }
        .game-btn:disabled { background: #1e293b; color: #475569; box-shadow: none; cursor: not-allowed; transform: none; }

        .btn-outline { background: transparent; color: var(--gold); border: 2px solid var(--gold); box-shadow: none; }
        .btn-outline:active { background: rgba(245, 158, 11, 0.1); }
        
        .btn-success { background: linear-gradient(135deg, var(--success) 0%, #059669 100%); color: #fff; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3), inset 0 -3px 0 rgba(0,0,0,0.2); }
        .btn-danger { background: var(--danger); color: #fff; box-shadow: none; }

        .glass-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px; color: var(--gold); font-family: 'Space Grotesk', sans-serif; font-size: 14px; text-align: center; margin-bottom: 15px; outline: none; transition: 0.3s; font-weight: 700; }
        .glass-input:focus { border-color: var(--gold); background: rgba(245, 158, 11, 0.05); }

        /* Sıralama Sekmeleri */
        .tab-container { display: flex; gap: 8px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 6px; border-radius: 16px; border: 1px solid var(--glass-border); }
        .tab-btn { flex: 1; padding: 12px 0; border-radius: 12px; font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 700; background: transparent; border: none; color: var(--text-dim); cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .tab-btn.active { background: var(--glass-bg); color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid var(--glass-border); }

        /* Sıralama & Görev Listeleri */
        .list-row { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid var(--glass-border); }
        .list-row:last-child { border-bottom: none; }
        .rank-top { background: linear-gradient(90deg, rgba(245, 158, 11, 0.1), transparent); border-left: 3px solid var(--gold); border-radius: 8px; margin-bottom: 4px;}

        .task-card { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 16px 20px; border-radius: 20px; margin-bottom: 12px; }
        
        /* Interactive Core (Maden Ekrani) */
        .core-container { position: relative; width: 220px; height: 220px; margin: 20px auto 40px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .core-glow { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%); animation: pulse 3s infinite; }
        .core-button { font-size: 80px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2; user-select: none; }
        .core-container:active .core-button { transform: scale(0.9); }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(0.95); opacity: 0.5; } }

        /* Floating Animation (Uçuşan Rakamlar) */
        @keyframes floatUpFade { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-80px) scale(1.2); } }
        .floating-text { position: fixed; font-family: 'Space Grotesk', sans-serif; font-weight: 900; font-size: 28px; pointer-events: none; animation: floatUpFade 1s ease-out forwards; z-index: 9999; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: rgba(255,255,255,0.02); padding: 16px; text-align: center; border-radius: 20px; border: 1px solid var(--glass-border); }
        .stat-val { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 700; color: #fff; margin-top: 4px; }

        .streak-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin: 20px 0; }
        .streak-day { background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 12px 0; text-align: center; border-radius: 12px; }
        .streak-day.completed { background: rgba(16, 185, 129, 0.1); border-color: var(--success); }
    </style>
</head>
<body>
    <div id="ann-container" class="announcement-container">
        <div id="ann-scroll" class="announcement-scroll"></div>
    </div>
    
    <div id="loader">
        <div class="loader-ring"></div>
        <div class="loader-text" data-i18n="loading">GELİR EVRENİ</div>
    </div>

    <div class="header-panel">
        <select class="lang-selector" id="lang-select" onchange="changeLanguage(this.value)">
            <option value="tr">🇹🇷 TR</option>
            <option value="az">🇦🇿 AZ</option>
        </select>

        <div id="user-level" class="level-badge" data-i18n="loading_text">YÜKLENİYOR...</div>
        <div class="balance-wrapper">
            <div class="balance-label" data-i18n="current_balance">GÜNCEL BAKİYE</div>
            <div class="points-row">
                <div class="points" id="balance">0</div>
                <div class="currency">GEP</div>
            </div>
            <div class="usd-val" id="usd">≈ 0.00 USDT</div>
            <div style="font-size: 12px; color: var(--text-dim); margin-top: 10px;" id="header-name">@KULLANICI</div>
        </div>
    </div>

    <div id="page-tasks" class="page active">
        <div style="display: flex; align-items: center; margin-bottom: 20px;">
            <div style="font-size: 24px; margin-right: 10px; margin-left: 10px;">🎯</div>
            <div>
                <h3 style="margin: 0; color: #fff;" data-i18n="tasks_title">GÖREVLER</h3>
                <p style="font-size: 12px; margin: 0; color: var(--text-dim);" data-i18n="tasks_desc">Tamamla ve kazan.</p>
            </div>
        </div>
        <div id="task-list"></div>
    </div>

    <div id="page-leaderboard" class="page">
        <div style="display: flex; align-items: center; margin-bottom: 15px;">
            <div style="font-size: 24px; margin-right: 10px; margin-left: 10px;">🏆</div>
            <h3 style="margin: 0; color: #fff;" data-i18n="champions">ŞAMPİYONLAR AĞI</h3>
        </div>
        <div class="tab-container">
            <button id="tab-lb-all" class="tab-btn active" onclick="switchLB('all')" data-i18n="top_100">TOP 100</button>
            <button id="tab-lb-daily" class="tab-btn" onclick="switchLB('daily')" data-i18n="daily">GÜNLÜK</button>
            <button id="tab-lb-yesterday" class="tab-btn" onclick="switchLB('yesterday')" data-i18n="yesterday">DÜNÜN KRALLARI</button>
        </div>
        <div class="glass-card" style="padding: 0; overflow: hidden;">
            <div id="leader-list" style="width: 100%;"></div>
        </div>
    </div>

    <div id="page-mine" class="page">
        <div class="stat-grid">
            <div class="stat-box">
                <div class="balance-label" data-i18n="engine_lvl">MOTOR SEVİYESİ</div>
                <div id="ui-mine-level" class="stat-val" style="color: var(--gold);">1</div>
            </div>
            <div class="stat-box">
                <div class="balance-label" data-i18n="capacity">KAPASİTE (4H)</div>
                <div id="ui-mine-reward" class="stat-val" style="color: var(--cyan);">1,000</div>
            </div>
        </div>

        <div class="glass-card" style="text-align: center; padding: 40px 20px;">
            <div class="core-container" onclick="startMining(event)">
                <div class="core-glow" id="core-glow"></div>
                <div class="core-button" id="mine-icon">⛏️</div>
            </div>
            
            <h3 id="mine-status-text" style="color: #fff; letter-spacing: 1px;" data-i18n="sys_ready">SİSTEM HAZIR</h3>
            <div id="mining-timer" style="font-family: 'Space Grotesk'; font-size: 40px; font-weight: 700; color: var(--gold); margin: 10px 0; display: none;">00:00:00</div>
            
            <button id="btn-mine" class="game-btn" style="margin-top: 10px;" onclick="startMining(event)" data-i18n="start_mine">ÜRETİMİ BAŞLAT</button>
            
            <button id="btn-upgrade" class="game-btn btn-outline" style="margin-top: 15px; padding: 14px;" onclick="upgradeMine(event)">
                <span style="font-size: 11px; display: block; color: var(--text-main); font-weight: 600;" data-i18n="upgrade_lvl">SEVİYE YÜKSELT</span>
                <span id="ui-upgrade-cost" style="font-size: 14px; font-weight: 800;">10,000 GEP</span>
            </button>
        </div>
    </div>

    <div id="page-profile" class="page">
        <div class="glass-card" style="text-align: center; background: linear-gradient(135deg, rgba(16,185,129,0.1) 0%, rgba(15,23,42,0.6) 100%); border-color: rgba(16,185,129,0.3);">
            <div style="font-size: 36px; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(16,185,129,0.5));">📺</div>
            <h3 style="color: #fff; margin-bottom: 5px;" data-i18n="watch_earn">İZLE & KAZAN</h3>
            <p style="font-size:
