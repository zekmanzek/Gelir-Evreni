<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni | Siber Uzay</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader"><div class="loader-ring"></div></div>
    
    <div class="header-panel">
        <div class="balance-wrapper">
            <div class="balance-label">GÜNCEL BAKİYE</div>
            <div class="points-row"><div class="points" id="balance">0</div><div class="currency">GEP</div></div>
            <div class="usd-val" id="usd">≈ 0.00 USDT</div>
            <div style="font-size: 12px; color: var(--text-dim); margin-top: 5px;" id="header-name">YÜKLENİYOR...</div>
        </div>
    </div>

    <div id="page-hub" class="page active">
        <div class="glass-card" style="text-align:center;"><h3>🚀 SİSTEM ÇALIŞIYOR</h3><p>Haftalık yarışa katılmak için "AĞ" sekmesine bak!</p></div>
    </div>

    <div id="page-network" class="page">
        <div style="display: flex; align-items: center; margin-bottom: 20px;"><div style="font-size: 24px; margin-right: 10px;">🏆</div><h3 style="margin: 0;">ŞAMPİYONLAR</h3></div>
        
        <div class="tab-container">
            <button id="tab-lb-all" class="tab-btn active" onclick="switchLB('all')">TOP 100</button>
            <button id="tab-lb-weekly" class="tab-btn" onclick="switchLB('weekly')">BU HAFTA</button>
        </div>

        <div id="weekly-reward-info" style="display:none; background: rgba(16,185,129,0.1); border: 1px solid var(--success); padding: 15px; border-radius: 16px; margin-bottom: 15px; text-align: center;">
            <h4 style="color: var(--success); margin-bottom: 5px;">🎁 HAFTALIK BÜYÜK ÖDÜL</h4>
            <p style="font-size: 12px; margin: 0;">Bu hafta ilk 5'e giren herkese <strong>5$ NAKİT ÖDÜL</strong>!<br>Sıfırlanma: Pazar 23:59</p>
        </div>

        <div class="glass-card" style="padding: 0; overflow: hidden;"><div id="leader-list"></div></div>
    </div>

    <div class="dock-container">
        <a href="javascript:void(0)" class="dock-item active" onclick="showPage('hub', this)"><div class="dock-icon">🏠</div><div class="dock-text">MERKEZ</div></a>
        <a href="javascript:void(0)" class="dock-item" onclick="showPage('network', this)"><div class="dock-icon">🏆</div><div class="dock-text">AĞ</div></a>
    </div>

    <script src="app.js"></script>
</body>
</html>
