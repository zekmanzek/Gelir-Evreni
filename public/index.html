<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0a0f1e; color: white; font-family: Arial; text-align: center; margin: 0; overflow: hidden; }
        .header { padding: 15px; background: #16213e; }
        .logo-text { font-size: 24px; font-weight: bold; color: #ffd700; }
        .balance-amount { font-size: 44px; font-weight: bold; }
        .mining-section { margin-top: 40px; }
        .main-button { width: 210px; height: 210px; border-radius: 50%; border: 4px solid #ffd700; display: inline-flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1e3a8a, #0a0f1e); }
        .main-button img { width: 130px; }
        .action-btn { margin-top: 20px; background: #ffd700; border: none; padding: 12px 30px; border-radius: 20px; font-weight: bold; min-width: 200px; }
        .footer-menu { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; background: #16213e; border-top: 2px solid #ffd700; font-size: 11px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-text">GELİR EVRENİ</div>
        <div onclick="setLanguage('tr')">🇹🇷</div> <div onclick="setLanguage('az')">🇦🇿</div>
    </div>
    <div class="balance-container">
        <div id="lbl-total">TOPLAM KAZANÇ</div>
        <div class="balance-amount" id="balance">0.00</div>
        <div style="color: #00e676;" id="lbl-rate">+50 GEP / Saat</div>
    </div>
    <div class="mining-section">
        <div class="main-button"><img src="https://img.icons8.com/emoji/256/money-bag-emoji.png"></div><br>
        <button class="action-btn" id="action-btn" onclick="handleAction()">Madenciliği Başlat</button>
        <div id="timer-text" style="color: #ffd700; font-weight: bold; margin-top: 10px;"></div>
    </div>
    <div class="footer-menu">
        <span style="color:#00e676">ANA SAYFA</span><span>GÖREVLER</span><span>AVCI EKİBİ</span><span>BORSA</span>
    </div>
    <script>
        const tele = window.Telegram.WebApp; tele.expand();
        let balance = 0; let refCount = 0;
        const EIGHT_HOURS = 8 * 60 * 60 * 1000;

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('userid');
            const ref = urlParams.get('ref');
            if(userId) {
                const res = await fetch(`/api/user/${userId}?ref=${ref || ''}`);
                const data = await res.json();
                balance = data.balance; refCount = data.refCount;
                document.getElementById('balance').innerText = balance.toFixed(2);
                document.getElementById('lbl-rate').innerText = `+${50 + (refCount * 10)} GEP / Saat`;
            }
            updateUI();
        }

        function updateUI() {
            const startTime = localStorage.getItem('miningStartTime');
            const btn = document.getElementById('action-btn');
            if (!startTime) { btn.innerText = "Madenciliği Başlat"; btn.disabled = false; }
            else {
                const elapsed = new Date().getTime() - parseInt(startTime);
                if (elapsed < EIGHT_HOURS) { btn.disabled = true; startCountdown(EIGHT_HOURS - elapsed); }
                else { btn.innerText = "Kazancı Topla"; btn.disabled = false; document.getElementById('timer-text').innerText = "00:00:00"; }
            }
        }

        async function handleAction() {
            const startTime = localStorage.getItem('miningStartTime');
            if (!startTime) { localStorage.setItem('miningStartTime', new Date().getTime()); updateUI(); }
            else {
                const reward = (50 + (refCount * 10)) * 8;
                balance += reward;
                const userId = new URLSearchParams(window.location.search).get('userid');
                await fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId, amount: balance}) });
                localStorage.removeItem('miningStartTime');
                init();
            }
        }

        function startCountdown(t) {
            const int = setInterval(() => {
                t -= 1000;
                const h = Math.floor(t/3600000); const m = Math.floor((t%3600000)/60000); const s = Math.floor((t%60000)/1000);
                document.getElementById('timer-text').innerText = `${h}s ${m}d ${s}s`;
                if(t<=0) { clearInterval(int); updateUI(); }
            }, 1000);
        }
        init();
    </script>
</body>
</html>
