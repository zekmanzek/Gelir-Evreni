<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni</title>
    <style>
        body { background: #0b1e33; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .header { background: #112b4a; padding: 20px; border-bottom: 2px solid #ffd700; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #112b4a; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ffd700; }
        .page { padding: 20px; padding-bottom: 100px; }
        .btn { background: #ffd700; color: black; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 80%; cursor: pointer; margin: 10px 0; }
        .btn:disabled { background: #555; color: #ccc; cursor: not-allowed; }
        .task-card { background: #163558; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="color:#ffd700; margin:0;">GELİR EVRENİ</h2>
    <div id="balance" style="font-size:28px; font-weight:bold; margin-top:10px;">0 GEP</div>
    <div style="color:#00ff00; font-size:14px;">≈ $<span id="usd-val">0.00</span></div>
</div>

<div id="home" class="page">
    <div id="speed" style="color:#ffd700; margin-bottom:20px;">Hız: +50 GEP / Saat</div>
    <img src="https://img.icons8.com/emoji/96/money-bag-emoji.png" width="120">
    <button class="btn" id="mine-btn" onclick="startMining()">Madenciliği Başlat</button>
    <div id="timer" style="font-size:20px; margin-top:10px; font-weight:bold;">08:00:00</div>
</div>

<div id="tasks" class="page" style="display:none;">
    <h3>İMPARATORLUK GÖREVLERİ</h3>
    <div id="task-list"></div>
</div>

<div class="nav">
    <div onclick="showPage('home')">🏠 ANA SAYFA</div>
    <div onclick="showPage('tasks')">🎯 GÖREVLER</div>
</div>

<script>
    let userId = new URLSearchParams(window.location.search).get('userid') || 'test';
    let userData = { balance: 0, currentSpeed: 50, tasks: [], lastMined: null };

    async function loadData() {
        const res = await fetch(`/api/user/${userId}`);
        userData = await res.json();
        updateUI();
        renderTasks();
    }

    function updateUI() {
        document.getElementById('balance').innerText = userData.balance.toLocaleString() + ' GEP';
        document.getElementById('usd-val').innerText = (userData.balance / 10000).toFixed(2);
        document.getElementById('speed').innerText = `Hız: +${userData.currentSpeed} GEP / Saat`;
        
        if (userData.lastMined) {
            const diff = Date.now() - userData.lastMined;
            if (diff < 8 * 60 * 60 * 1000) {
                document.getElementById('mine-btn').disabled = true;
                startTimer(8 * 60 * 60 * 1000 - diff);
            }
        }
    }

    async function startMining() {
        const res = await fetch('/api/mine', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ userId })
        });
        const data = await res.json();
        if(data.success) {
            userData.balance = data.balance;
            userData.lastMined = data.lastMined;
            updateUI();
            alert("Madencilik başladı! +500 GEP eklendi.");
        }
    }

    function startTimer(duration) {
        let timer = duration / 1000;
        const interval = setInterval(() => {
            let h = Math.floor(timer / 3600);
            let m = Math.floor((timer % 3600) / 60);
            let s = Math.floor(timer % 60);
            document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if (--timer < 0) {
                clearInterval(interval);
                document.getElementById('mine-btn').disabled = false;
                document.getElementById('timer').innerText = "08:00:00";
            }
        }, 1000);
    }

    function showPage(p) {
        document.getElementById('home').style.display = p === 'home' ? 'block' : 'none';
        document.getElementById('tasks').style.display = p === 'tasks' ? 'block' : 'none';
    }

    const CHANNELS = [
        { id: '@gelirevreni', name: 'Gelir Evreni', link: 'https://t.me/gelirevreni' },
        { id: '@kriptotayfa', name: 'Kripto Tayfa', link: 'https://t.me/kriptotayfa' },
        { id: '@sorareturkiye', name: 'Sorare Türkiye', link: 'https://t.me/sorareturkiye' }
    ];

    function renderTasks() {
        const list = document.getElementById('task-list');
        list.innerHTML = '';
        CHANNELS.forEach(ch => {
            const done = userData.tasks.includes(ch.id);
            list.innerHTML += `
                <div class="task-card">
                    <div style="text-align:left;"><b>${ch.name}</b><br><small>+500 GEP</small></div>
                    ${done ? '✅' : `<button onclick="doTask('${ch.link}','${ch.id}')" style="background:#ffd700; border:none; padding:8px; border-radius:5px;">Yap</button>`}
                </div>`;
        });
    }

    async function doTask(url, id) {
        window.open(url, '_blank');
        const res = await fetch('/api/check-task', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ userId, channelId: id })
        });
        const d = await res.json();
        if(d.success) { alert("Onaylandı!"); loadData(); } else { alert("Katılmalısın!"); }
    }

    loadData();
</script>
</body>
</html>
