<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0a0f1e; color: white; font-family: 'Arial', sans-serif; text-align: center; margin: 0; overflow: hidden; }
        .header { padding: 15px; background: #16213e; position: relative; }
        .logo-text { font-size: 24px; font-weight: bold; color: #ffd700; margin-bottom: 10px; }
        
        .lang-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 5px; }
        .lang-btn { font-size: 25px; cursor: pointer; transition: 0.2s; }
        .lang-btn:active { transform: scale(1.2); }

        .balance-container { margin-top: 20px; }
        .balance-amount { font-size: 44px; font-weight: bold; }
        .balance-label { color: #00e676; font-size: 13px; letter-spacing: 1px; }
        
        .mining-section { margin-top: 30px; }
        .main-button { 
            width: 210px; height: 210px; border-radius: 50%; 
            border: 4px solid #ffd700; display: inline-flex; 
            align-items: center; justify-content: center; 
            background: radial-gradient(circle, #1e3a8a, #0a0f1e); 
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }
        .main-button img { width: 130px; }

        .action-btn { 
            margin-top: 20px; background: #ffd700; color: #000;
            border: none; padding: 12px 30px; border-radius: 20px; 
            font-weight: bold; min-width: 220px; font-size: 16px;
        }
        .action-btn:disabled { background: #444; color: #888; }

        .footer-menu { 
            position: fixed; bottom: 0; width: 100%; 
            display: flex; justify-content: space-around; 
            padding: 15px 0; background: #16213e; 
            border-top: 2px solid #ffd700; 
        }
        .menu-item { color: #b0bec5; font-size: 11px; text-decoration: none; cursor: pointer; }
        .menu-item.active { color: #00e676; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-text">GELİR EVRENİ</div>
        <div class="lang-container">
            <span class="lang-btn" onclick="setLanguage('tr')">🇹🇷</span>
            <span class="lang-btn" onclick="setLanguage('az')">🇦🇿</span>
        </div>
        <div id="welcome-text" style="font-size: 14px; margin-top: 5px;">Hoş geldin Avcı!</div>
    </div>

    <div id="page-home">
        <div class="balance-container">
            <div id="lbl-total" class="balance-label">TOPLAM KAZANÇ</div>
            <div class="balance-amount" id="balance">0.00</div>
            <div style="color: #00e676; font-weight: bold;" id="lbl-rate">+50 GEP / Saat</div>
        </div>

        <div class="mining-section">
            <div class="main-button"><img src="https://img.icons8.com/emoji/256/money-bag-emoji.png"></div><br>
            <button class="action-btn" id="action-btn" onclick="handleAction()">Madenciliği Başlat</button>
            <div id="timer-text" style="color: #ffd700; font-weight: bold; margin-top: 10px; font-size: 18px;"></div>
        </div>
    </div>

    <div class="footer-menu">
        <div class="menu-item active" id="m-home" onclick="showPage('home')">ANA SAYFA</div>
        <div class="menu-item" id="m-tasks" onclick="alert('Görevler Çok Yakında!')">GÖREVLER</div>
        <div class="menu-item" id="m-team" onclick="alert('Avcı Ekibi Yakında!')">AVCI EKİBİ</div>
        <div class="menu-item" id="m-market" onclick="alert('Borsa Yakında!')">BORSA</div>
    </div>

    <script>
        const tele = window.Telegram.WebApp; tele.expand();
        let balance = 0; let refCount = 0;
        const EIGHT_HOURS = 8 * 60 * 60 * 1000;

        const translations = {
            tr: { welcome: "Hoş geldin Avcı!", total: "TOPLAM KAZANÇ", start: "Madenciliği Başlat", collect: "Kazancı Topla", home: "ANA SAYFA", tasks: "GÖREVLER", team: "AVCI EKİBİ", market: "BORSA" },
            az: { welcome: "Xoş gəldin Ovçu!", total: "ÜMUMİ QAZANC", start: "Mədənçiliyi Başlat", collect: "Qazancı Topla", home: "ANA SƏHİFƏ", tasks: "TAPŞIRIQLAR", team: "OVÇU KOMANDASI", market: "BİRJA" }
        };
        let currentLang = 'tr';

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            document.getElementById('welcome-text').innerText = t.welcome;
            document.getElementById('lbl-total').innerText = t.total;
            document.getElementById('m-home').innerText = t.home;
            document.getElementById('m-tasks').innerText = t.tasks;
            document.getElementById('m-team').innerText = t.team;
            document.getElementById('m-market').innerText = t.market;
            updateUI();
        }

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('userid');
            const ref = urlParams.get('ref');
            if(userId) {
                const res = await fetch(`/api/user/${userId}?ref=${ref || ''}`);
                const data = await res.json();
                balance = data.balance; refCount = data.refCount;
                document.getElementById('balance').innerText = balance.toFixed(2);
                document.getElementById('lbl-rate').innerText = `+${50 + (refCount * 10)} GEP / Saat`;
            }
            updateUI();
        }

        function updateUI() {
            const startTime = localStorage.getItem('miningStartTime');
            const btn = document.getElementById('action-btn');
            const t = translations[currentLang];
            if (!startTime) { btn.innerText = t.start; btn.disabled = false; }
            else {
                const elapsed = new Date().getTime() - parseInt(startTime);
                if (elapsed < EIGHT_HOURS) { btn.disabled = true; startCountdown(EIGHT_HOURS - elapsed); }
                else { btn.innerText = t.collect; btn.disabled = false; document.getElementById('timer-text').innerText = "00:00:00"; }
            }
        }

        async function handleAction() {
            const startTime = localStorage.getItem('miningStartTime');
            if (!startTime) { localStorage.setItem('miningStartTime', new Date().getTime()); updateUI(); }
            else {
                const reward = (50 + (refCount * 10)) * 8;
                balance += reward;
                const userId = new URLSearchParams(window.location.search).get('userid');
                await fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId, amount: balance}) });
                localStorage.removeItem('miningStartTime');
                init();
            }
        }

        function startCountdown(t) {
            const int = setInterval(() => {
                t -= 1000;
                const h = Math.floor(t/3600000); const m = Math.floor((t%3600000)/60000); const s = Math.floor((t%60000)/1000);
                document.getElementById('timer-text').innerText = `${h}s ${m}d ${s}s`;
                if(t<=0) { clearInterval(int); updateUI(); }
            }, 1000);
        }
        init();
    </script>
</body>
</html>
