<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #020617; --card-bg: rgba(15, 23, 42, 0.85); --accent-gold: #ffcc00; --accent-cyan: #00d4ff; --text-main: #f8fafc; --text-dim: #94a3b8; }
        body { font-family: 'Urbanist', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; min-height: 100vh; overflow-x: hidden; }

        /* --- LOGOLU PREMIUM KARŞILAMA EKRANI (LOADER) --- */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #0a1120 0%, #020617 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease; }
        
        .loader-logo { width: 120px; height: 120px; margin-bottom: 25px; animation: logoPulse 2s infinite ease-in-out; filter: drop-shadow(0 0 15px rgba(255, 204, 0, 0.6)); }
        @keyframes logoPulse { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.05); opacity: 1; } }

        .loader-text { font-size: 24px; font-weight: 800; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; }
        
        /* Şık Yüklenme Çubuğu */
        .loader-bar { width: 180px; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; overflow: hidden; position: relative; }
        .loader-bar::after { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 50%; background: linear-gradient(90deg, transparent, var(--accent-gold), transparent); border-radius: 2px; animation: barLoading 1.5s infinite linear; }
        @keyframes barLoading { 0% { left: -50%; } 100% { left: 100%; } }

        /* --- ANA UYGULAMA PANELİ --- */
        .stats-card { background: var(--card-bg); padding: 30px 20px; border-radius: 28px; text-align: center; margin-bottom: 25px; border: 1px solid rgba(255, 204, 0, 0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .points-val { font-size: 48px; font-weight: 800; color: var(--accent-gold); margin: 5px 0; }
        .withdraw-btn { width: 100%; padding: 16px; border-radius: 18px; border: none; font-weight: 800; margin-top: 20px; cursor: pointer; transition: background 0.3s; }
        .withdraw-active { background: var(--accent-gold); color: #000; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.4); }
        .withdraw-passive { background: #1e293b; color: var(--text-dim); opacity: 0.5; cursor: not-allowed; }
        .task-card { background: var(--card-bg); padding: 20px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .btn-yap { background: var(--accent-gold); color: #000; padding: 10px 20px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: opacity 0.2s; }
        .btn-yap:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="loader">
        <img src="logo.png" alt="Gelir Evreni Logosu" class="loader-logo">
        <div class="loader-text">GELİR EVRENİ</div>
        <div class="loader-bar"></div>
    </div>

    <div class="stats-card">
        <div style="font-size: 12px; letter-spacing: 2px; color: var(--text-dim)">TOPLAM GEP BAKİYESİ</div>
        <div class="points-val" id="user-points">0</div>
        <div id="usd-val" style="color: var(--accent-cyan); font-weight: 600;">≈ 0.00 USDT</div>
        <button id="withdraw-btn" class="withdraw-btn withdraw-passive">💸 ÖDEME TALEBİ OLUŞTUR</button>
    </div>
    <div id="tasks"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const API_BASE = window.location.origin;
        let user, tasks = [];

        async function init() {
            try {
                const uid = tg.initDataUnsafe?.user?.id?.toString() || "6814040940";
                const res = await fetch(`${API_BASE}/api/user/auth`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ telegramId: uid })
                });
                const data = await res.json();
                user = data.user;
                updateUI();
                const tRes = await fetch(`${API_BASE}/api/tasks`);
                const tData = await tRes.json();
                tasks = tData.tasks;
                renderTasks();
                // Veriler yüklendiğinde loader'ı kapat
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            } catch (e) { console.error("Hata:", e); }
        }

        function updateUI() {
            document.getElementById('user-points').innerText = user.points.toLocaleString();
            document.getElementById('usd-val').innerText = `≈ ${(user.points / 100000).toFixed(2)} USDT`;
            const wBtn = document.getElementById('withdraw-btn');
            wBtn.className = `withdraw-btn ${user.points >= 500000 ? 'withdraw-active' : 'withdraw-passive'}`;
        }

        async function completeTask(tid, link) {
            tg.openLink(link);
            const res = await fetch(`${API_BASE}/api/tasks/complete`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.telegramId, taskId: tid })
            });
            const data = await res.json();
            if(data.success) { user.points = data.points; user.completedTasks.push(tid); updateUI(); renderTasks(); }
        }

        function renderTasks() {
            const cont = document.getElementById('tasks');
            cont.innerHTML = '';
            tasks.forEach(t => {
                const done = user.completedTasks.includes(t.taskId);
                const div = document.createElement('div');
                div.className = 'task-card';
                div.innerHTML = `<div><div style="font-weight:600">${t.title}</div><div style="color:var(--accent-gold); font-weight:800">+${t.reward} GEP</div></div>
                <button class="btn-yap" ${done ? 'disabled' : ''} onclick="completeTask('${t.taskId}','${t.target}')">${done ? 'TAMAMLANDI' : 'BAŞLAT'}</button>`;
                cont.appendChild(div);
            });
        }

        document.getElementById('withdraw-btn').onclick = () => {
            if(user.points < 500000) return alert("Minimum 500.000 GEP gerekli.");
            const wallet = prompt("USDT BEP20 Cüzdan Adresiniz:");
            if(wallet) {
                fetch(`${API_BASE}/api/withdraw`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ telegramId: user.telegramId, wallet })
                }).then(() => alert("Talebiniz iletildi!"));
            }
        };
        window.onload = init;
    </script>
</body>
</html>
