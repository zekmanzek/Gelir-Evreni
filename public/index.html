<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-deep: #020617; --gold: #ffcc00; --gold-glow: rgba(255, 204, 0, 0.4); --card-glass: rgba(15, 23, 42, 0.6); --border-glass: rgba(255, 255, 255, 0.08); --text-main: #f8fafc; --text-dim: #94a3b8; --danger: #ef4444; --success: #22c55e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Urbanist', sans-serif; background-color: var(--bg-deep); color: var(--text-main); margin: 0; padding-bottom: 110px; min-height: 100vh; overflow-x: hidden; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-deep); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .header { text-align: center; padding: 30px 20px; border-bottom: 1px solid var(--border-glass); }
        .points { font-size: 48px; font-weight: 900; color: var(--gold); }
        .page { display: none; padding: 24px 16px; animation: slideUp 0.3s ease; }
        .page.active { display: block; }
        .card { background: var(--card-glass); padding: 20px; border-radius: 24px; margin-bottom: 16px; border: 1px solid var(--border-glass); }
        .btn-full { width: 100%; padding: 18px; border-radius: 18px; background: var(--gold); border: none; font-weight: 900; cursor: pointer; }
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(15, 23, 42, 0.9); display: flex; padding: 10px; border-radius: 22px; }
        .nav-item { color: var(--text-dim); flex: 1; text-align: center; text-decoration: none; font-size: 10px; font-weight: 800; }
        .nav-item.active { color: var(--gold); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .level-badge { padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 900; }
        .streak-day { padding: 8px; border: 1px solid var(--border-glass); border-radius: 10px; text-align: center; font-size: 9px; }
        .streak-day.completed { background: var(--success); color: white; }
    </style>
</head>
<body>
    <div id="loader"><h2 style="color:var(--gold)">YÜKLENİYOR...</h2></div>

    <div class="header">
        <div id="user-level" class="level-badge">BRONZ</div>
        <div class="points" id="balance">0</div>
        <div style="color:var(--text-dim)">GEP</div>
    </div>

    <div id="page-tasks" class="page active"><h3>Görevler</h3><div id="task-list"></div></div>
    
    <div id="page-mine" class="page">
        <div class="card" style="text-align:center">
            <h2 id="mine-status">Maden Hazır</h2>
            <div id="timer" style="font-size:30px; margin:20px 0; color:var(--gold)"></div>
            <button id="btn-mine" class="btn-full" onclick="startMining()">KAZMAYA BAŞLA</button>
        </div>
    </div>

    <div id="page-profile" class="page">
        <div class="card">
            <h3>Günlük Giriş</h3>
            <div id="streak-box" style="display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-bottom:15px"></div>
            <button class="btn-full" onclick="claimDaily()">ÖDÜLÜ AL</button>
        </div>
        <div class="card" style="text-align:center">
            <h3>Reklam İzle</h3>
            <button class="btn-full" style="background:var(--success)" onclick="showAd()">REKLAM (+500 GEP)</button>
        </div>
    </div>

    <div id="page-leaderboard" class="page"><h3>Sıralama</h3><div id="leader-list"></div></div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active" onclick="showPage('tasks', this)">GÖREV</a>
        <a href="#" class="nav-item" onclick="showPage('mine', this)">MADEN</a>
        <a href="#" class="nav-item" onclick="showPage('profile', this)">PROFİL</a>
        <a href="#" class="nav-item" onclick="showPage('leaderboard', this)">TOP 10</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const API = window.location.origin;
        let user;

        async function init() {
            const tgUser = tg.initDataUnsafe?.user;
            if(!tgUser) return alert("Telegram'dan açın!");
            const res = await fetch(`${API}/api/user/auth`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: tgUser.id.toString(), username: tgUser.username, firstName: tgUser.first_name })
            });
            const data = await res.json();
            user = data.user;
            updateUI();
            renderTasks();
            renderStreak();
            document.getElementById('loader').style.display = 'none';
        }

        function updateUI() {
            document.getElementById('balance').innerText = user.points.toLocaleString();
            document.getElementById('user-level').innerText = user.level;
        }

        async function startMining() {
            const res = await fetch(`${API}/api/mine`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.telegramId })
            });
            const data = await res.json();
            if(data.success) {
                user.points = data.points;
                updateUI();
                tg.showAlert(`Kazandın: ${data.reward} GEP!`);
            } else tg.showAlert(data.message);
        }

        async function claimDaily() {
            const res = await fetch(`${API}/api/daily-checkin`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.telegramId })
            });
            const data = await res.json();
            if(data.success) {
                user.points = data.points;
                user.streak = data.streak;
                updateUI(); renderStreak();
                tg.showAlert("Günlük ödül alındı!");
            } else tg.showAlert(data.message);
        }

        function showPage(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(`page-${p}`).classList.add('active');
            el.classList.add('active');
            if(p === 'leaderboard') loadLeaderboard();
        }

        function renderStreak() {
            const box = document.getElementById('streak-box');
            box.innerHTML = '';
            for(let i=1; i<=7; i++) {
                const d = document.createElement('div');
                d.className = `streak-day ${i <= user.streak ? 'completed' : ''}`;
                d.innerText = i;
                box.appendChild(d);
            }
        }

        async function renderTasks() {
            const res = await fetch(`${API}/api/tasks`);
            const data = await res.json();
            const list = document.getElementById('task-list');
            list.innerHTML = data.tasks.map(t => `
                <div class="card">
                    <h4>${t.title}</h4>
                    <button class="btn-full" onclick="tg.openLink('${t.target}')">GİT VE KAZAN</button>
                </div>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
