<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Gelir Evreni - Ultimate Hunt</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js?v=3.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-gold: #FFD700;
            --neon-green: #00FF88;
            --space-black: #05070A;
            --deep-blue: #0A192F;
            --glass: rgba(255, 255, 255, 0.04);
            --border-glow: rgba(255, 215, 0, 0.25);
        }

        body {
            background: radial-gradient(circle at top right, #0A192F, #05070A), 
                        radial-gradient(circle at bottom left, rgba(0, 255, 136, 0.08), transparent 45%);
            color: #E2E8F0;
            font-family: 'Rajdhani', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container { padding: 20px; padding-bottom: 120px; }

        .header { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 15px 0 35px 0; }
        .header img { width: 24px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px; font-weight: 900;
            color: var(--neon-gold);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.7), 0 0 30px rgba(255, 215, 0, 0.4);
            letter-spacing: 2.5px; margin: 0;
        }

        .main-display {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-radius: 40px;
            padding: 40px 20px;
            border: 1px solid var(--border-glow);
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8), 0 0 25px rgba(255, 215, 0, 0.1);
            margin-bottom: 30px;
            position: relative;
        }

        .chest-icon {
            font-size: 80px; margin-bottom: 20px; display: inline-block;
            filter: drop-shadow(0 0 30px var(--neon-gold));
            animation: chestSpin 5s infinite ease-in-out;
        }
        @keyframes chestSpin { 0%, 100% { transform: rotateY(0deg); } 50% { transform: rotateY(180deg); } }

        .balance-label { font-size: 14px; text-transform: uppercase; letter-spacing: 4px; color: #94A3B8; font-weight: 700; }
        .balance-amount { 
            font-family: 'Orbitron'; font-size: 48px; font-weight: 900; margin: 10px 0; color: #FFF;
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
        }
        .balance-usd { color: var(--neon-green); font-size: 21px; font-weight: 700; text-shadow: 0 0 15px rgba(0, 255, 136, 0.6); }

        .speed-badge {
            background: rgba(0, 255, 136, 0.1); border: 1px solid var(--neon-green);
            color: var(--neon-green); padding: 8px 18px; border-radius: 20px;
            font-size: 14px; font-weight: 700; font-family: 'Orbitron';
            display: inline-flex; align-items: center; gap: 8px; margin-top: 15px;
            text-shadow: 0 0 10px var(--neon-green);
        }

        .action-btn {
            background: linear-gradient(180deg, var(--neon-green) 0%, #008F4C 100%);
            border: none; width: 100%; padding: 25px; border-radius: 25px;
            color: #000; font-family: 'Orbitron'; font-weight: 900; font-size: 18px;
            box-shadow: 0 10px 0 #005F32, 0 0 35px rgba(0, 255, 136, 0.5);
            cursor: pointer; transition: 0.15s; text-transform: uppercase;
            letter-spacing: 1.5px; position: relative; overflow: hidden; margin-top: 40px;
        }
        .action-btn:active { transform: translateY(4px); box-shadow: 0 6px 0 #005F32; }
        .action-btn:disabled { background: #1E293B; box-shadow: 0 10px 0 #0F172A; color: #475569; opacity: 0.8; }

        .action-btn::after {
            content: ''; position: absolute; top: -50%; left: -60%; width: 25%; height: 200%;
            background: rgba(255, 255, 255, 0.4); transform: rotate(30deg);
            animation: moveLight 4s infinite;
        }
        @keyframes moveLight { 0% { left: -60%; } 25% { left: 130%; } 100% { left: 130%; } }

        #timer {
            margin-top: 20px; font-weight: 700; letter-spacing: 4px; color: #64748B;
            font-family: 'Orbitron'; font-size: 15px; text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .page { display: none; animation: pageIn 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .section-title { color: var(--neon-gold); font-family: 'Orbitron'; font-size: 20px; text-align: center; letter-spacing: 3px; margin-bottom: 30px; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        
        .task-list { margin-top: 20px; }
        .task-item {
            background: var(--glass); padding: 18px; border-radius: 25px; margin-bottom: 12px;
            display: flex; align-items: center; border: 1px solid rgba(255,215,0,0.1);
            transition: 0.3s;
        }
        .task-icon { font-size: 28px; margin-right: 15px; filter: drop-shadow(0 0 10px var(--neon-gold)); }
        .task-info { flex: 1; }
        .task-info h4 { margin: 0; font-size: 16px; color: #FFF; font-family: 'Orbitron'; }
        .task-info p { margin: 0; font-size: 12px; color: var(--neon-green); margin-top: 3px; font-weight: bold; }

        .task-btn {
            background: var(--neon-gold); border: none; padding: 8px 15px; border-radius: 12px;
            color: #000; font-weight: 900; font-family: 'Orbitron'; font-size: 11px;
            cursor: pointer; box-shadow: 0 4px 0 #B8860B;
        }
        .task-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #B8860B; }
        .task-btn:disabled { background: #1E293B; box-shadow: none; color: #475569; cursor: not-allowed; }

        .progress-wrap { background: #162B46; border-radius: 10px; height: 10px; margin-top: 15px; overflow: hidden; border: 1px solid rgba(255,215,0,0.15); }
        .progress-bar { background: linear-gradient(90deg, var(--neon-gold), #B8860B); height: 100%; width: 0%; transition: width 0.5s ease; box-shadow: 0 0 10px rgba(255, 215, 0, 0.4); }

        .lb-card { background: var(--glass); border-radius: 25px; padding: 25px; border: 1px solid rgba(0, 255, 136, 0.2); box-shadow: 0 15px 35px rgba(0,0,0,0.6); margin-top: 25px; }
        .lb-card .card-label { font-size: 13px; color: var(--neon-green); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 10px; display: block; text-shadow: 0 0 10px var(--neon-green); }
        
        .rank-list { margin-top: 20px; }
        .rank-row { display: flex; justify-content: space-between; padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 16px; font-weight: 500; }
        .rank-row.user-rank { background: rgba(255, 215, 0, 0.08); border-radius: 10px; color: var(--neon-gold); font-weight: 700; border: 1px solid var(--neon-gold); }
        .rank-num { font-family: 'Orbitron'; color: var(--neon-gold); margin-right: 15px; width: 30px; display: inline-block; text-align: center; }

        .nav-bar {
            position: fixed; bottom: 25px; left: 25px; right: 25px;
            background: rgba(10, 25, 47, 0.95); backdrop-filter: blur(35px);
            display: flex; justify-content: space-around; padding: 20px;
            border-radius: 40px; border: 1px solid rgba(255, 215, 0, 0.25);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), 0 0 20px rgba(255, 215, 0, 0.1);
            z-index: 100;
        }
        .nav-link { text-align: center; color: #64748B; text-decoration: none; font-size: 13px; font-weight: 700; flex: 1; transition: 0.3s; }
        .nav-link.active { color: var(--neon-gold); transform: translateY(-6px); }
        .nav-link i { font-size: 28px; display: block; margin-bottom: 8px; font-style: normal; transition: 0.3s; }
        .nav-link.active i { text-shadow: 0 0 20px rgba(255, 215, 0, 1); }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://flagcdn.com/w40/tr.png" alt="TR">
        <h1>GELİR EVRENİ</h1>
        <img src="https://flagcdn.com/w40/az.png" alt="AZ">
    </div>

    <div id="home-page" class="page active">
        <div class="main-display">
            <div class="chest-icon">🎁</div>
            <div class="balance-label">TOPLAM AVIN</div>
            <div id="balance" class="balance-amount">0 GEP</div>
            <div class="balance-usd">≈ $<span id="usd">0.00</span></div>
            <div class="speed-badge">⚡ <span id="speed-calc">+50 GEP / Saat</span></div>
            <div style="margin-top: 15px;">
                <button class="action-btn" id="mbtn" onclick="mine()">🎯 HEMEN KAZAN</button>
                <div id="timer">SİSTEM ÇEVRİMİÇİ</div>
            </div>
        </div>
        <div class="lb-card">
            <span class="card-label">🏆 BUGÜNÜN ŞAMPİYONU</span>
            <div id="top-winner-name" style="font-size:20px; font-weight:bold; color:#FFF; font-family:'Orbitron';">Yükleniyor...</div>
        </div>
    </div>

    <div id="earn-page" class="page">
        <h2 class="section-title">SOSYAL GÖREVLER</h2>
        
        <div class="task-list">
            <div class="task-item" style="border: 1px solid var(--neon-gold);">
                <div class="task-icon">🚀</div>
                <div class="task-info"><h4>Ekibi Büyüt</h4><p>Her Davet +1000 GEP</p></div>
                <button class="task-btn" onclick="copyRef()">DAVET ET</button>
            </div>

            <div id="social-tasks-container"></div>
        </div>
    </div>

    <div id="profile-page" class="page">
        <h2 class="section-title">LİDER TABLOSU</h2>
        <div id="lb-list" class="rank-list"></div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-link active" onclick="switchPage('home', this)"><i>🏠</i>Üs</div>
    <div class="nav-link" onclick="switchPage('earn', this)"><i>💰</i>Görevler</div>
    <div class="nav-link" onclick="switchPage('profile', this)"><i>👤</i>Liderler</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const userId = new URLSearchParams(window.location.search).get('userid') || "99";
    let currentUser = null;

    const socialLinks = [
        { id: 's1', name: 'Referans Linkim', url: 'https://t.me/referanslinkim' },
        { id: 's2', name: 'Kripto Tayfa', url: 'https://t.me/kriptotayfa' },
        { id: 's3', name: 'Gelir Evreni Proje', url: 'https://t.me/gelirevreniproje' },
        { id: 's4', name: 'Gelir Evreni', url: 'https://t.me/gelirevreni' },
        { id: 's5', name: 'Gelir Evreni Airdrop', url: 'https://t.me/gelirevreniairdrop' },
        { id: 's6', name: 'Kripto Tayfa Grup', url: 'https://t.me/kripto_tayfa' },
        { id: 's7', name: 'Gelir Evreni X', url: 'https://x.com/gelirevreni' },
        { id: 's8', name: 'Kripto Tayfa X', url: 'https://x.com/kriptotayfa' }
    ];

    async function init() {
        tg.expand();
        try {
            const res = await fetch(`/api/user/${userId}?t=${Date.now()}`);
            currentUser = await res.json();
            
            document.getElementById('balance').innerText = Math.floor(currentUser.balance).toLocaleString() + ' GEP';
            document.getElementById('usd').innerText = (currentUser.balance * 0.0001).toFixed(2);
            document.getElementById('speed-calc').innerText = `+${50 + (currentUser.refCount * 25)} GEP / Saat`;

            if (currentUser.lastMined) {
                const diff = Date.now() - new Date(currentUser.lastMined).getTime();
                if (diff < 28800000) {
                    document.getElementById('mbtn').disabled = true;
                    runTimer(28800000 - diff);
                }
            }
            renderSocialTasks();
            loadLeaderboard();
        } catch (e) { console.error(e); }
    }

    function renderSocialTasks() {
        const container = document.getElementById('social-tasks-container');
        container.innerHTML = '';
        socialLinks.forEach(task => {
            const isDone = currentUser.completedTasks.includes(task.id);
            const html = `
                <div class="task-item">
                    <div class="task-icon">${task.url.includes('x.com') ? '🐦' : '📢'}</div>
                    <div class="task-info"><h4>${task.name}</h4><p>+500 GEP</p></div>
                    <button class="task-btn" ${isDone ? 'disabled' : ''} onclick="doTask('${task.url}', '${task.id}')">
                        ${isDone ? 'ALINDI' : 'KATIL'}
                    </button>
                </div>`;
            container.innerHTML += html;
        });
    }

    async function doTask(url, taskId) {
        tg.openLink(url);
        tg.showConfirm("Görevi tamamladınız mı?", async (ok) => {
            if (ok) {
                const res = await fetch('/api/complete-social-task', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId, taskId })
                });
                if (res.ok) {
                    tg.showAlert("500 GEP kazandın!");
                    init();
                } else {
                    tg.showAlert("Bu görev zaten yapılmış.");
                }
            }
        });
    }

    async function loadLeaderboard() {
        const res = await fetch(`/api/leaderboard/${userId}`);
        const data = await res.json();
        const list = document.getElementById('lb-list');
        list.innerHTML = `<div class="rank-row user-rank"><span>#${data.userRank} Sen</span><span>${Math.floor(currentUser.balance)} GEP</span></div>`;
        data.top50.slice(0, 10).forEach((u, i) => {
            if (i === 0) document.getElementById('top-winner-name').innerText = u.fullName || "Bilinmiyor";
            list.innerHTML += `<div class="rank-row"><span><span class="rank-num">#${i+1}</span> ${u.fullName}</span><span>${Math.floor(u.balance)} GEP</span></div>`;
        });
    }

    function runTimer(ms) {
        let t = ms / 1000;
        const timerObj = setInterval(() => {
            let h = Math.floor(t/3600), m = Math.floor((t%3600)/60), s = Math.floor(t%60);
            document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if (--t < 0) { clearInterval(timerObj); document.getElementById('mbtn').disabled = false; document.getElementById('timer').innerText = "SİSTEM HAZIR"; }
        }, 1000);
    }

    async function mine() {
        tg.HapticFeedback.notificationOccurred('success');
        await fetch('/api/mine', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId }) });
        init();
    }

    function switchPage(page, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(page + '-page').classList.add('active');
        el.classList.add('active');
    }

    function copyRef() {
        const link = `https://t.me/gelir_evreni_bot?start=${userId}`;
        const i = document.createElement('input'); i.value = link; document.body.appendChild(i); i.select(); 
        document.execCommand('copy'); document.body.removeChild(i);
        tg.showAlert("Link kopyalandı! Arkadaşlarını davet et.");
    }

    init();
</script>
</body>
</html>
