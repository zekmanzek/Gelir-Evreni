<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b1e33; color: white; font-family: sans-serif; text-align: center; margin: 0; user-select: none; }
        .header { background: #112b4a; padding: 15px; border-bottom: 2px solid #ffd700; position: sticky; top: 0; z-index: 100; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #112b4a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #ffd700; }
        .page { padding: 20px; padding-bottom: 100px; display: none; }
        .active { display: block; }
        .btn { background: #ffd700; color: black; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 85%; cursor: pointer; margin-top: 10px; }
        .btn:disabled { background: #444; color: #888; }
        .card { background: #163558; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="color:#ffd700; margin:0;">GELİR EVRENİ</h2>
    <div id="balance" style="font-size:28px; font-weight:bold;">...</div>
</div>

<div id="home" class="page active">
    <div id="speed" style="color:#ffd700; margin-bottom:10px;">⚡ Hız: +50 GEP / Saat</div>
    <img src="https://img.icons8.com/emoji/96/money-bag-emoji.png" width="100">
    <button class="btn" id="mine-btn" onclick="startMining()">MADENCİLİĞİ BAŞLAT</button>
    <div id="timer" style="margin-top:10px; font-family:monospace; font-size: 20px;">08:00:00</div>
    <button class="btn" style="background:#ff4757; color:white;" id="spin-btn" onclick="spinWheel()">🎡 ÇARKI ÇEVİR</button>
</div>

<div id="leaderboard" class="page">
    <h3 style="color:#ffd700;">🏆 LİDERLER</h3>
    <div id="leader-list"></div>
</div>

<div id="refs" class="page">
    <h3 style="color:#ffd700;">👥 AVCI EKİBİ</h3>
    <div class="card" style="justify-content:center;">Referans Sayın: <span id="ref-count" style="margin-left:10px; font-weight:bold;">0</span></div>
    <button class="btn" onclick="copyRef()">DAVET LİNKİNİ KOPYALA</button>
</div>

<div class="nav">
    <div onclick="showPage('home')">🏠</div>
    <div onclick="showPage('leaderboard')">🏆</div>
    <div onclick="showPage('refs')">👥</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const userId = new URLSearchParams(window.location.search).get('userid') || tg.initDataUnsafe?.user?.id?.toString();
    
    let userData = null;

    async function loadData() {
        if (!userId) { document.getElementById('balance').innerText = "Hata: ID Yok"; return; }
        try {
            const res = await fetch(`/api/user/${userId}`);
            userData = await res.json();
            
            document.getElementById('balance').innerText = Math.floor(userData.balance).toLocaleString() + ' GEP';
            document.getElementById('speed').innerText = `⚡ Hız: +${userData.currentSpeed} GEP / Saat`;
            document.getElementById('ref-count').innerText = userData.refCount;
            
            if (userData.lastMined) {
                const diff = Date.now() - new Date(userData.lastMined).getTime();
                if (diff < 8*60*60*1000) {
                    document.getElementById('mine-btn').disabled = true;
                    startTimer(8*60*60*1000 - diff);
                }
            }
        } catch (e) { console.error("Yükleme hatası"); }
    }

    function startTimer(ms) {
        let t = ms / 1000;
        const intr = setInterval(() => {
            let h = Math.floor(t/3600), m = Math.floor((t%3600)/60), s = Math.floor(t%60);
            document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if (--t < 0) { clearInterval(intr); document.getElementById('mine-btn').disabled = false; document.getElementById('timer').innerText = "Hazır!"; }
        }, 1000);
    }

    async function startMining() {
        await fetch('/api/mine', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId }) });
        loadData();
    }

    async function spinWheel() {
        const res = await fetch('/api/spin', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId }) });
        const d = await res.json();
        if(!d.success) return alert("Günde sadece 1 kez çevirebilirsin!");
        alert("🎉 " + d.win + " GEP Kazandın!");
        loadData();
    }

    async function loadLeaderboard() {
        const res = await fetch('/api/leaderboard');
        const data = await res.json();
        document.getElementById('leader-list').innerHTML = data.map((u, i) => `
            <div class="card"><span>#${i+1} Avcı_${u.userId.slice(-4)}</span><b>${Math.floor(u.balance)}</b></div>
        `).join('');
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.style.display = 'none');
        document.getElementById(p).style.display = 'block';
        if(p === 'leaderboard') loadLeaderboard();
    }

    function copyRef() {
        const link = `https://t.me/gelir_evreni_bot?start=${userId}`;
        const el = document.createElement('textarea'); el.value = link; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
        alert("Referans linkin kopyalandı!");
    }

    loadData();
</script>
</body>
</html>
