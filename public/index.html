<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --green: #00FF88; --glass: rgba(255, 255, 255, 0.05); }
        body { background: #05070A; color: #E2E8F0; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 0; }
        .container { padding: 20px; padding-bottom: 100px; }
        .card { background: var(--glass); border-radius: 25px; padding: 25px; text-align: center; border: 1px solid rgba(255,215,0,0.1); }
        .balance { font-family: 'Orbitron'; font-size: 32px; font-weight: 900; color: #FFF; margin: 10px 0; }
        .btn-main { background: var(--green); width: 100%; padding: 18px; border-radius: 20px; border: none; font-family: 'Orbitron'; font-weight: 900; margin-top: 20px; }
        .btn-main:disabled { background: #1E293B; color: #475569; }
        .page { display: none; } .page.active { display: block; }
        .task-item { background: var(--glass); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(10,25,47,0.9); display: flex; padding: 10px; border-radius: 20px; border: 1px solid var(--gold); }
        .nav-item { flex: 1; text-align: center; font-size: 12px; color: #64748B; padding: 10px; }
        .nav-item.active { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div id="home" class="page active">
            <div class="card">
                <div style="font-size: 50px;">🎁</div>
                <div id="balance" class="balance">0 GEP</div>
                <div style="color:var(--green)">≈ $<span id="usd">0.00</span></div>
                <button id="mine-btn" class="btn-main" onclick="startMining()">AVLANMAYI BAŞLAT</button>
                <div id="timer" style="margin-top:10px; font-size:12px; color:#64748B;">SİSTEM HAZIR</div>
            </div>
        </div>

        <div id="tasks" class="page">
            <h3 style="text-align:center; color:var(--gold)">GÖREVLER</h3>
            <div id="task-list"></div>
        </div>

        <div id="leaderboard" class="page">
            <h3 style="text-align:center; color:var(--gold)">LİDERLER</h3>
            <div id="lb-list"></div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showPage('home', this)">ÜS</div>
        <div class="nav-item" onclick="showPage('tasks', this)">GÖREVLER</div>
        <div class="nav-item" onclick="showPage('leaderboard', this)">LİDERLER</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const userId = new URLSearchParams(window.location.search).get('userid') || "0";
        let userData = { balance: 0, completedTasks: [], pendingTasks: [], refCount: 0 };

        async function init() {
            try {
                const res = await fetch(`/api/user/${userId}?t=${Date.now()}`);
                userData = await res.json();
            } catch (e) { console.log("Veri çekilemedi"); }

            // UI GÜNCELLE (NaN Koruması)
            const b = userData.balance || 0;
            document.getElementById('balance').innerText = Math.floor(b).toLocaleString() + " GEP";
            document.getElementById('usd').innerText = (b * 0.0001).toFixed(2);

            if (userData.lastMined) {
                const diff = Date.now() - new Date(userData.lastMined).getTime();
                if (diff < 28800000) {
                    document.getElementById('mine-btn').disabled = true;
                    runTimer(28800000 - diff);
                }
            }
            renderTasks();
            renderLB();
        }

        function renderTasks() {
            const container = document.getElementById('task-list');
            container.innerHTML = "";
            const tks = [
                { id: 's1', name: 'Kripto Tayfa', url: 'https://t.me/kriptotayfa' },
                { id: 's2', name: 'Gelir Evreni Proje', url: 'https://t.me/gelirevreniproje' },
                { id: 's3', name: 'Gelir Evreni Kanal', url: 'https://t.me/gelirevreni' }
            ];
            tks.forEach(t => {
                const isDone = (userData.completedTasks || []).includes(t.id);
                const isWait = (userData.pendingTasks || []).find(p => p.taskId === t.id);
                let btn = `<button style="background:var(--gold); border:none; padding:8px; border-radius:10px;" onclick="doTask('${t.id}','${t.url}')">KATIL</button>`;
                if (isDone) btn = `<button disabled style="background:#2D3748; color:#718096; border:none; padding:8px; border-radius:10px;">ALINDI</button>`;
                else if (isWait) btn = `<button disabled style="background:#334155; color:#94A3B8; border:none; padding:8px; border-radius:10px;">1 SAAT BEKLE</button>`;

                container.innerHTML += `<div class="task-item"><div><b>${t.name}</b><br><small>+500 GEP</small></div>${btn}</div>`;
            });
        }

        async function doTask(id, url) {
            tg.openLink(url);
            await fetch('/api/start-task', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId, taskId: id }) });
            init();
        }

        async function startMining() {
            await fetch('/api/mine', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId }) });
            init();
        }

        function runTimer(ms) {
            let s = ms / 1000;
            const iv = setInterval(() => {
                const h = Math.floor(s/3600).toString().padStart(2,'0');
                const m = Math.floor((s%3600)/60).toString().padStart(2,'0');
                const sec = Math.floor(s%60).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${h}:${m}:${sec}`;
                if (--s < 0) { clearInterval(iv); document.getElementById('mine-btn').disabled = false; document.getElementById('timer').innerText = "HAZIR"; }
            }, 1000);
        }

        async function renderLB() {
            const res = await fetch(`/api/leaderboard/${userId}`);
            const data = await res.json();
            const container = document.getElementById('lb-list');
            container.innerHTML = `<div style="padding:10px; color:var(--gold)">Senin Sıran: #${data.userRank}</div>`;
            (data.top || []).forEach((u, i) => {
                container.innerHTML += `<div class="task-item"><span>#${i+1} ${u.fullName || "Avcı"}</span><span>${Math.floor(u.balance)} GEP</span></div>`;
            });
        }

        function showPage(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            el.classList.add('active');
        }

        tg.expand();
        init();
    </script>
</body>
</html>
