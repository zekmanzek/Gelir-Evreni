<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni - Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0a0f1e; --card-bg: #151c2c; --gold: #fbc02d; --green: #4caf50; --text-gray: #a0a0a0; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; user-select: none; }
        
        .container { padding: 15px; padding-bottom: 80px; }

        /* Üst Profil Kartı */
        .profile-section { background: var(--card-bg); border-radius: 20px; padding: 15px; display: flex; align-items: center; border-bottom: 4px solid rgba(0,0,0,0.3); margin-bottom: 20px; }
        .avatar { width: 50px; height: 50px; background: var(--gold); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-right: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .user-info h3 { margin: 0; font-size: 18px; color: var(--gold); }
        .user-info p { margin: 0; font-size: 12px; color: var(--text-gray); }

        /* Bakiye Alanı */
        .balance-card { background: linear-gradient(180deg, #1e2a3a 0%, #151c2c 100%); border-radius: 25px; padding: 25px; text-align: center; margin-bottom: 25px; border: 1px solid #2d3a4d; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .balance-label { color: var(--text-gray); font-size: 14px; letter-spacing: 1px; font-weight: bold; }
        .balance-value { font-size: 42px; font-weight: 900; color: white; margin: 10px 0; text-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .speed-badge { background: rgba(76, 175, 80, 0.1); color: var(--green); padding: 5px 15px; border-radius: 50px; font-size: 13px; font-weight: bold; display: inline-block; }

        /* Görseldeki O Yeşil 3D Buton */
        .main-btn { background: linear-gradient(180deg, #66bb6a 0%, #388e3c 100%); color: white; border: none; width: 100%; padding: 20px; border-radius: 18px; font-size: 18px; font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: 0 6px 0 #1b5e20, 0 10px 20px rgba(0,0,0,0.4); transition: 0.1s; margin-bottom: 10px; }
        .main-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #1b5e20; }
        .main-btn:disabled { background: #454d55; box-shadow: 0 6px 0 #2c3136; color: #888; }

        /* Alt Sekmeler */
        .tabs-container { background: var(--card-bg); border-radius: 20px; padding: 10px; margin-top: 20px; }
        .tab-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #252d3d; }
        .tab-item:last-child { border-bottom: none; }
        .tab-icon { font-size: 20px; margin-right: 15px; }
        .tab-text { flex-grow: 1; font-weight: bold; font-size: 15px; }
        .tab-value { color: var(--gold); font-weight: bold; }

        /* Alt Navigasyon */
        .navbar { position: fixed; bottom: 0; left: 0; right: 0; background: #151c2c; display: flex; justify-content: space-around; padding: 15px; border-top: 2px solid #1e2a3a; z-index: 100; }
        .nav-link { color: var(--text-gray); text-decoration: none; font-size: 24px; transition: 0.3s; }
        .nav-link.active { color: var(--gold); transform: scale(1.2); }

        .page { display: none; }
        .active-page { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-section">
        <div class="avatar">🦅</div>
        <div class="user-info">
            <h3 id="user-name">Yükleniyor...</h3>
            <p>Seviye 1 Avcı</p>
        </div>
    </div>

    <div id="home" class="page active-page">
        <div class="balance-card">
            <div class="balance-label">GEP BALANCE</div>
            <div id="balance" class="balance-value">0</div>
            <div class="speed-badge">⚡ <span id="speed">50</span> GEP / SAAT</div>
        </div>

        <button class="main-btn" id="mine-btn" onclick="startMining()">Madenciliği Başlat</button>
        <div id="timer" style="text-align:center; font-weight:bold; color:var(--text-gray); margin-top:5px;">HAZIR</div>

        <div class="tabs-container">
            <div class="tab-item" onclick="showPage('leaderboard')">
                <span class="tab-icon">🏆</span>
                <span class="tab-text">Liderlik Tablosu</span>
                <span class="tab-value">❯</span>
            </div>
            <div class="tab-item" onclick="showPage('refs')">
                <span class="tab-icon">👥</span>
                <span class="tab-text">Arkadaşlarını Davet Et</span>
                <span class="tab-value" id="ref-count">0</span>
            </div>
        </div>
    </div>

    <div id="leaderboard" class="page">
        <h2 style="color:var(--gold); text-align:center;">ELİT SIRALAMA</h2>
        <div id="leader-list" class="tabs-container"></div>
        <button class="main-btn" style="background:var(--card-bg); margin-top:20px;" onclick="showPage('home')">GERİ DÖN</button>
    </div>

    <div id="refs" class="page">
        <h2 style="color:var(--gold); text-align:center;">EKİBİNİ KUR</h2>
        <div class="balance-card">
            <p style="font-size:14px;">Her davet için <b>1000 GEP</b> kazan ve üretim hızını kalıcı olarak artır!</p>
            <button class="main-btn" onclick="copyRef()">DAVET LİNKİNİ KOPYALA</button>
        </div>
        <button class="main-btn" style="background:var(--card-bg);" onclick="showPage('home')">GERİ DÖN</button>
    </div>
</div>

<div class="navbar">
    <a href="#" class="nav-link active" onclick="showPage('home')">🏠</a>
    <a href="#" class="nav-link" onclick="showPage('leaderboard')">🏆</a>
    <a href="#" class="nav-link" onclick="showPage('refs')">👥</a>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const userId = new URLSearchParams(window.location.search).get('userid') || tg.initDataUnsafe?.user?.id;

    async function load() {
        const res = await fetch('/api/user/' + userId);
        const u = await res.json();
        document.getElementById('user-name').innerText = u.username;
        document.getElementById('balance').innerText = Math.floor(u.balance).toLocaleString();
        document.getElementById('speed').innerText = u.speed;
        document.getElementById('ref-count').innerText = u.refCount;

        if (u.lastMined) {
            const diff = Date.now() - new Date(u.lastMined).getTime();
            if (diff < 8*60*60*1000) {
                document.getElementById('mine-btn').disabled = true;
                runTimer(8*60*60*1000 - diff);
            }
        }
    }

    function runTimer(ms) {
        let t = ms / 1000;
        const intr = setInterval(() => {
            let h = Math.floor(t/3600), m = Math.floor((t%3600)/60), s = Math.floor(t%60);
            document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if (--t < 0) { clearInterval(intr); document.getElementById('mine-btn').disabled = false; document.getElementById('timer').innerText = "HAZIR"; }
        }, 1000);
    }

    async function startMining() {
        await fetch('/api/mine', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId }) });
        load();
    }

    async function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page'));
        document.getElementById(p).classList.add('active-page');
        if(p === 'leaderboard') {
            const res = await fetch('/api/leaderboard');
            const data = await res.json();
            document.getElementById('leader-list').innerHTML = data.map((u, i) => `
                <div class="tab-item">
                    <span style="color:var(--gold); margin-right:10px;">#${i+1}</span>
                    <span class="tab-text">${u.username.substring(0,12)}</span>
                    <span class="tab-value">${Math.floor(u.balance)}</span>
                </div>
            `).join('');
        }
    }

    function copyRef() {
        const link = `https://t.me/gelir_evreni_bot?start=${userId}`;
        const i = document.createElement('input'); i.value = link; document.body.appendChild(i); i.select(); document.execCommand('copy'); document.body.removeChild(i);
        tg.showAlert("Link kopyalandı! Arkadaşlarını davet et!");
    }

    load();
</script>
</body>
</html>
