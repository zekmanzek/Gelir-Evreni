<div id="tasks-page" class="page" style="display:none; padding:20px;">
    <h3>İMPARATORLUK GÖREVLERİ</h3>
    <div id="task-list">
        </div>
</div>

<script>
const CHANNELS = [
    { id: '@gelirevreni', name: 'Gelir Evreni', link: 'https://t.me/gelirevreni' },
    { id: '@gelirevreniproje', name: 'Gelir Evreni Proje', link: 'https://t.me/gelirevreniproje' },
    { id: '@kriptotayfa', name: 'Kripto Tayfa', link: 'https://t.me/kriptotayfa' },
    { id: '@referanslinkim', name: 'Referans Linkim', link: 'https://t.me/referanslinkim' },
    { id: '@sorareturkiye', name: 'Sorare Türkiye', link: 'https://t.me/sorareturkiye' },
    { id: 'x_gelir', name: 'X: Gelir Evreni', link: 'https://x.com/gelirevreni' },
    { id: 'x_tayfa', name: 'X: Kripto Tayfa', link: 'https://x.com/kriptotayfa' }
];

async function loadTasks() {
    const taskContainer = document.getElementById('task-list');
    taskContainer.innerHTML = '';
    CHANNELS.forEach(ch => {
        const done = userData.tasks.includes(ch.id);
        taskContainer.innerHTML += `
            <div style="background:#16213e; padding:15px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border:1px solid #ffd700;">
                <div>
                    <div style="font-weight:bold;">${ch.name}</div>
                    <div style="color:#ffd700; font-size:12px;">+500 GEP</div>
                </div>
                ${done ? '<span style="color:green;">✅</span>' : 
                `<button onclick="doTask('${ch.link}', '${ch.id}')" style="background:#ffd700; color:black; border:none; padding:8px 15px; border-radius:5px; font-weight:bold;">Yap</button>`}
            </div>
        `;
    });
}

async function doTask(link, id) {
    window.open(link, '_blank');
    // X görevleri için direkt onay, Telegram için otomatik kontrol
    if(id.startsWith('@')) {
        const res = await fetch('/api/check-task', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ userId, channelId: id })
        });
        const data = await res.json();
        if(data.success) {
            alert('Görev Başarılı! 500 GEP Eklendi.');
            location.reload();
        } else {
            alert('Önce gruba katılmalısınız!');
        }
    } else {
        // X Görevleri için manuel onay simülasyonu
        userData.balance += 500;
        userData.tasks.push(id);
        saveData();
        alert('X Takip Ödülü Eklendi!');
        location.reload();
    }
}
</script>
