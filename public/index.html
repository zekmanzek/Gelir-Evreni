<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni | Komuta Merkezi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-deep: #020617; 
            --gold: #ffcc00; 
            --gold-glow: rgba(255, 204, 0, 0.4);
            --card-glass: rgba(15, 23, 42, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Urbanist', sans-serif; background-color: var(--bg-deep); background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, var(--bg-deep) 70%); color: var(--text-main); margin: 0; padding-bottom: 100px; min-height: 100vh; overflow-x: hidden; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-deep); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .loader-logo { font-size: 28px; font-weight: 900; color: var(--gold); letter-spacing: 6px; text-shadow: 0 0 20px var(--gold-glow); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

        .announcement-container { background: linear-gradient(90deg, #ef4444, #f59e0b); color: white; overflow: hidden; white-space: nowrap; position: sticky; top: 0; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); height: 35px; display: none; align-items: center; }
        .announcement-scroll { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; font-size: 13px; font-weight: 800; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        .level-badge { padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 900; text-transform: uppercase; margin-bottom: 12px; display: inline-block; letter-spacing: 1px; }
        .level-Bronz { background: #cd7f32; color: #fff; }
        .level-Gümüş { background: #c0c0c0; color: #000; }
        .level-Altın { background: #ffd700; color: #000; box-shadow: 0 0 15px var(--gold-glow); }
        .level-Platin { background: #e5e4e2; color: #000; }
        .level-Elmas { background: #b9f2ff; color: #000; box-shadow: 0 0 20px #b9f2ff; }

        .header { text-align: center; padding: 30px 20px; border-bottom: 1px solid var(--border-glass); backdrop-filter: blur(10px); }
        .balance-label { font-size: 11px; letter-spacing: 3px; color: var(--text-dim); font-weight: 700; margin-bottom: 4px; }
        .points-container { display: flex; align-items: baseline; justify-content: center; color: var(--gold); filter: drop-shadow(0 0 15px var(--gold-glow)); }
        .points { font-size: 48px; font-weight: 900; margin: 0; }
        .currency { font-size: 20px; font-weight: 800; margin-left: 8px; opacity: 0.9; }
        
        .page { display: none; padding: 24px 16px; animation: slideUp 0.5s ease-out; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card-glass); backdrop-filter: blur(12px); padding: 20px; border-radius: 24px; margin-bottom: 16px; border: 1px solid var(--border-glass); display: flex; justify-content: space-between; align-items: center; }
        .btn-full { width: 100%; padding: 18px; border-radius: 18px; background: linear-gradient(135deg, var(--gold) 0%, #ffaa00 100%); border: none; color: #000; font-weight: 900; font-size: 15px; margin-top: 10px; cursor: pointer; transition: 0.3s; }
        .btn-full:disabled { background: #1e293b !important; color: #475569 !important; cursor: not-allowed; opacity: 0.6; }

        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 10px; border-radius: 22px; border: 1px solid var(--border-glass); z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-item { color: var(--text-dim); text-decoration: none; text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-item.active { color: var(--gold); }
        
        .ref-box { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass); padding: 14px; border-radius: 14px; color: var(--gold); text-align: center; margin: 8px 0; font-weight: 700; outline: none; }
        
        .streak-container { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin: 15px 0; }
        .streak-day { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-glass); border-radius: 10px; padding: 8px 2px; text-align: center; font-size: 9px; }
        .streak-day.completed { background: rgba(0, 255, 0, 0.1); border-color: #00ff00; color: #00ff00; }
        
        .ad-card { background: linear-gradient(135deg, rgba(34, 197, 94, 0.1) 0%, rgba(15, 23, 42, 0.6) 100%); border: 1px solid rgba(34, 197, 94, 0.3); }
    </style>
</head>
<body>
    <div id="ann-container" class="announcement-container">
        <div id="ann-scroll" class="announcement-scroll"></div>
    </div>
    
    <div id="loader"><div class="loader-logo">GELİR EVRENİ</div></div>

    <div class="header">
        <div id="user-level" class="level-badge level-Bronz">...</div>
        <div class="balance-label">GÜNCEL BAKİYE</div>
        <div class="points-container">
            <div class="points" id="balance">0</div>
            <div class="currency">GEP</div>
        </div>
        <div id="usd" style="color: #00d4ff; font-weight: 700; font-size: 14px; margin-top: 5px;">≈ 0.00 USDT</div>
    </div>

    <div id="page-tasks" class="page active">
        <h3 style="margin-left: 10px;">🚀 Aktif Görevler</h3>
        <div id="task-list"></div>
    </div>

    <div id="page-leaderboard" class="page">
        <h3 style="margin-left: 10px;">🏆 Top 10 Madenci</h3>
        <div class="card" style="flex-direction: column; padding: 0; overflow: hidden;">
            <div id="leader-list" style="width: 100%;"></div>
        </div>
    </div>

    <div id="page-mine" class="page">
        <div id="mine-card" class="card" style="flex-direction: column; text-align: center; padding: 40px 20px;">
            <div style="font-size: 60px; margin-bottom: 15px;" id="mine-icon">⛏️</div>
            <h3 id="mine-status-text">Maden Hazırlanıyor...</h3>
            <div id="mining-timer" style="font-family: monospace; font-size: 32px; font-weight: 900; color: var(--gold); margin: 15px 0; display: none;">00:00:00</div>
            <button id="btn-mine" class="btn-full" onclick="startMining()">MADENİ BAŞLAT</button>
        </div>
    </div>

    <div id="page-profile" class="page">
        <div class="card ad-card" style="flex-direction: column; text-align: center;">
            <div style="font-size: 30px; margin-bottom: 10px;">📺</div>
            <h3 style="margin: 0;">Reklam İzle Kazan</h3>
            <p style="font-size: 12px; color: var(--text-dim); margin: 5px 0;">Her reklam için +500 GEP kazanırsın.</p>
            <button class="btn-full" style="background: var(--success); color: white;" onclick="showAd()">REKLAMI BAŞLAT</button>
        </div>

        <div class="card" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: center;">
            <div style="border-right: 1px solid var(--border-glass);">
                <div style="font-size: 10px; color: var(--text-dim);">DAVETLER</div>
                <div id="stat-ref-count" style="font-size: 22px; font-weight: 900; color: var(--gold);">0</div>
            </div>
            <div>
                <div style="font-size: 10px; color: var(--text-dim);">REF GELİRİ</div>
                <div id="stat-ref-earn" style="font-size: 18px; font-weight: 900; color: #00d4ff;">0 GEP</div>
            </div>
        </div>
        <div class="card" style="flex-direction: column;">
            <h3>📅 Günlük Giriş</h3>
            <div class="streak-container" id="streak-box"></div>
            <button id="btn-checkin" class="btn-full" onclick="claimDaily()">GÜNLÜK ÖDÜLÜ AL</button>
        </div>
        <div class="card" style="flex-direction: column; text-align: center;">
            <h3>👥 Arkadaş Davet Et</h3>
            <input type="text" id="ref-link" class="ref-box" readonly onclick="this.select()">
            <button class="btn-full" onclick="copyRef()">LİNKİ KOPYALA</button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="javascript:void(0)" class="nav-item active" onclick="showPage('tasks', this)"><div style="font-size:20px;">📋</div><span>GÖREV</span></a>
        <a href="javascript:void(0)" class="nav-item" onclick="showPage('leaderboard', this)"><div style="font-size:20px;">🏆</div><span>SIRALAMA</span></a>
        <a href="javascript:void(0)" class="nav-item" onclick="showPage('mine', this)"><div style="font-size:20px;">⛏️</div><span>MADEN</span></a>
        <a href="javascript:void(0)" class="nav-item" onclick="showPage('profile', this)"><div style="font-size:20px;">👤</div><span>PROFİL</span></a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const API = window.location.origin;
        let user, tasks = [], miningInterval;

        const AdController = window.Adsgram.init({ blockId: "27433" }); 

        async function init() {
            try {
                const tgUser = tg.initDataUnsafe?.user;
                if (!tgUser) {
                    // Eğer Telegram verisi yoksa (tarayıcı testi için)
                    alert("Lütfen Telegram üzerinden giriş yapın.");
                    document.getElementById('loader').style.display = 'none';
                    return;
                }

                const res = await fetch(`${API}/api/user/auth`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        telegramId: tgUser.id.toString(), 
                        username: tgUser.username || "", 
                        firstName: tgUser.first_name || "Kullanıcı" 
                    })
                });

                const data = await res.json();
                if (data.success) {
                    user = data.user;
                    document.getElementById('ref-link').value = `https://t.me/${data.botUsername}?start=${user.telegramId}`;
                    
                    await refreshTasks();
                    updateUI();
                    renderTasks();
                    checkMiningTimer();
                    renderStreak();
                    
                    if (data.announcements?.length > 0) {
                        const annScroll = document.getElementById('ann-scroll');
                        annScroll.innerText = data.announcements.join(" 📢 ") + " 📢 ";
                        document.getElementById('ann-container').style.display = 'flex';
                    }
                }
            } catch (e) { 
                console.error("Init Error:", e);
            } finally {
                // Hata olsa da olmasa da loader'ı kapat
                setTimeout(() => {
                    const loader = document.getElementById('loader');
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 600);
                }, 800);
            }
        }

        async function showAd() {
            AdController.show().then(async (result) => {
                if (result.done) {
                    const res = await fetch(`${API}/adsgram-reward?teleId=${user.telegramId}&status=done`);
                    if (res.ok) {
                        tg.showAlert("🎉 Tebrikler! +500 GEP kazandın.");
                        init(); // Verileri tazele
                    }
                }
            }).catch(() => {
                tg.showAlert("Reklam yüklenemedi.");
            });
        }

        function updateUI() {
            if (!user) return;
            document.getElementById('balance').innerText = user.points.toLocaleString();
            document.getElementById('usd').innerText = `≈ ${(user.points / 100000).toFixed(2)} USDT`;
            const lvl = document.getElementById('user-level');
            lvl.innerText = `${user.level} ÜYE`;
            lvl.className = `level-badge level-${user.level}`;

            if (document.getElementById('stat-ref-count')) {
                document.getElementById('stat-ref-count').innerText = user.referralCount || 0;
                document.getElementById('stat-ref-earn').innerText = ((user.referralCount || 0) * 500).toLocaleString() + " GEP";
            }
        }

        function showPage(p, el) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            document.getElementById(`page-${p}`).classList.add('active');
            el.classList.add('active');
            if(p === 'leaderboard') loadLeaderboard();
        }

        async function startMining() {
            const res = await fetch(`${API}/api/mine`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.telegramId })
            });
            const data = await res.json();
            if(data.success) { 
                user.points = data.points; 
                user.lastMining = new Date().toISOString();
                updateUI(); 
                tg.showAlert(`🚀 Maden kazıldı! +${data.reward} GEP aldın.`);
                runTimer(4 * 60 * 60 * 1000);
            } else { tg.showAlert(data.message); }
        }

        function checkMiningTimer() {
            if (!user.lastMining || new Date(user.lastMining).getTime() === 0) {
                document.getElementById('mine-status-text').innerText = "1000 GEP İçin Maden Hazır";
                return;
            }
            const cooldown = 4 * 60 * 60 * 1000;
            const diff = new Date().getTime() - new Date(user.lastMining).getTime();
            if (diff < cooldown) runTimer(cooldown - diff);
            else document.getElementById('mine-status-text').innerText = "1000 GEP İçin Maden Hazır";
        }

        function runTimer(timeLeft) {
            const btn = document.getElementById('btn-mine');
            const timerDiv = document.getElementById('mining-timer');
            const statusText = document.getElementById('mine-status-text');
            btn.disabled = true;
            timerDiv.style.display = "block";
            statusText.innerText = "Kalan Süre:";
            clearInterval(miningInterval);
            miningInterval = setInterval(() => {
                timeLeft -= 1000;
                if (timeLeft <= 0) {
                    clearInterval(miningInterval);
                    btn.disabled = false;
                    timerDiv.style.display = "none";
                    statusText.innerText = "1000 GEP İçin Maden Hazır";
                    return;
                }
                const h = Math.floor(timeLeft / 3600000);
                const m = Math.floor((timeLeft % 3600000) / 60000);
                const s = Math.floor((timeLeft % 60000) / 1000);
                timerDiv.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }

        async function refreshTasks() {
            const tRes = await fetch(`${API}/api/tasks`);
            const tData = await tRes.json();
            tasks = tData.tasks;
        }

        function renderTasks() {
            const cont = document.getElementById('task-list');
            cont.innerHTML = '';
            tasks.forEach(t => {
                const done = user.completedTasks.includes(t.taskId);
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div>
                        <h4 style="margin:0; font-size:15px;">${t.title}</h4>
                        <p style="margin:5px 0 0; color:var(--gold); font-weight:800;">+${t.reward} GEP</p>
                    </div>
                    <button style="background:${done ? '#1e293b' : 'var(--gold)'}; color:${done ? '#475569' : '#000'}; border:none; padding:8px 18px; border-radius:12px; font-weight:900;" 
                        ${done ? 'disabled' : ''} onclick="completeTask('${t.taskId}','${t.target}')">
                        ${done ? '✅ BİTTİ' : 'GİT'}
                    </button>`;
                cont.appendChild(div);
            });
        }

        async function completeTask(tid, link) {
            tg.openLink(link);
            setTimeout(async () => {
                const res = await fetch(`${API}/api/tasks/complete`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ telegramId: user.telegramId, taskId: tid })
                });
                const data = await res.json();
                if(data.success) { 
                    user.points = data.points; 
                    user.completedTasks.push(tid); 
                    updateUI(); 
                    renderTasks(); 
                }
            }, 2000);
        }

        function renderStreak() {
            const streakBox = document.getElementById('streak-box');
            streakBox.innerHTML = '';
            const rewards = [0, 100, 200, 300, 400, 500, 600, 1000];
            for (let i = 1; i <= 7; i++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = `streak-day ${i <= user.streak ? 'completed' : ''}`;
                dayDiv.innerHTML = `<div>GÜN ${i}</div><div style="font-weight:900">${rewards[i]}</div>`;
                streakBox.appendChild(dayDiv);
            }
        }

        async function claimDaily() {
            const res = await fetch(`${API}/api/user/checkin`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.telegramId })
            });
            const data = await res.json();
            if(data.success) {
                user.points = data.points;
                user.streak = data.streak;
                updateUI();
                renderStreak();
                tg.showAlert(`🎁 Günlük ödülün alındı!`);
            } else { tg.showAlert(data.message); }
        }

        async function loadLeaderboard() {
            const list = document.getElementById('leader-list');
            const res = await fetch(`${API}/api/leaderboard`);
            const data = await res.json();
            list.innerHTML = data.leaderboard.map((u, i) => `
                <div class="card" style="margin:0; border-radius:0; border-bottom:1px solid var(--border-glass)">
                    <span>${i+1}. ${u.username || u.firstName}</span>
                    <span style="color:var(--gold)">${u.points.toLocaleString()} GEP</span>
                </div>
            `).join('');
        }

        function copyRef() {
            const input = document.getElementById('ref-link');
            input.select();
            document.execCommand('copy');
            tg.showAlert("✅ Link kopyalandı!");
        }

        window.onload = init;
    </script>
</body>
</html>
