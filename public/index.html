<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni - Market Hunter</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0a0f1e; color: white; font-family: 'Arial', sans-serif; text-align: center; margin: 0; overflow: hidden; }
        .header { padding: 15px; background: linear-gradient(180deg, #16213e 0%, rgba(10,15,30,0) 100%); }
        .logo-text { font-size: 24px; font-weight: bold; color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        
        .lang-btns { margin-top: 10px; display: flex; justify-content: center; gap: 15px; }
        .lang-btn { cursor: pointer; font-size: 22px; transition: transform 0.2s; }
        .lang-btn:active { transform: scale(1.2); }

        .balance-container { margin-top: 20px; }
        .balance-amount { font-size: 44px; font-weight: bold; color: #ffffff; }
        .balance-label { color: #00e676; font-size: 13px; letter-spacing: 1px; }
        
        .mining-section { margin-top: 40px; position: relative; }
        .main-button {
            width: 210px; height: 210px; border-radius: 50%;
            background: radial-gradient(circle, #1e3a8a 0%, #0a0f1e 100%);
            border: 4px solid #ffd700; 
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            display: inline-flex; align-items: center; justify-content: center;
        }
        .main-button img { width: 130px; height: 130px; }

        .action-btn {
            margin-top: 20px; background: #ffd700; color: #000;
            border: none; padding: 12px 30px; border-radius: 20px;
            font-weight: bold; font-size: 16px; cursor: pointer; min-width: 200px;
        }
        .action-btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        #timer-text { margin-top: 8px; color: #ffd700; font-size: 18px; font-weight: bold; }

        .footer-menu { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; background: #16213e; border-top: 2px solid #ffd700; }
        .menu-item { color: #b0bec5; font-size: 11px; text-decoration: none; text-transform: uppercase; }
        .active { color: #00e676; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-text">GELİR EVRENİ</div>
        <p class="welcome-text">Hoş geldin Avcı!</p>
        <div class="lang-btns">
            <span class="lang-btn" onclick="setLanguage('tr')">🇹🇷</span>
            <span class="lang-btn" onclick="setLanguage('az')">🇦🇿</span>
        </div>
    </div>

    <div class="balance-container">
        <div class="balance-label" id="lbl-total">TOPLAM KAZANÇ</div>
        <div class="balance-amount" id="balance">0.90</div>
        <div style="color: #00e676;" id="lbl-rate">+12.5 GEP / Saat</div>
    </div>

    <div class="mining-section">
        <div class="main-button">
            <img src="https://img.icons8.com/emoji/256/money-bag-emoji.png" alt="Para Çuvalı">
        </div>
        <br>
        <button class="action-btn" id="action-btn" onclick="handleAction()">Madenciliği Başlat</button>
        <div id="timer-text"></div>
    </div>

    <div class="footer-menu">
        <a href="#" class="menu-item active" id="m-home">ANA SAYFA</a>
        <a href="#" class="menu-item" id="m-tasks">GÖREVLER</a>
        <a href="#" class="menu-item" id="m-team">AVCI EKİBİ</a>
        <a href="#" class="menu-item" id="m-market">BORSA</a>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();

        const translations = {
            tr: { 
                welcome: "Hoş geldin Avcı!", 
                total: "TOPLAM KAZANÇ", 
                rate: "+12.5 GEP / Saat", 
                start: "Madenciliği Başlat", 
                collect: "Kazancı Topla", 
                home: "ANA SAYFA", 
                tasks: "GÖREVLER", 
                team: "AVCI EKİBİ", 
                market: "BORSA", 
                alert: "100 GEP Toplandı!" 
            },
            az: { 
                welcome: "Xoş gəldin Ovçu!", 
                total: "ÜMUMİ QAZANC", 
                rate: "+12.5 GEP / Saat", 
                start: "Mədənçiliyi Başlat", 
                collect: "Qazancı Topla", 
                home: "ANA SƏHİFƏ", 
                tasks: "TAPŞIRIQLAR", 
                team: "OVÇU KOMANDASI", 
                market: "BİRJA", 
                alert: "100 GEP Toplandı!" 
            }
        };

        let currentLang = localStorage.getItem('lang') || 'tr';
        let balance = 0.90;
        const EIGHT_HOURS = 8 * 60 * 60 * 1000;

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            updateUI();
        }

        function updateUI() {
            const t = translations[currentLang];
            document.querySelector('.welcome-text').innerText = t.welcome;
            document.getElementById('lbl-total').innerText = t.total;
            document.getElementById('lbl-rate').innerText = t.rate;
            document.getElementById('m-home').innerText = t.home;
            document.getElementById('m-tasks').innerText = t.tasks;
            document.getElementById('m-team').innerText = t.team;
            document.getElementById('m-market').innerText = t.market;

            const startTime = localStorage.getItem('miningStartTime');
            const actionBtn = document.getElementById('action-btn');
            
            if (!startTime) {
                actionBtn.innerText = t.start;
                actionBtn.disabled = false;
                document.getElementById('timer-text').innerText = "";
            } else {
                const now = new Date().getTime();
                const elapsed = now - parseInt(startTime);
                if (elapsed < EIGHT_HOURS) {
                    actionBtn.disabled = true;
                } else {
                    actionBtn.innerText = t.collect;
                    actionBtn.disabled = false;
                    document.getElementById('timer-text').innerText = "00:00:00";
                }
            }
        }

        function handleAction() {
            const startTime = localStorage.getItem('miningStartTime');
            if (!startTime) {
                localStorage.setItem('miningStartTime', new Date().getTime());
                startCountdown(EIGHT_HOURS);
                updateUI();
            } else {
                const now = new Date().getTime();
                if (now - parseInt(startTime) >= EIGHT_HOURS) {
                    balance += 100;
                    document.getElementById('balance').innerText = balance.toFixed(2);
                    localStorage.removeItem('miningStartTime');
                    updateUI();
                    if(tele.showAlert) tele.showAlert(translations[currentLang].alert);
                }
            }
        }

        function startCountdown(duration) {
            let timer = duration;
            const interval = setInterval(() => {
                const hours = Math.floor(timer / (1000 * 60 * 60));
                const minutes = Math.floor((timer % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((timer % (1000 * 60)) / 1000);
                document.getElementById('timer-text').innerText = `${hours}s ${minutes}d ${seconds}s`;
                timer -= 1000;
                if (timer < 0) { clearInterval(interval); updateUI(); }
            }, 1000);
        }

        const savedStart = localStorage.getItem('miningStartTime');
        if (savedStart) {
            const elapsed = new Date().getTime() - parseInt(savedStart);
            if (elapsed < EIGHT_HOURS) startCountdown(EIGHT_HOURS - elapsed);
        }
        updateUI();
    </script>
</body>
</html>
