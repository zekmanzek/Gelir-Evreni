<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni | Komuta Merkezi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-deep: #020617; 
            --gold: #ffcc00; 
            --gold-glow: rgba(255, 204, 0, 0.4);
            --card-glass: rgba(15, 23, 42, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Urbanist', sans-serif; 
            background-color: var(--bg-deep); 
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, var(--bg-deep) 70%); 
            color: var(--text-main); 
            margin: 0; 
            padding-bottom: 110px; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-deep); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: 0.6s; }
        .loader-logo { font-size: 28px; font-weight: 900; color: var(--gold); letter-spacing: 6px; text-shadow: 0 0 20px var(--gold-glow); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

        .announcement-container { background: linear-gradient(90deg, #ef4444, #f59e0b); color: white; overflow: hidden; white-space: nowrap; position: sticky; top: 0; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); height: 35px; display: none; align-items: center; }
        .announcement-scroll { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; font-size: 13px; font-weight: 800; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        .level-badge { padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 900; text-transform: uppercase; margin-bottom: 12px; display: inline-block; letter-spacing: 1px; }
        .level-Bronz { background: #cd7f32; color: #fff; }
        .level-Gümüş { background: #c0c0c0; color: #000; }
        .level-Altın { background: #ffd700; color: #000; box-shadow: 0 0 15px var(--gold-glow); }
        .level-Platin { background: #e5e4e2; color: #000; }
        .level-Elmas { background: #b9f2ff; color: #000; box-shadow: 0 0 20px #b9f2ff; }

        .header { text-align: center; padding: 30px 20px; border-bottom: 1px solid var(--border-glass); backdrop-filter: blur(10px); }
        .balance-label { font-size: 11px; letter-spacing: 3px; color: var(--text-dim); font-weight: 700; margin-bottom: 4px; }
        .points-container { display: flex; align-items: baseline; justify-content: center; color: var(--gold); filter: drop-shadow(0 0 15px var(--gold-glow)); }
        .points { font-size: 48px; font-weight: 900; margin: 0; }
        .currency { font-size: 20px; font-weight: 800; margin-left: 8px; opacity: 0.9; }
        
        .page { display: none; padding: 24px 16px; animation: slideUp 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card-glass); backdrop-filter: blur(12px); padding: 20px; border-radius: 24px; margin-bottom: 16px; border: 1px solid var(--border-glass); }
        .btn-full { width: 100%; padding: 18px; border-radius: 18px; background: linear-gradient(135deg, var(--gold) 0%, #ffaa00 100%); border: none; color: #000; font-weight: 900; font-size: 15px; margin-top: 10px; cursor: pointer; transition: 0.2s; }
        .btn-full:active { transform: scale(0.98); }
        .btn-full:disabled { background: #1e293b !important; color: #475569 !important; cursor: not-allowed; }

        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 10px; border-radius: 22px; border: 1px solid var(--border-glass); z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-item { color: var(--text-dim); text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 9px; font-weight: 800; text-transform: uppercase; transition: 0.3s; }
        .nav-item.active { color: var(--gold); }
        
        .ref-box { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass); padding: 14px; border-radius: 14px; color: var(--gold); text-align: center; margin: 8px 0; font-weight: 700; }
        
        .streak-container { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin: 15px 0; }
        .streak-day { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-glass); border-radius: 10px; padding: 8px 2px; text-align: center; font-size: 9px; }
        .streak-day.completed { background: rgba(34, 197, 94, 0.15); border-color: var(--success); color: var(--success); }

        .admin-card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid var(--border-glass); }
        .admin-list-item { display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05); padding:12px; margin-bottom:8px; border-radius:12px; border: 1px solid var(--border-glass); }
        .btn-small { padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; border: none; cursor: pointer; }
        .btn-danger { background: var(--danger); color: white; }
    </style>
</head>
<body>
    <div id="ann-container" class="announcement-container">
        <div id="ann-scroll" class="announcement-scroll"></div>
    </div>
    
    <div id="loader"><div class="loader-logo">GELİR EVRENİ</div></div>

    <div class="header">
        <div id="user-level" class="level-badge level-Bronz">YÜKLENİYOR...</div>
        <div class="balance-label">GÜNCEL BAKİYE</div>
        <div class="points-container">
            <div class="points" id="balance">0</div>
            <div class="currency">GEP</div>
        </div>
        <div id="usd" style="color: #00d4ff; font-weight: 700; font-size: 14px; margin-top: 5px;">≈ 0.00 USDT</div>
    </div>

    <!-- Sayfalar -->
    <div id="page-tasks" class="page active"> <h3 style="margin-left:10px;">🚀 Aktif Görevler</h3> <div id="task-list"></div> </div>
    <div id="page-leaderboard" class="page"> <h3 style="margin-left:10px;">🏆 Top 10 Madenci</h3> <div class="card" style="padding:0;"><div id="leader-list"></div></div> </div>
    <div id="page-mine" class="page"> <!-- Maden sayfası aynı kaldı --> ... </div>
    <div id="page-profile" class="page"> <!-- Profil sayfası aynı --> ... </div>
    <div id="page-admin" class="page"> <!-- Admin sayfası aynı --> ... </div>

    <nav class="nav-bar">
        <a href="javascript:void(0)" class="nav-item active" onclick="showPage('tasks', this)"><div style="font-size:20px;">📋</div><span>GÖREV</span></a>
        <a href="javascript:void(0)" class="nav-item" onclick="showPage('leaderboard', this)"><div style="font-size:20px;">🏆</div><span>SIRALAMA</span></a>
        <a href="javascript:void(0)" class="nav-item" onclick="showPage('mine', this)"><div style="font-size:20px;">⛏️</div><span>MADEN</span></a>
        <a href="javascript:void(0)" class="nav-item" onclick="showPage('profile', this)"><div style="font-size:20px;">👤</div><span>PROFİL</span></a>
        <a href="javascript:void(0)" id="nav-admin" class="nav-item" style="display:none" onclick="showPage('admin', this)"><div style="font-size:20px;">⚙️</div><span>ADMİN</span></a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const API = window.location.origin;
        let user = {}, tasks = [], miningInterval;

        const AdController = window.Adsgram ? window.Adsgram.init({ blockId: "27433" }) : null;

        async function init() {
            try {
                const tgUser = tg.initDataUnsafe?.user;
                if (!tgUser) return tg.showAlert("Lütfen Telegram üzerinden açın.");

                const res = await fetch(`${API}/api/user/auth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telegramId: tgUser.id.toString(),
                        username: tgUser.username || "",
                        firstName: tgUser.first_name || "Kullanıcı"
                    })
                });

                const data = await res.json();
                if (!data.success) throw new Error("Auth failed");

                user = data.user;
                user.isAdmin = data.isAdmin;

                if (user.isBanned) {
                    document.body.innerHTML = `<div style="height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;color:white;"><h1>🚫 Yasaklısınız</h1></div>`;
                    return;
                }

                document.getElementById('ref-link').value = `https://t.me/${data.botUsername}?start=${user.telegramId}`;
                if (user.isAdmin) document.getElementById('nav-admin').style.display = 'flex';

                await refreshTasks();
                updateUI();
                checkMiningTimer();
                renderStreak();
                if (data.announcements) renderAnnouncements(data.announcements);

            } catch (e) {
                console.error(e);
                tg.showAlert("Bağlantı hatası, tekrar deneyin.");
            } finally {
                setTimeout(() => {
                    const loader = document.getElementById('loader');
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 600);
                }, 800);
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(user.points).toLocaleString();
            document.getElementById('usd').innerText = `≈ ${(user.points / 100000).toFixed(2)} USDT`;
            const lvl = document.getElementById('user-level');
            lvl.innerText = `${user.level} ÜYE`;
            lvl.className = `level-badge level-${user.level}`;
            document.getElementById('stat-ref-count').innerText = user.referralCount || 0;
        }

        // Diğer fonksiyonlar (claimDaily, deleteTask vb.) eklendi...
        async function claimDaily() {
            const res = await fetch(`${API}/api/daily-checkin`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.telegramId })
            });
            const data = await res.json();
            if (data.success) {
                user.points = data.points;
                user.streak = data.streak;
                updateUI();
                renderStreak();
                tg.showAlert(`✅ +${data.reward} GEP alındı!`);
            } else {
                tg.showAlert(data.message || "Hata oluştu");
            }
        }

        async function deleteTask(taskId) {
            if (!confirm("Görev silinsin mi?")) return;
            await fetch(`${API}/api/admin/delete-task`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ adminId: user.telegramId, taskId })
            });
            tg.showAlert("Görev silindi.");
            loadAdminStats();
            refreshTasks();
        }

        async function deleteAnnouncement(index) {
            if (!confirm("Duyuru silinsin mi?")) return;
            await fetch(`${API}/api/admin/delete-announcement`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ adminId: user.telegramId, index })
            });
            tg.showAlert("Duyuru silindi.");
            loadAdminStats();
        }

        // ... (diğer fonksiyonlar: startMining, showAd, completeTask, loadLeaderboard vs. aynı kalıyor)

        window.onload = init;
    </script>
</body>
</html>
