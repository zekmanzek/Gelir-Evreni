<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni | Komuta Merkezi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-deep: #020617; 
            --gold: #ffcc00; 
            --gold-glow: rgba(255, 204, 0, 0.4);
            --card-glass: rgba(15, 23, 42, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Urbanist', sans-serif; background-color: var(--bg-deep); color: var(--text-main); margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-deep); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .loader-logo { font-size: 24px; font-weight: 900; color: var(--gold); letter-spacing: 4px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .header { text-align: center; padding: 25px 20px; border-bottom: 1px solid var(--border-glass); }
        .balance-label { font-size: 10px; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 5px; }
        .points { font-size: 42px; font-weight: 900; color: var(--gold); }
        
        .page { display: none; padding: 20px 15px; }
        .page.active { display: block; }

        .card { background: var(--card-glass); border: 1px solid var(--border-glass); padding: 20px; border-radius: 20px; margin-bottom: 15px; }
        .btn-full { width: 100%; padding: 15px; border-radius: 15px; background: var(--gold); border: none; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-full:disabled { background: #334155; color: #64748b; }

        /* Çark Tasarımı Düzenleme */
        .wheel-box { position: relative; width: 280px; height: 280px; margin: 0 auto 20px; border: 8px solid #1e293b; border-radius: 50%; box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow: hidden; }
        .wheel-container { width: 100%; height: 100%; position: relative; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .wheel-pointer { position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 10; font-size: 24px; color: var(--gold); filter: drop-shadow(0 2px 5px black); }
        .wheel-segment { position: absolute; width: 50%; height: 50%; left: 50%; top: 50%; transform-origin: 0 0; display: flex; align-items: flex-start; justify-content: center; padding-top: 20px; color: white; font-weight: 900; font-size: 12px; }

        /* Admin Paneli Stili */
        #admin-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: none; overflow-y: auto; padding: 20px; }

        .nav-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(15, 23, 42, 0.95); display: flex; padding: 12px; border-radius: 20px; border: 1px solid var(--border-glass); }
        .nav-item { flex: 1; text-align: center; font-size: 10px; color: var(--text-dim); text-decoration: none; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>
    <div id="loader"><div class="loader-logo">GELİR EVRENİ</div></div>

    <div id="admin-panel">
        <button onclick="closeAdmin()" style="background: red; color: white; padding: 10px; border-radius: 8px; border: none; margin-bottom: 20px;">KAPAT</button>
        <h2>🛠️ Yönetim Paneli</h2>
        <div class="card">
            <h3>Duyuru Güncelle</h3>
            <input type="text" id="admin-ann" placeholder="Duyuru metni..." class="btn-full" style="background: white; margin-bottom: 10px;">
            <button class="btn-full" onclick="saveAnn()">YAYINLA</button>
        </div>
        <div id="admin-user-list"></div>
    </div>

    <div class="header">
        <div class="balance-label">GÜNCEL BAKİYE</div>
        <div class="points" id="balance">0</div>
        <div id="usd" style="color: #00d4ff; font-weight: 700; font-size: 14px;">≈ 0.00 USDT</div>
    </div>

    <div id="page-tasks" class="page active">
        <h3>🚀 Görevler</h3>
        <div id="task-list">Henüz görev yok.</div>
    </div>

    <div id="page-mine" class="page">
        <div class="card" style="text-align: center;">
            <h3 onclick="adminClickCheck()">🎰 Şans Çarkı</h3>
            <div class="wheel-box">
                <div class="wheel-pointer">▼</div>
                <div id="wheel" class="wheel-container"></div>
            </div>
            <button id="btn-spin" class="btn-full" onclick="spinWheel()">ÇARKI ÇEVİR</button>
        </div>
    </div>

    <div id="page-profile" class="page">
        <h3 id="profile-title" onclick="adminClickCheck()">👤 Profil</h3>
        <div class="card">
            <p>Kullanıcı ID: <span id="u-id">...</span></p>
            <button class="btn-full" style="background: var(--success); color: white;" onclick="showAd()">REKLAM İZLE KAZAN</button>
        </div>
        <div class="card">
            <h3>👥 Referans</h3>
            <input type="text" id="ref-link" readonly style="width:100%; background: #000; color: var(--gold); border: none; padding: 10px; border-radius: 5px; margin-bottom: 10px;">
            <button class="btn-full" onclick="copyRef()">KOPYALA</button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="javascript:void(0)" class="nav-item active" onclick="showPage('tasks', this)">GÖREV</a>
        <a href="javascript:void(0)" class="nav-item" onclick="showPage('mine', this)">MADEN</a>
        <a href="javascript:void(0)" class="nav-item" onclick="showPage('profile', this)">PROFİL</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const API = window.location.origin;
        let user, clickCount = 0;
        
        const REWARDS = [10, 50, 100, 250, 500, 750, 1000, 5000];
        const COLORS = ["#1e293b", "#334155", "#0f172a", "#334155", "#1e293b", "#334155", "#0f172a", "#334155"];

        async function init() {
            try {
                const tgUser = tg.initDataUnsafe?.user;
                if (!tgUser) { document.getElementById('loader').style.display='none'; return; }

                const res = await fetch(`${API}/api/user/auth`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ telegramId: tgUser.id.toString(), username: tgUser.username, firstName: tgUser.first_name })
                });
                const data = await res.json();
                if (data.success) {
                    user = data.user;
                    document.getElementById('u-id').innerText = user.telegramId;
                    document.getElementById('ref-link').value = `https://t.me/${data.botUsername}?start=${user.telegramId}`;
                    updateUI();
                    buildWheel();
                    checkSpin();
                }
            } catch (e) { console.error(e); }
            finally { setTimeout(() => document.getElementById('loader').style.display='none', 800); }
        }

        function buildWheel() {
            const wheel = document.getElementById('wheel');
            wheel.innerHTML = '';
            const angle = 360 / REWARDS.length;
            REWARDS.forEach((r, i) => {
                const seg = document.createElement('div');
                seg.className = 'wheel-segment';
                seg.style.transform = `rotate(${i * angle}deg) skewY(${90 - angle}deg)`;
                seg.style.background = COLORS[i];
                
                const txt = document.createElement('div');
                txt.innerText = r;
                txt.style.transform = `skewY(-${90 - angle}deg) rotate(${angle/2}deg)`;
                txt.style.position = 'absolute';
                txt.style.top = '40px';
                
                seg.appendChild(txt);
                wheel.appendChild(seg);
            });
        }

        function checkSpin() {
            const last = localStorage.getItem(`spin_${user.telegramId}`);
            if(last === new Date().toDateString()) {
                const b = document.getElementById('btn-spin');
                b.disabled = true; b.innerText = "YARIN TEKRAR GEL";
            }
        }

        async function spinWheel() {
            const wheel = document.getElementById('wheel');
            const randomIdx = Math.floor(Math.random() * REWARDS.length);
            const totalDeg = (360 * 5) + (360 - (randomIdx * (360/REWARDS.length)));
            
            document.getElementById('btn-spin').disabled = true;
            wheel.style.transform = `rotate(${totalDeg}deg)`;

            setTimeout(async () => {
                const win = REWARDS[randomIdx];
                localStorage.setItem(`spin_${user.telegramId}`, new Date().toDateString());
                user.points += win;
                updateUI();
                tg.showAlert(`🎉 ${win} GEP Kazandın!`);
                checkSpin();
            }, 4000);
        }

        function updateUI() {
            document.getElementById('balance').innerText = user.points.toLocaleString();
            document.getElementById('usd').innerText = `≈ ${(user.points / 100000).toFixed(2)} USDT`;
        }

        function showPage(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(`page-${p}`).classList.add('active');
            el.classList.add('active');
        }

        // GİZLİ ADMİN GİRİŞİ: Profil başlığına 5 kez tıkla
        function adminClickCheck() {
            clickCount++;
            if(clickCount >= 5) {
                document.getElementById('admin-panel').style.display = 'block';
                clickCount = 0;
            }
        }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        function copyRef() {
            const copyText = document.getElementById("ref-link");
            copyText.select();
            document.execCommand("copy");
            tg.showAlert("Referans linkin kopyalandı!");
        }

        window.onload = init;
    </script>
</body>
</html>
