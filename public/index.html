<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni - Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a111f;
            --card-grad: linear-gradient(145deg, #162133, #0f172a);
            --neon-green: #00ff88;
            --gold: #ffcc00;
            --text-gray: #94a3b8;
        }

        body {
            background: var(--bg-deep);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
            overflow-x: hidden;
        }

        .container { padding: 15px; padding-bottom: 100px; }

        /* Üst Panel - Bayraklar ve Başlık */
        .header-top { display: flex; justify-content: center; gap: 10px; margin-bottom: 5px; }
        .flag { width: 24px; border-radius: 4px; }
        .title { color: var(--gold); font-weight: 800; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }

        /* Ana Bakiye Kartı */
        .main-card {
            background: var(--card-grad);
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            position: relative;
            margin-bottom: 20px;
        }

        .coin-img { width: 80px; margin-bottom: 10px; filter: drop-shadow(0 0 15px rgba(255,204,0,0.3)); }
        .balance-value { font-size: 38px; font-weight: 800; margin: 5px 0; }
        .balance-usd { color: var(--neon-green); font-size: 16px; font-weight: 600; }

        /* Parlayan Yeşil Madencilik Butonu */
        .btn-mine {
            background: linear-gradient(180deg, #34d399, #059669);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 0 20px rgba(52, 211, 153, 0.4), inset 0 -4px 0 rgba(0,0,0,0.2);
            margin-top: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-mine:active { transform: scale(0.98); }
        .btn-mine:disabled { background: #334155; box-shadow: none; opacity: 0.7; }

        /* 3'lü Görev Kartları (Görseldeki gibi) */
        .grid-tasks { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .task-card {
            background: var(--card-grad);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 12px;
        }
        .task-card.gold { background: linear-gradient(145deg, #f59e0b, #b45309); }
        .task-card.green { background: linear-gradient(145deg, #10b981, #065f46); }
        
        .task-icon { font-size: 24px; margin-bottom: 5px; display: block; }
        .task-title { font-weight: 600; display: block; margin-bottom: 5px; line-height: 1.2; }
        .task-bonus { font-weight: 800; color: white; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 2px 5px; }

        /* Görev Sistemi Bölümü */
        .section-label { display: flex; align-items: center; gap: 8px; font-weight: 700; color: var(--gold); margin-bottom: 15px; }
        .list-container { background: var(--card-grad); border-radius: 25px; overflow: hidden; }
        .list-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .list-icon { width: 40px; height: 40px; background: #1e293b; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-right: 12px; }
        .list-content { flex: 1; }
        .list-content h4 { margin: 0; font-size: 14px; }
        .list-content p { margin: 0; font-size: 11px; color: var(--text-gray); }

        /* Alt Navigasyon */
        .navbar {
            position: fixed;
            bottom: 15px;
            left: 15px;
            right: 15px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item { text-align: center; color: var(--text-gray); text-decoration: none; font-size: 10px; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }

    </style>
</head>
<body>

<div class="container">
    <div class="header-top">
        <img src="https://flagcdn.com/w40/tr.png" class="flag">
        <div class="title">GELİR EVRENİ</div>
        <img src="https://flagcdn.com/w40/az.png" class="flag">
    </div>

    <div class="main-card">
        <img src="https://cdn-icons-png.flaticon.com/512/2933/2933116.png" class="coin-img">
        <div id="balance" class="balance-value">0 GEP</div>
        <div class="balance-usd">≈ $<span id="usd">0.00</span></div>
        
        <button class="btn-mine" id="mine-btn" onclick="startMining()">
            ⛏️ MADENCİLİĞİ BAŞLAT
        </button>
        <div id="timer" style="margin-top:8px; font-size:14px; font-weight:bold; color:var(--text-gray);">08:00:00</div>
    </div>

    <div class="grid-tasks">
        <div class="task-card gold">
            <span class="task-icon">📋</span>
            <span class="task-title">Görevler</span>
            <span class="task-bonus">+150 GEP</span>
        </div>
        <div class="task-card">
            <span class="task-icon">🎁</span>
            <span class="task-title">Çekiliş</span>
            <div style="font-size:9px;">Tamamlandı: %80</div>
        </div>
        <div class="task-card green">
            <span class="task-icon">👥</span>
            <span class="task-title">Referans</span>
            <span class="task-bonus">+25% bonus</span>
        </div>
    </div>

    <div class="section-label">🔥 Görev Sistemi</div>
    <div class="list-container">
        <div class="list-item">
            <div class="list-icon">📅</div>
            <div class="list-content">
                <h4>Günlük Görev</h4>
                <p>Bugünkü görevleri yap ve 50 GEP kazan</p>
            </div>
        </div>
        <div class="list-item">
            <div class="list-icon">👤</div>
            <div class="list-content">
                <h4>Referans Görevi</h4>
                <p>100 GEP için 2 arkadaşını davet et</p>
            </div>
        </div>
    </div>
</div>

<div class="navbar">
    <div class="nav-item active"><i>🏠</i>Ana Sayfa</div>
    <div class="nav-item"><i>💰</i>Kazanç</div>
    <div class="nav-item"><i>👤</i>Profil</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const userId = new URLSearchParams(window.location.search).get('userid');

    async function load() {
        const res = await fetch('/api/user/' + userId);
        const u = await res.json();
        document.getElementById('balance').innerText = Math.floor(u.balance).toLocaleString() + ' GEP';
        document.getElementById('usd').innerText = (u.balance * 0.0001).toFixed(2);

        if (u.lastMined) {
            const diff = Date.now() - new Date(u.lastMined).getTime();
            if (diff < 28800000) {
                document.getElementById('mine-btn').disabled = true;
                startTimer(28800000 - diff);
            }
        }
    }

    function startTimer(ms) {
        let t = ms / 1000;
        const intr = setInterval(() => {
            let h = Math.floor(t/3600), m = Math.floor((t%3600)/60), s = Math.floor(t%60);
            document.getElementById('timer').innerText = 
                `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if (--t < 0) { clearInterval(intr); location.reload(); }
        }, 1000);
    }

    async function startMining() {
        await fetch('/api/mine', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId }) });
        location.reload();
    }

    load();
</script>
</body>
</html>
