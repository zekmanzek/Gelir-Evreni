<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gelir Evreni</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* Tasarım kodların buraya gelecek (CSS kısmını olduğu gibi koru) */
    body { background: #0a0a12; color: #f1f5f9; font-family: 'DM Sans', sans-serif; padding: 20px; }
    .task-card { background: #1a1a2e; padding: 16px; border-radius: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.07); }
    .task-card.wait { border-color: #06b6d4; opacity: 0.8; }
    .task-card.done { border-color: #10b981; opacity: 0.5; pointer-events: none; }
    .btn-go { color: #f5c542; font-weight: bold; font-size: 14px; }
  </style>
</head>
<body>
  <div id="app">
    <h2 id="userName">Yükleniyor...</h2>
    <div style="font-size: 24px; color: #f5c542; margin-bottom: 20px;">⭐ <span id="userPoints">0</span></div>
    <div id="tasksList"></div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    let user = null;

    async function init() {
      const res = await fetch('/api/user/auth', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ initData: tg.initData })
      });
      const data = await res.json();
      user = data.user;
      document.getElementById('userName').innerText = "Merhaba, " + user.firstName;
      document.getElementById('userPoints').innerText = user.points.toLocaleString();
      loadTasks();
    }

    async function loadTasks() {
      const res = await fetch('/api/tasks');
      const data = await res.json();
      const list = document.getElementById('tasksList');
      list.innerHTML = "";
      data.tasks.forEach(task => {
        const isDone = user.completedTasks.includes(task.taskId);
        const isPending = user.pendingTasks.find(t => t.taskId === task.taskId);
        const statusClass = isDone ? 'done' : (isPending ? 'wait' : '');
        const statusText = isDone ? 'TAMAMLANDI' : (isPending ? '⏳ BEKLE' : 'YAP');

        list.innerHTML += `
          <div class="task-card ${statusClass}" onclick="handleTask('${task.taskId}', '${task.target}')">
            <div><b>${task.title}</b><br><small>+${task.reward} Puan</small></div>
            <div class="btn-go">${statusText}</div>
          </div>`;
      });
    }

    async function handleTask(taskId, target) {
      if (user.completedTasks.includes(taskId) || user.pendingTasks.find(t => t.taskId === taskId)) return;
      tg.openLink(target);
      await fetch('/api/tasks/start', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ telegramId: user.telegramId, taskId })
      });
      location.reload();
    }

    tg.expand();
    init();
  </script>
</body>
</html>
