<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #0b0e14; color: white; margin: 0; padding: 15px; overflow-x: hidden; }
        .stats-card { background: #1c1f2e; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; border: 1px solid #2d334a; }
        .points-val { font-size: 32px; font-weight: 800; color: #ffcc00; }
        .withdraw-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .withdraw-active { background: #238636; color: white; box-shadow: 0 4px 15px rgba(35,134,54,0.3); }
        .withdraw-passive { background: #2d334a; color: #8b949e; opacity: 0.6; }
        
        .package-wrapper { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; scrollbar-width: none; }
        .package-card { min-width: 100px; background: #1c1f2e; border: 2px solid #2d334a; border-radius: 15px; padding: 12px; text-align: center; cursor: pointer; }
        .package-card.active { border-color: #00d4ff; box-shadow: 0 0 10px rgba(0,212,255,0.2); }
        
        .task-card { background: #161b22; border: 1px solid #30363d; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-yap { background: #ffcc00; color: #000; padding: 10px 20px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }

        /* PROFESYONEL ÇARK TASARIMI */
        .wheel-container { position: relative; width: 280px; height: 280px; margin: 20px auto; border-radius: 50%; border: 8px solid #2d334a; background: #2d334a; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .wheel-pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #ffcc00; z-index: 100; }
        .wheel { width: 100%; height: 100%; position: relative; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); border-radius: 50%; overflow: hidden; }
        .wheel-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 65px; height: 65px; background: #0b0e14; border-radius: 50%; border: 4px solid #ffcc00; z-index: 200; display: flex; justify-content: center; align-items: center; font-weight: 900; color: #ffcc00; font-size: 18px; box-shadow: inset 0 0 10px rgba(255,204,0,0.3); }
        
        .slice { position: absolute; width: 100%; height: 100%; transform-origin: center; display: flex; justify-content: center; clip-path: polygon(50% 50%, 0 0, 100% 0); }
        .slice b { position: absolute; top: 35px; font-size: 20px; font-weight: 900; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }

        .s1 { background: #1c1f2e; transform: rotate(0deg); }
        .s2 { background: #00d4ff; transform: rotate(60deg); }
        .s3 { background: #1c1f2e; transform: rotate(120deg); }
        .s4 { background: #00d4ff; transform: rotate(180deg); }
        .s5 { background: #1c1f2e; transform: rotate(240deg); }
        .s6 { background: #00d4ff; transform: rotate(300deg); }

        .s2 b, .s4 b, .s6 b { color: #0b0e14; text-shadow: none; }
    </style>
</head>
<body>
    <div class="stats-card">
        <div style="font-size: 11px; color: #8b949e;">GEP BAKİYE</div>
        <div class="points-val" id="user-points">0</div>
        <div id="usd-val" style="color: #00d4ff; font-size: 14px;">≈ 0.00 USDT</div>
        <button id="main-withdraw-btn" class="withdraw-btn withdraw-passive" style="margin-top: 15px;">💸 Para Çekme Talebi</button>
    </div>
    <div class="package-wrapper" id="package-list"></div>
    <div id="tasks-container"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let userData, allTasks = [], activeCategory = "Topluluğumuz";

        async function loadData() {
            const uid = tg.initDataUnsafe?.user?.id.toString() || "6814040940";
            const res = await fetch('/api/user/auth', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ telegramId: uid }) });
            userData = (await res.json()).user;
            document.getElementById('user-points').innerText = userData.points.toLocaleString();
            document.getElementById('usd-val').innerText = `≈ ${(userData.points / 100000).toFixed(2)} USDT`;
            
            const wBtn = document.getElementById('main-withdraw-btn');
            wBtn.className = `withdraw-btn ${userData.points >= 500000 ? 'withdraw-active' : 'withdraw-passive'}`;

            const tRes = await fetch('/api/tasks');
            allTasks = (await tRes.json()).tasks;
            renderPackages(); renderTasks(activeCategory);
        }

        function renderPackages() {
            const cats = ["Topluluğumuz", "Şans Çarkı", "GEP Madencilik"];
            const cont = document.getElementById('package-list'); cont.innerHTML = '';
            cats.forEach(c => {
                const div = document.createElement('div');
                div.className = `package-card ${activeCategory === c ? 'active':''}`;
                div.onclick = () => { activeCategory = c; renderPackages(); renderTasks(c); };
                div.innerText = c; cont.appendChild(div);
            });
        }

        function renderTasks(cat) {
            const cont = document.getElementById('tasks-container'); cont.innerHTML = '';
            if (cat === "Şans Çarkı") {
                cont.innerHTML = `
                <div style="text-align:center;">
                    <div class="wheel-container">
                        <div class="wheel-pointer"></div>
                        <div class="wheel" id="main-wheel">
                            <div class="slice s1"><b>50</b></div><div class="slice s2"><b>100</b></div><div class="slice s3"><b>150</b></div>
                            <div class="slice s4"><b>200</b></div><div class="slice s5"><b>250</b></div><div class="slice s6"><b>500</b></div>
                        </div>
                        <div class="wheel-logo">GEP</div>
                    </div>
                    <button class="btn-yap" style="width: 80%; padding: 15px; margin-top: 10px;" onclick="startSpin()">ÇARKI ÇEVİR</button>
                </div>`;
            } else if (cat === "GEP Madencilik") {
                cont.innerHTML = `<div style="text-align:center; padding:40px; background:#1c1f2e; border-radius:15px; border:1px dashed #2d334a; color:#8b949e;">Çok Yakında!</div>`;
            } else {
                allTasks.filter(t => t.category === cat).forEach(t => {
                    const isC = userData.completedTasks.includes(t.taskId);
                    const div = document.createElement('div'); div.className = 'task-card';
                    div.innerHTML = `<div><h4 style="margin:0">${t.title}</h4><p style="margin:5px 0 0 0; color:#ffcc00">+${t.reward.toLocaleString()} GEP</p></div>
                    <button class="btn-yap" onclick="tg.openLink('${t.target}')">${isC ? '✅':'YAP'}</button>`;
                    cont.appendChild(div);
                });
            }
        }

        async function startSpin() {
            const res = await fetch('/api/spin', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ telegramId: userData.telegramId }) });
            const data = await res.json();
            if(data.success) {
                const stopAngle = 3600 + (data.winIndex * 60);
                document.getElementById('main-wheel').style.transform = `rotate(-${stopAngle}deg)`;
                setTimeout(() => { tg.showAlert(`🎉 Tebrikler! ${data.reward} GEP kazandın!`); loadData(); }, 4100);
            } else tg.showAlert(data.error);
        }

        document.getElementById('main-withdraw-btn').onclick = () => {
            if(userData.points < 500000) return tg.showAlert("Minimum çekim 500.000 GEP!");
            const wallet = prompt("Lütfen USDT BEP20 Adresinizi Girin:");
            if(wallet && wallet.length > 10) {
                fetch('/api/withdraw', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ telegramId: userData.telegramId, wallet }) })
                .then(() => { tg.showAlert("Talebin iletildi!"); loadData(); });
            }
        };

        loadData();
    </script>
</body>
</html>
