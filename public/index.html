<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Gelir Evreni - Ultimate Neon</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js?v=999"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* [BURADAKİ CSS KODLARI AYNI KALIYOR - GÖRSEL MÜKEMMELLİK KORUNDU] */
        :root {
            --neon-gold: #FFD700; --neon-green: #00FF88; --space-black: #05070A;
            --deep-blue: #0A192F; --glass: rgba(255, 255, 255, 0.03); --border-glow: rgba(255, 215, 0, 0.3);
        }
        body {
            background: radial-gradient(circle at top right, #0A192F, #05070A), 
                        radial-gradient(circle at bottom left, rgba(0, 255, 136, 0.07), transparent 40%);
            color: #E2E8F0; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 0; overflow-x: hidden; min-height: 100vh;
        }
        .container { padding: 20px; padding-bottom: 110px; }
        .header { display: flex; justify-content: center; align-items: center; gap: 12px; margin: 15px 0 30px 0; }
        .header h1 { font-family: 'Orbitron', sans-serif; font-size: 20px; color: var(--neon-gold); text-shadow: 0 0 15px rgba(255, 215, 0, 0.7); letter-spacing: 2px; }
        .main-display { background: var(--glass); backdrop-filter: blur(25px); border-radius: 35px; padding: 35px 20px; border: 1px solid var(--border-glow); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.7); margin-bottom: 25px; }
        .coin-icon { width: 80px; height: 80px; background: linear-gradient(135deg, var(--neon-gold), #B8860B); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 40px; color: #000; box-shadow: 0 0 40px rgba(255, 215, 0, 0.6); margin-bottom: 18px; }
        .balance-amount { font-family: 'Orbitron'; font-size: 44px; font-weight: 700; margin: 10px 0; text-shadow: 0 0 20px rgba(255, 255, 255, 0.35); }
        .balance-usd { color: var(--neon-green); font-size: 20px; font-weight: 700; }
        .action-btn { background: linear-gradient(180deg, var(--neon-green) 0%, #008F4C 100%); border: none; width: 100%; padding: 22px; border-radius: 25px; color: #000; font-family: 'Orbitron'; font-weight: 900; box-shadow: 0 10px 0 #005F32, 0 0 30px rgba(0, 255, 136, 0.5); cursor: pointer; position: relative; overflow: hidden; }
        .action-btn::after { content: ''; position: absolute; top: -50%; left: -60%; width: 20%; height: 200%; background: rgba(255, 255, 255, 0.4); transform: rotate(30deg); animation: moveLight 4s infinite; }
        @keyframes moveLight { 0% { left: -60%; } 20% { left: 120%; } 100% { left: 120%; } }
        .page { display: none; animation: pageIn 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .stat-card { background: rgba(255,255,255,0.02); padding: 18px; border-radius: 22px; border: 1px solid rgba(255,255,255,0.06); }
        .nav-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(10, 25, 47, 0.9); backdrop-filter: blur(30px); display: flex; justify-content: space-around; padding: 18px; border-radius: 35px; border: 1px solid rgba(255, 215, 0, 0.25); }
        .nav-link { text-align: center; color: #64748B; font-size: 12px; flex: 1; transition: 0.3s; }
        .nav-link.active { color: var(--neon-gold); transform: translateY(-5px); }
        .nav-link i { font-size: 26px; display: block; margin-bottom: 6px; font-style: normal; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://flagcdn.com/w40/tr.png">
        <h1>GELİR EVRENİ</h1>
        <img src="https://flagcdn.com/w40/az.png">
    </div>

    <div id="home-page" class="page active">
        <div class="main-display">
            <div class="coin-icon">$</div>
            <div class="balance-label">TOPLAM AVIN</div>
            <div id="balance" class="balance-amount">0 GEP</div>
            <div class="balance-usd">≈ $<span id="usd">0.00</span></div>
            <div style="margin-top: 40px;">
                <button class="action-btn" id="mbtn" onclick="mine()">🎯 MADENCİLİĞİ BAŞLAT</button>
                <div id="timer" style="margin-top:18px; font-weight:bold; letter-spacing:3px; color:#64748B; font-family:'Orbitron'; font-size:14px;">SİSTEM ÇEVRİMİÇİ</div>
            </div>
        </div>
        <div class="stat-grid">
            <div class="stat-card"><small>Üretim Gücü</small><div id="speed">+50/s</div></div>
            <div class="stat-card"><small>Avcı Seviyesi</small><div>Seviye 1</div></div>
        </div>
    </div>

    <div id="earn-page" class="page">
        <h2 style="color:var(--neon-gold); font-family:'Orbitron'; font-size:20px; text-align:center;">GÖREV GALAKSİSİ</h2>
        <div class="task-list">
            <div class="task-item" style="background:var(--glass); padding:20px; border-radius:25px; margin-bottom:10px; display:flex; align-items:center; border:1px solid rgba(255,215,0,0.1);" onclick="copyRef()">
                <div style="font-size:28px; margin-right:15px;">🚀</div>
                <div><h4>Ekibi Büyüt</h4><p>Her davet için 1000 GEP</p></div>
            </div>
        </div>
    </div>

    <div id="profile-page" class="page">
        <h2 style="color:var(--neon-gold); font-family:'Orbitron'; font-size:20px; text-align:center;">KOMUTAN VERİLERİ</h2>
        <div class="main-display" style="padding: 30px; border-color: rgba(0, 255, 136, 0.25);">
            <div id="username" style="font-size:28px; font-weight:bold; color:var(--neon-gold); font-family:'Orbitron';">Yükleniyor...</div>
            <div id="userid" style="color:#94A3B8; margin-top:10px; letter-spacing:2px; font-size:14px;">ID: ---</div>
        </div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-link active" onclick="switchPage('home', this)"><i>🏠</i>Üs</div>
    <div class="nav-link" onclick="switchPage('earn', this)"><i>💰</i>Kazanç</div>
    <div class="nav-link" onclick="switchPage('profile', this)"><i>👤</i>Profil</div>
</div>

<script>
    // CACHE BUSTER HİLESİ: API isteklerine her seferinde benzersiz zaman ekler
    const timestamp = new Date().getTime();
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const userId = new URLSearchParams(window.location.search).get('userid');

    async function init() {
        try {
            // API isteğinin sonuna ?t=zaman ekleyerek cache'i bypass ediyoruz
            const res = await fetch(`/api/user/${userId}?t=${timestamp}`);
            const data = await res.json();
            
            document.getElementById('balance').innerText = Math.floor(data.balance).toLocaleString() + ' GEP';
            document.getElementById('usd').innerText = (data.balance * 0.0001).toFixed(2);
            document.getElementById('speed').innerText = '+' + (data.speed || 50) + '/s';
            document.getElementById('username').innerText = data.username || "Komutan";
            document.getElementById('userid').innerText = 'ID: ' + (data.userId || "---");

            if (data.lastMined) {
                const diff = Date.now() - new Date(data.lastMined).getTime();
                if (diff < 28800000) {
                    document.getElementById('mbtn').disabled = true;
                    runTimer(28800000 - diff);
                }
            }
        } catch (e) { console.error("Hata:", e); }
    }

    function runTimer(ms) {
        let t = ms / 1000;
        const timerObj = setInterval(() => {
            let h = Math.floor(t/3600), m = Math.floor((t%3600)/60), s = Math.floor(t%60);
            document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if (--t < 0) { clearInterval(timerObj); location.reload(); }
        }, 1000);
    }

    async function mine() {
        tg.HapticFeedback.notificationOccurred('success');
        await fetch('/api/mine', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({ userId, t: timestamp }) // POST isteğine de ekledik
        });
        location.reload(true); // Sert yenileme
    }

    function switchPage(page, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(page + '-page').classList.add('active');
        el.classList.add('active');
        tg.HapticFeedback.impactOccurred('medium');
    }

    function copyRef() {
        const link = `https://t.me/gelir_evreni_bot?start=${userId}`;
        const i = document.createElement('input'); i.value = link; document.body.appendChild(i); i.select(); 
        document.execCommand('copy'); document.body.removeChild(i);
        tg.showAlert("Koordinatlar Kopyalandı!");
    }

    init();
</script>
</body>
</html>
