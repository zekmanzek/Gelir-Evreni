<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gelir Evreni | Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-deep: #020617; 
            --gold: #ffcc00; 
            --gold-glow: rgba(255, 204, 0, 0.4);
            --card-glass: rgba(15, 23, 42, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Urbanist', sans-serif; 
            background-color: var(--bg-deep); 
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, var(--bg-deep) 70%);
            color: var(--text-main); 
            margin: 0; 
            padding-bottom: 100px; 
            min-height: 100vh;
            overflow-x: hidden; 
        }

        /* --- MODERN KARŞILAMA --- */
        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg-deep); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .loader-logo { 
            font-size: 28px; font-weight: 900; color: var(--gold); 
            letter-spacing: 6px; text-shadow: 0 0 20px var(--gold-glow);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

        /* --- MADEN KAZMA ANİMASYONU --- */
        .pickaxe {
            font-size: 60px;
            display: inline-block;
            margin-bottom: 20px;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .mining-active .pickaxe {
            animation: swing 1.2s infinite ease-in-out;
        }
        @keyframes swing {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-45deg) scale(1.15); }
            100% { transform: rotate(0deg); }
        }

        /* CANLI SAYAÇ STİLİ */
        #mining-timer {
            font-family: 'Courier New', monospace;
            font-size: 28px;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 15px var(--gold-glow);
            margin: 10px 0;
            letter-spacing: 2px;
            display: none;
        }

        /* --- HEADER --- */
        .header { 
            text-align: center; padding: 40px 20px; 
            border-bottom: 1px solid var(--border-glass);
            backdrop-filter: blur(10px);
        }
        .balance-label { font-size: 12px; letter-spacing: 3px; color: var(--text-dim); font-weight: 700; margin-bottom: 8px; }
        .points-container { 
            display: flex; 
            align-items: baseline; 
            justify-content: center; 
            color: var(--gold);
            filter: drop-shadow(0 0 15px var(--gold-glow));
        }
        .points { font-size: 54px; font-weight: 900; margin: 0; }
        .currency { font-size: 24px; font-weight: 800; margin-left: 8px; opacity: 0.9; }
        .usd-val { font-size: 16px; color: #00d4ff; font-weight: 700; opacity: 0.9; margin-top: 4px; }

        /* --- ÇARK TASARIMI --- */
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px auto;
        }
        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid var(--border-glass);
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.15);
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .wheel-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            background: var(--gold);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
        }

        /* --- SAYFALAR & KARTLAR --- */
        .page { display: none; padding: 24px 16px; animation: slideUp 0.5s ease-out; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { 
            background: var(--card-glass); 
            backdrop-filter: blur(12px);
            padding: 20px; 
            border-radius: 24px; 
            margin-bottom: 16px; 
            border: 1px solid var(--border-glass); 
            display: flex; justify-content: space-between; align-items: center;
        }

        .btn-full { 
            width: 100%; padding: 20px; border-radius: 20px;
            background: linear-gradient(135deg, var(--gold) 0%, #ffaa00 100%);
            border: none; color: #000; font-weight: 900; font-size: 16px;
            margin-top: 15px; box-shadow: 0 8px 25px rgba(255, 204, 0, 0.2);
            cursor: pointer;
        }
        .btn-full:disabled { background: #1e293b; color: #475569; box-shadow: none; cursor: not-allowed; }

        /* --- NAVİGASYON --- */
        .nav-bar { 
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; 
            padding: 12px 10px; border-radius: 25px; 
            border: 1px solid var(--border-glass); 
            z-index: 1000;
        }
        .nav-item { color: var(--text-dim); text-decoration: none; text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--gold); }
        .nav-icon { font-size: 20px; }

        .btn-action {
            background: var(--gold); 
            border: none; 
            padding: 10px 20px; 
            border-radius: 14px; 
            font-weight: 900; 
            color: #000;
            cursor: pointer;
        }
        .btn-action:disabled { background: #334155; color: #94a3b8; }

        .ref-box { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass); padding: 16px; border-radius: 16px; color: var(--gold); text-align: center; margin: 10px 0; font-weight: 700; font-size: 14px; }
    </style>
</head>
<body>
    <div id="loader"><div class="loader-logo">GELİR EVRENİ</div></div>

    <div class="header">
        <div class="balance-label">GÜNCEL BAKİYE</div>
        <div class="points-container">
            <div class="points" id="balance">0</div>
            <div class="currency">GEP</div>
        </div>
        <div class="usd-val" id="usd">≈ 0.00 USDT</div>
    </div>

    <div id="page-tasks" class="page active">
        <h3>🚀 Aktif Görevler</h3>
        <div id="task-list"></div>
    </div>

    <div id="page-mine" class="page">
        <div id="mine-card" class="card" style="flex-direction: column; text-align: center; padding: 40px 20px;">
            <div class="pickaxe" id="mine-icon">⛏️</div>
            <h3>Otomatik Madencilik</h3>
            <p id="mine-status" style="color: var(--text-dim); margin-bottom: 10px;">8 saatte bir 500 GEP madenle.</p>
            <div id="mining-timer">00:00:00</div>
            <button id="btn-mine" class="btn-full" onclick="startMining()">MADENİ BAŞLAT</button>
        </div>
    </div>

    <div id="page-spin" class="page">
        <div class="card" style="flex-direction: column; text-align: center; padding: 20px;">
            <h3>Şans Çarkı</h3>
            <p style="color: var(--text-dim); font-size: 14px;">Günde 1 kez çevir, ödülünü al!</p>
            
            <div class="wheel-container">
                <div class="wheel-pointer"></div>
                <canvas id="wheelCanvas" width="500" height="500"></canvas>
            </div>

            <button id="btn-spin" class="btn-full" onclick="spinWheel()">ŞİMDİ ÇEVİR</button>
        </div>
    </div>

    <div id="page-ref" class="page">
        <div class="card" style="flex-direction: column; padding: 30px 20px; text-align: center;">
            <div style="font-size: 50px; margin-bottom: 15px;">👥</div>
            <h3>Kitleyi Büyüt</h3>
            <p style="color: var(--text-dim);">Her yeni üye için <b style="color:var(--gold)">+500 GEP</b> kazanırsın.</p>
            <input type="text" id="ref-link" class="ref-box" readonly>
            <button class="btn-full" onclick="copyRef()">DAVET LİNKİNİ KOPYALA</button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="javascript:void(0)" class="nav-item active" onclick="showPage('tasks', this)">
            <div class="nav-icon">📋</div><span>GÖREV</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="showPage('mine', this)">
            <div class="nav-icon">⛏️</div><span>MADEN</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="showPage('spin', this)">
            <div class="nav-icon">🎡</div><span>ÇARK</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="showPage('ref', this)">
            <div class="nav-icon">👥</div><span>REF</span>
        </a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const API = window.location.origin;
        let user, tasks = [], miningInterval;
        
        // --- ÇARK AYARLARI ---
        const prizes = [500, 450, 400, 350, 300, 250, 200, 150, 100, 50];
        const colors = ['#FFD700', '#FF4500', '#FF1493', '#9400D3', '#0000FF', '#00CED1', '#00FF00', '#ADFF2F', '#FFFF00', '#FFA500'];
        let isSpinning = false;

        async function init() {
            try {
                const uid = tg.initDataUnsafe?.user?.id?.toString() || "6814040940";
                const res = await fetch(`${API}/api/user/auth`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ telegramId: uid })
                });
                const data = await res.json();
                user = data.user;
                document.getElementById('ref-link').value = `https://t.me/${data.botUsername}?start=${user.telegramId}`;
                
                const tRes = await fetch(`${API}/api/tasks`);
                const tData = await tRes.json();
                tasks = tData.tasks;
                
                drawWheel();
                updateUI();
                renderTasks();
                checkMiningTimer();
                
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.display = 'none', 600);
                }, 1000);
            } catch (e) { console.error(e); }
        }

        // --- ÇARK ÇİZİMİ ---
        function drawWheel() {
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2;
            const sliceAngle = (2 * Math.PI) / 10;

            for (let i = 0; i < 10; i++) {
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.fill();

                // Yazı ekleme
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#000";
                ctx.font = "bold 30px Urbanist";
                ctx.fillText(prizes[i] + " GEP", radius - 20, 10);
                ctx.restore();
            }
        }

        async function spinWheel() {
            if (isSpinning) return;

            const res = await fetch(`${API}/api/spin`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.telegramId })
            });
            const data = await res.json();

            if (data.success) {
                isSpinning = true;
                const btn = document.getElementById('btn-spin');
                const canvas = document.getElementById('wheelCanvas');
                btn.disabled = true;

                // Ödülün indexini bul
                const prizeIndex = prizes.indexOf(data.prize);
                const sliceAngle = 360 / 10;
                // Ödülün dilim merkezini bul (0. index 0 derecededir, saat yönünde gider)
                const targetDegree = 360 - (prizeIndex * sliceAngle) - (sliceAngle / 2);
                const extraSpins = 360 * 5; // 5 tam tur
                const finalDegree = extraSpins + targetDegree;

                canvas.style.transform = `rotate(${finalDegree}deg)`;

                setTimeout(() => {
                    isSpinning = false;
                    user.points = data.points;
                    updateUI();
                    tg.showAlert(`🎉 Tebrikler! Çarktan ${data.prize} GEP kazandın!`);
                    // Çarkı o pozisyonda sabitle (resetlemeden)
                    const normalizedDegree = finalDegree % 360;
                    canvas.style.transition = 'none';
                    canvas.style.transform = `rotate(${normalizedDegree}deg)`;
                    setTimeout(() => canvas.style.transition = 'transform 5s cubic-bezier(0.15, 0, 0.15, 1)', 50);
                }, 5100);
            } else {
                tg.showAlert("🚫 Bugünlük hakkın doldu, yarın tekrar gel!");
            }
        }

        // --- DİĞER FONKSİYONLAR (DEĞİŞMEDİ) ---
        function checkMiningTimer() {
            const lastMine = new Date(user.lastMining).getTime();
            const now = new Date().getTime();
            const cooldown = 8 * 60 * 60 * 1000;
            const diff = now - lastMine;
            if (diff < cooldown) runTimer(cooldown - diff);
        }

        function runTimer(timeLeft) {
            const btn = document.getElementById('btn-mine');
            const timerDiv = document.getElementById('mining-timer');
            const card = document.getElementById('mine-card');
            const status = document.getElementById('mine-status');
            btn.disabled = true;
            btn.innerText = "MADEN ÇALIŞIYOR...";
            timerDiv.style.display = "block";
            card.classList.add('mining-active');
            status.innerText = "Kazım devam ediyor, lütfen bekle.";
            clearInterval(miningInterval);
            miningInterval = setInterval(() => {
                timeLeft -= 1000;
                if (timeLeft <= 0) {
                    clearInterval(miningInterval);
                    btn.disabled = false;
                    btn.innerText = "MADENİ BAŞLAT";
                    timerDiv.style.display = "none";
                    card.classList.remove('mining-active');
                    status.innerText = "Maden hazır! Kazmaya başlayabilirsin.";
                    return;
                }
                const h = Math.floor(timeLeft / 3600000);
                const m = Math.floor((timeLeft % 3600000) / 60000);
                const s = Math.floor((timeLeft % 60000) / 1000);
                timerDiv.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }

        async function startMining() {
            const res = await fetch(`${API}/api/mine`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.telegramId })
            });
            const data = await res.json();
            if(data.success) { 
                user.points = data.points; 
                user.lastMining = new Date().toISOString();
                updateUI(); runTimer(8 * 60 * 60 * 1000);
                tg.showAlert("⛏️ Maden başarıyla başlatıldı!"); 
            } else { tg.showAlert("⏳ Henüz bekleme süresi dolmadı."); }
        }

        function showPage(p, el) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            document.getElementById(`page-${p}`).classList.add('active');
            el.classList.add('active');
            window.scrollTo(0, 0);
        }

        function renderTasks() {
            const cont = document.getElementById('task-list');
            cont.innerHTML = '';
            tasks.forEach(t => {
                const done = user.completedTasks.includes(t.taskId);
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<div class="card-info"><h4 style="margin:0; font-size:16px;">${t.title}</h4><p style="margin:5px 0 0; color:var(--gold); font-weight:800;">+${t.reward} GEP</p></div><button class="btn-action" ${done?'disabled':''} onclick="completeTask('${t.taskId}','${t.target}')">${done ? 'BİTTİ' : 'GİT'}</button>`;
                cont.appendChild(div);
            });
        }

        async function completeTask(tid, link) {
            tg.openLink(link);
            const res = await fetch(`${API}/api/tasks/complete`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: user.telegramId, taskId: tid })
            });
            const data = await res.json();
            if(data.success) { user.points = data.points; user.completedTasks.push(tid); updateUI(); renderTasks(); }
        }

        function updateUI() {
            document.getElementById('balance').innerText = user.points.toLocaleString();
            document.getElementById('usd').innerText = `≈ ${(user.points / 100000).toFixed(2)} USDT`;
        }

        function copyRef() {
            const input = document.getElementById('ref-link');
            input.select();
            document.execCommand('copy');
            tg.showAlert("✅ Link kopyalandı!");
        }

        window.onload = init;
    </script>
</body>
</html>
